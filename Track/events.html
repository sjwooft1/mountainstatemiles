<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Events — Mountain State Miles</title>
  <link rel="icon" type="image/png" href="../assets/Favicon Generator/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../assets/Favicon Generator/favicon.svg" />
  <link rel="shortcut icon" href="../assets/Favicon Generator/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/Favicon Generator/apple-touch-icon.png" />
  <link rel="manifest" href="../assets/Favicon Generator/site.webmanifest" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/main.css" />


  
  <script src="/assets/theme-toggle.js" defer></script>
  <script src="/assets/components.js" defer></script>
</head>
<style>
  .section-title {
    padding-top: 30px;
  }
</style>
<body>

  <div id="global-header"></div>

<script src="/assets/msm-loader.js"></script>
<main class="content-section">
    <section class="section">
    <h2 class="section-title">Track & Field Events</h2>
      <div class="event-grid" id="event-grid">
        <div class="empty-state">Loading events...</div>
      </div>
    </section>
  </main>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    async function waitForFirebase() {
      let attempts = 0;
      while (typeof window.firebaseDatabase === 'undefined' && attempts < 50) {
        await new Promise(resolve => setTimeout(resolve, 100));
        attempts++;
      }
      if (typeof window.firebaseDatabase === 'undefined') {
        throw new Error('Firebase database not initialized');
      }
    }
    
    async function loadEvents() {
      const container = document.getElementById('event-grid');
      try {
        await waitForFirebase();
        console.log('Loading events from Track/events...');
        const snapshot = await window.firebaseDatabase.ref('Track/events').once('value');
        
        console.log('Events snapshot exists:', snapshot.exists());
        console.log('Events snapshot val:', snapshot.val());
        
        const events = [];
        snapshot.forEach(child => {
          const eventData = child.val();
          console.log('Event found:', child.key, eventData);
          events.push({ id: child.key, ...eventData });
        });
        
        console.log('Total events found:', events.length);
        
        if (!events.length) {
          container.innerHTML = '<div class="empty-state">No events found. Check console for details.</div>';
          return;
        }
        
        // Group by category
        const byCategory = {};
        events.forEach(e => {
          if (!byCategory[e.category]) byCategory[e.category] = [];
          byCategory[e.category].push(e);
        });
        
        container.innerHTML = events.map(ev => `
          <a href="rankings.html?event=${encodeURIComponent(ev.slug)}" class="event-card">
            ${ev.name}
          </a>
        `).join('');
      } catch (error) {
        console.error('Error loading events:', error);
        container.innerHTML = '<div class="empty-state" style="color: #dc3545;">⚠️ Error loading events. Please check your connection and try again.</div>';
      } finally {
        document.dispatchEvent(new Event("MSMDataLoaded"));
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadEvents, 100);
    });
  </script>
  <script src="track-coach-auth.js"></script>
  <script src="track-coach-toolbar.js"></script>

  <div id="global-footer"></div>

</body>
</html>
