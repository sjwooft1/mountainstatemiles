<!DOCTYPE html>
<html lang="en">
<head>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Track Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    
    :root {
      /* Elevate the overall visual system */
      --bg: radial-gradient(circle at top left, #101425 0%, #050712 35%, #020308 100%);
      --panel: rgba(8, 12, 26, 0.96);
      --card: rgba(18, 24, 44, 0.96);
      --accent: #ff7b2d;
      --accent-hover: #ff9a4f;
      --muted: #9fb4c8;
      --border: rgba(255,255,255,0.08);
      --hover: rgba(255,255,255,0.06);
      --success: #22c55e;
      --danger: #f97373;
      --warning: #eab308;
      --info: #38bdf8;
      --shadow-soft: 0 18px 45px rgba(0,0,0,0.55);
      --radius-lg: 18px;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020308;
      background-image: var(--bg);
      color: #e6f0f7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    
    body {
      overflow: hidden;
    }
    
    .app-wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, rgba(8,12,26,0.98) 0%, rgba(8,12,26,0.96) 40%, rgba(8,12,26,0.94) 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
      gap: 24px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .sidebar-brand img {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      object-fit: contain;
      box-shadow: 0 10px 25px rgba(0,0,0,0.55);
    }
    
    .sidebar-brand h1 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.04em;
    }
    
    .sidebar-brand .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }
    
    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .nav-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 8px 12px;
      font-weight: 600;
      margin-top: 8px;
      margin-bottom: 4px;
    }
    
    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.18s ease-out;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.94rem;
    }
    
    .nav-btn:hover {
      background: var(--hover);
      color: #fff;
      border-color: var(--border);
      transform: translateX(2px);
    }
    
    .nav-btn.active {
      background: radial-gradient(circle at top left, var(--accent) 0%, var(--accent-hover) 45%, #ffd28c 140%);
      color: #0b0f1a;
      box-shadow: 0 10px 26px rgba(255, 140, 66, 0.45);
    }
    
    .sidebar-spacer {
      flex: 1;
    }
    
    .logout-section {
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .logout-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: var(--danger);
      color: white;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: #c82333;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
    }
    
    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      background: linear-gradient(90deg, rgba(12,18,40,0.98), rgba(18,27,54,0.98));
      border-bottom: 1px solid var(--border);
      gap: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      position: relative;
      z-index: 5;
    }
    
    .topbar h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    
    .topbar-info {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-left: auto;
      color: var(--muted);
      font-size: 0.88rem;
    }
    
    .topbar-pill {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    
    .topbar-pill span {
      opacity: 0.9;
    }
    
    .topbar-pill-accent {
      border-color: rgba(248, 250, 252, 0.35);
      background: radial-gradient(circle at top left, rgba(248, 250, 252, 0.14), rgba(15,23,42,0.9));
      color: #e5e7eb;
    }
    
    .content {
      flex: 1;
      overflow: auto;
      padding: 24px;
      background: transparent;
    }
    
    /* Grid Container */
    .grid-container {
      background: radial-gradient(circle at top left, rgba(21, 32, 63, 0.95), rgba(11, 18, 34, 0.97));
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-shadow: var(--shadow-soft);
    }
    
    .grid-header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    .grid-header h3 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .grid-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--hover);
      color: #fff;
    }
    
    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    
    .btn-danger:hover {
      background: #c82333;
      transform: translateY(-1px);
    }
    
    .btn-success {
      background: var(--success);
      color: #fff;
    }
    
    .btn-success:hover {
      background: #218838;
    }
    
    .btn-small {
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    
    /* Grid Table */
    .grid-scroll {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    
    .grid-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    
    .grid-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--card);
    }
    
    .grid-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    
    .grid-table th.sortable {
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .grid-table th.sortable:hover {
      background: var(--hover);
      color: #fff;
    }
    
    .grid-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all 0.15s;
    }
    
    .grid-table tbody tr:hover {
      background: var(--hover);
    }
    
    .grid-table td {
      padding: 12px 16px;
      border-right: 1px solid var(--border);
    }
    
    .grid-table td:last-child {
      border-right: none;
    }
    
    .grid-table td input,
    .grid-table td select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: #e6f0f7;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    
    .grid-table td input:focus,
    .grid-table td select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 123, 45, 0.1);
    }
    
    /* Empty State */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow: auto;
      animation: slideUp 0.3s;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .modal-header {
      padding: 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 {
      margin: 0;
      font-size: 1.3rem;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .modal-close:hover {
      background: var(--hover);
      color: #fff;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-label {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .form-input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: #e6f0f7;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 123, 45, 0.1);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
    }
    
    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }
    .home-page{
      color:#ff7b2d
    }

    /* Mobile Navigation */
    .mobile-menu-button {
      display: none;
      width: 48px;
      height: 48px;
      padding: 12px;
      background: transparent;
      border: none;
      color: #e6f0f7;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 999;
    }
    
    .mobile-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
    }
    
    .mobile-menu-overlay.active {
      display: block;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .app-wrapper {
        flex-direction: column;
      }
      
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        z-index: 999;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        overflow-y: auto;
        border-right: 1px solid var(--border);
        border-bottom: none;
      }
      
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      
      .mobile-menu-button {
        display: block;
      }
      
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        gap: 8px;
      }
      
      .topbar h2 {
        font-size: 1.2rem;
        margin: 0;
      }
      
      .topbar-info {
        display: none;
      }
      
      .main {
        width: 100%;
      }
      
      .content {
        padding: 12px;
        padding-bottom: 80px;
      }
      
      .grid-header {
        flex-direction: column;
        align-items: stretch;
      }
      
      .grid-actions {
        flex-direction: column;
        width: 100%;
      }
      
      .grid-actions input,
      .grid-actions button {
        width: 100%;
      }
      
      .btn {
        padding: 12px 16px;
        font-size: 1rem;
        min-height: 48px;
      }
      
      .btn-small {
        padding: 8px 12px;
        font-size: 0.875rem;
        min-height: 40px;
      }
      
      /* Mobile table - switch to card view */
      .grid-table {
        font-size: 0.85rem;
      }
      
      .grid-table th {
        padding: 8px 12px;
        font-size: 0.75rem;
      }
      
      .grid-table td {
        padding: 8px 12px;
      }
      
      /* Modal responsive */
      .modal {
        width: 95%;
        max-height: 95vh;
        max-width: 100%;
      }
      
      .modal-body {
        padding: 16px;
      }
      
      .form-input {
        padding: 12px;
        font-size: 16px; /* Prevents zoom on iOS */
      }
      
      .form-group {
        margin-bottom: 12px;
      }
      
      /* Search input */
      #search-input {
        width: 100%;
        margin-bottom: 8px;
      }
      
      /* Empty state */
      .empty-state {
        padding: 40px 20px;
      }
      
      /* Stats grid */
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 480px) {
      .topbar h2 {
        font-size: 1rem;
      }
      
      .sidebar {
        width: 100%;
      }
      
      .grid-table {
        font-size: 0.75rem;
      }
      
      .grid-table th,
      .grid-table td {
        padding: 6px 8px;
      }
      
      .btn {
        padding: 10px 12px;
        font-size: 0.875rem;
        min-height: 44px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .modal {
        width: 98%;
      }
      
      .grid-header h3 {
        font-size: 1rem;
      }
    }
    
    /* Touch-friendly improvements */
    @media (hover: none) and (pointer: coarse) {
      .btn {
        min-height: 48px;
        min-width: 48px;
      }
      
      .form-input {
        font-size: 16px;
        padding: 12px;
      }
      
      .grid-table td {
        padding: 12px 8px;
      }
      
      .nav-btn {
        padding: 14px 16px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../assets/Wvruns Logo.png" alt="logo">
      <div>
        <h1>Mountain State Miles</h1>
        <div class="subtitle">Track Admin</div>
      </div>
    </div>
    
    <nav>
      <div class="nav-section-title">Main</div>
      <div class="nav-section" id="main-nav">
        <button class="nav-btn active" data-section="dashboard">📊 Dashboard</button>
        <button class="nav-btn" data-section="meets">🏃 Meets</button>
        <button class="nav-btn" data-section="events">Events</button>
        <button class="nav-btn" data-section="athletes">👤 Athletes</button>
        <button class="nav-btn" data-section="results">🏆 Results</button>
        <button class="nav-btn" data-section="teams">🏫 Teams</button>
      </div>
      
      <div class="nav-section-title">Tools</div>
      <div class="nav-section" id="tools-nav">
        <a href="csv-import.html" class="nav-btn" style="text-decoration: none; display: block;">📊 CSV Import</a>
        <button class="nav-btn" data-section="manual-entry">✏️ Manual Entry</button>
        <button class="nav-btn" data-section="bulk-edit">⚙️ Bulk Edit</button>
        <button class="nav-btn" data-section="analytics">📈 Analytics</button>
        <button class="nav-btn" data-section="console">📋 Activity Console</button>
        <button class="nav-btn" data-section="feedback">💬 Feedback</button>
        <button class="nav-btn" data-section="settings">⚙️ Settings</button>
      </div>
    </nav>
    
    <div class="sidebar-spacer"></div>
    
    <div class="logout-section">
      <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>
  </aside>
  
  <main class="main">
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <a href="/home" class="home-page">MSM Home</a>
      <div class="topbar-info">
        <span>🔗 Firebase Connected</span>
        <span id="record-count">0 records</span>
      </div>
    </div>
    
    <div class="content" id="content">
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted);">
        <span>Loading...</span>
      </div>
    </div>
  </main>
</div>

<!-- Modal Template -->
<template id="modal-template">
  <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Modal Title</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-submit" onclick="handleModalSubmit()">Save</button>
      </div>
    </div>
  </div>
</template>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="../admin-logger.js"></script>
<script>
  let savedQuickFilters = { meet: '', event: '', gender: '', search: '' };
  let currentSection = 'dashboard';
  let currentData = [];
  let currentColumns = [];
  let currentOptions = {};
  let sortColumn = null;
  let sortDirection = 'asc';
  
  // ==========================================
  // Auth Check
  // ==========================================
  if (localStorage.getItem('&#116; &#114; &#97; &#99; &#107; &#97; &#100; &#109; &#105; &#110;') !== '&#116; &#114; &#117; &#101;') {
    window.location.replace('admin-login.html');
  }
  
  // ==========================================
  // Navigation
  // ==========================================
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('&#116; &#114; &#97; &#99; &#107; &#97; &#100; &#109; &#105; &#110;');
    window.location.replace('admin-login.html');
  });
  
  document.getElementById('main-nav').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-section]');
    if (!btn) return;
    
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    loadSection(btn.dataset.section);
  });
  
  document.getElementById('tools-nav').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-section]');
    if (!btn) return;
    
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    loadSection(btn.dataset.section);
  });
  
  // ==========================================
  // Section Loading
  // ==========================================
  async function loadSection(section) {
    currentSection = section;
    try {
      localStorage.setItem('track-admin-last-section', section);
    } catch (e) {
      // ignore storage errors
    }
    const titles = {
      'dashboard': 'Dashboard',
      'meets': 'Meets',
      'events': 'Events',
      'athletes': 'Athletes',
      'results': 'Results',

  async function submitManualResult() {
    const meetId = document.getElementById('manual-meet').value;
    const eventId = document.getElementById('manual-event').value;
    const athleteId = document.getElementById('manual-athlete').value;
    const mark = document.getElementById('manual-mark').value.trim();
    const placement = document.getElementById('manual-placement').value || null;
    const heat = document.getElementById('manual-heat').value.trim() || null;
    const gender = document.getElementById('manual-gender').value || '';
    
    // Validation
    if (!meetId) {
      showStatusMessage('Please select a meet', 'error');
      return;
    }
    if (!eventId) {
      showStatusMessage('Please select an event', 'error');
      return;
    }
    if (!athleteId) {
      showStatusMessage('Please select or create an athlete', 'error');
      return;
    }
    if (!mark) {
      showStatusMessage('Please enter a mark/time', 'error');
      return;
    }
    
    try {
      const resultData = {
        athlete_id: athleteId,
        meet_id: meetId,
        event_id: eventId,
        mark: mark,
        placement: placement ? parseInt(placement) : null,
        heat: heat,
        gender: gender,
        timestamp: new Date().toISOString()
      };
      
      const ref = await window.firebaseDatabase.ref('Track/results').push(resultData);
      
      // Log the activity
      if (adminLogger) {
        await adminLogger.logCreate('results', ref.key, resultData);
      }
      
      showStatusMessage('✅ Result submitted successfully!', 'success');
      clearManualForm();
      await loadManualRecentResults();
    } catch (error) {
      showStatusMessage('Error: ' + error.message, 'error');
    }
  }
  
  function showStatusMessage(message, type) {
    const container = document.getElementById('manual-status-container');
    container.innerHTML = `
      <div style="background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; color: ${type === 'success' ? 'var(--success)' : 'var(--danger)'};">
        <span style="font-size: 1.2rem;">${type === 'success' ? '✅' : '❌'}</span>
        <span>${message}</span>
      </div>
    `;
    
    setTimeout(() => {
      if (container.innerHTML.includes(message)) {
        container.innerHTML = '';
      }
    }, 5000);
  }

        results.push({ id: child.key, ...child.val() });
      });

      if (results.length === 0) {
        document.getElementById('manual-recent-container').innerHTML = '';

      // Load related data
      const [athletesSnap, eventsSnap, meetsSnap] = await Promise.all([
        window.firebaseDatabase.ref('Track/athletes').once('value'),
        window.firebaseDatabase.ref('Track/events').once('value'),
        window.firebaseDatabase.ref('Track/meets').once('value')
      ]);
      
      const athletes = {};
      const events = {};
      const meets = {};
      
      athletesSnap.forEach(child => athletes[child.key] = child.val());
      eventsSnap.forEach(child => events[child.key] = child.val());

                <div style="background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">

  function renderGrid(title, columns, data, options = {}) {
    currentColumns = columns;
    currentData = data;
    currentOptions = options;
    
    const html = `
      <div class="grid-container">
        <div class="grid-header">

            <button class="btn btn-secondary" onclick="exportToCSV('${title.toLowerCase()}')">📥 Export</button>
          </div>
        </div>
        <div class="grid-scroll">
          ${data.length === 0 ? '<div class="empty-state">No records yet. Click "+ Add" to create one.</div>' : `
            <table class="grid-table">
              <thead>
                <tr>
                  ${columns.map(col => `
                    <th class="sortable" onclick="sortTable('${col.key}')" style="cursor: pointer;">
                      ${col.label}
                      <span id="sort-${col.key}" style="font-size: 0.8rem;"></span>
                    </th>
                  `).join('')}
                  <th style="width: 120px;">Actions</th>
                </tr>
              </thead>
              <tbody id="grid-body">
                ${renderTableRows(data, columns)}
              </tbody>
            </table>
          `}
        </div>
      </div>
    `;
    
    document.getElementById('content').innerHTML = html;
    document.getElementById('search-input')?.addEventListener('input', filterTable);
    updateRecordCount(data.length);
  }
  
  function renderTableRows(data, columns) {
    return data.map(row => `
      <tr>
        ${columns.map(col => {
          const value = row[col.key] ?? '';
          const displayValue = formatValue(value, col.type);
          return `<td>${displayValue}</td>`;
        }).join('')}
        <td>
          <button class="btn btn-secondary btn-small" onclick="openEditModal('${row.id}')">Edit</button>
          <button class="btn btn-danger btn-small" onclick="confirmDelete('${row.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }
  
  function formatValue(value, type) {
    if (value === null || value === undefined || value === '') return '—';
    if (type === 'date') return new Date(value).toLocaleDateString();
    if (type === 'number') return Number(value).toLocaleString();
    return String(value);
  }
  
  function updateRecordCount(count) {
    document.getElementById('record-count').textContent = `${count} records`;
  }
  
  function sortTable(column) {
    if (sortColumn === column) {
      sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = column;
      sortDirection = 'asc';
    }
    
    currentData.sort((a, b) => {
      const aVal = a[column] ?? '';
      const bVal = b[column] ?? '';
      const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
      return sortDirection === 'asc' ? cmp : -cmp;
    });
    
    document.querySelectorAll('[id^="sort-"]').forEach(el => el.textContent = '');
    const indicator = document.getElementById(`sort-${column}`);
    if (indicator) indicator.textContent = sortDirection === 'asc' ? ' ↑' : ' ↓';
    
    document.getElementById('grid-body').innerHTML = renderTableRows(currentData, currentColumns);
  }
  
  function filterTable() {
    const search = (document.getElementById('search-input')?.value || '').toLowerCase();
    if (!search) {
      document.getElementById('grid-body').innerHTML = renderTableRows(currentData, currentColumns);
      updateRecordCount(currentData.length);
      return;
    }
    
    const filtered = currentData.filter(row => {
      return currentColumns.some(col => {
        const value = String(row[col.key] ?? '').toLowerCase();
        return value.includes(search);
      });
    });
    
    document.getElementById('grid-body').innerHTML = renderTableRows(filtered, currentColumns);
    updateRecordCount(filtered.length);
  }
  
  function exportToCSV(filename) {
    const headers = currentColumns.map(col => col.label).join(',');
    const rows = currentData.map(row => {
      return currentColumns.map(col => {
        const value = row[col.key] ?? '';
        return `"${String(value).replace(/"/g, '""')}"`;
      }).join(',');
    });
    
    const csv = [headers, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${filename}-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function handleModalSubmit() {
  const modal = window.currentModal;
  if (!modal) return;
  const formData = {};
  modal.querySelectorAll('.form-input').forEach(input => {
    let value = input.value;
    if (input.type === 'number') value = value ? parseFloat(value) : null;
    formData[input.name] = value;
  });

  if (currentSection === 'results') {
    const name = (formData.athlete_name || '').trim();
    const school = (formData.athlete_school || '').trim();
    if (!name || !school) { alert("❌ Name and School are required."); return; }

    let athleteId = Object.keys(window.currentAthletesMap || {}).find(id => {
      const a = window.currentAthletesMap[id];
      return a.name.toLowerCase() === name.toLowerCase() && a.school.toLowerCase() === school.toLowerCase();
    });

    if (!athleteId) {
      const parts = name.split(/\s+/);
      const first_name = parts[0] || 'Unknown';
      const last_name = parts.slice(1).join(' ') || '';
      const newRef = await window.firebaseDatabase.ref('Track/athletes').push({ first_name, last_name, school });
      athleteId = newRef.key;
      window.currentAthletesMap[athleteId] = { name, school }; // Update local map immediately
    }
    formData.athlete_id = athleteId;
    delete formData.athlete_name;
    delete formData.athlete_school;
  }

  try {
    if (editingId) { await currentOptions.onUpdate(editingId, formData); } 
    else { await currentOptions.onCreate(formData); }
    closeModal();
    await loadSection(currentSection); // This triggers the table refresh
  } catch (error) { alert('Error: ' + error.message); }
}
  
  async function confirmDelete(id) {
    if (!confirm('Are you sure you want to delete this record?')) return;
    try {
      await currentOptions.onDelete(id);
      await loadSection(currentSection);
    } catch (error) {
      alert('Error: ' + error.message);
    }
  }
  
  // ==========================================
  // Initialize Logger
  // ==========================================
  let adminLogger = null;
  if (window.AdminLogger && window.firebaseDatabase) {
    adminLogger = new window.AdminLogger(window.firebaseDatabase, 'Track');
  }

  // ==========================================
  // Firebase Operations
  // ==========================================
  async function createRecord(path, data) {
    const ref = window.firebaseDatabase.ref(path).push();
    await ref.set(data);
    const entityId = ref.key;
    
    // Extract entity type from path (e.g., 'Track/meets' -> 'meets')
    const entityType = path.split('/').pop();
    
    // Log the activity
    if (adminLogger) {
      await adminLogger.logCreate(entityType, entityId, data);
    }
    
    return entityId;
  }
  
  async function updateRecord(path, updates) {
    // Get old data for logging
    let oldData = {};
    if (adminLogger) {
      const snapshot = await window.firebaseDatabase.ref(path).once('value');
      oldData = snapshot.val() || {};
    }
    
    await window.firebaseDatabase.ref(path).update(updates);
    
    // Extract entity type and ID from path
    const pathParts = path.split('/');
    const entityType = pathParts[pathParts.length - 2];
    const entityId = pathParts[pathParts.length - 1];
    
    // Log the activity
    if (adminLogger) {
      await adminLogger.logUpdate(entityType, entityId, oldData, updates);
    }
  }
  
  async function deleteRecord(path) {
    // Get data before deletion for logging
    let deletedData = {};
    if (adminLogger) {
      const snapshot = await window.firebaseDatabase.ref(path).once('value');
      deletedData = snapshot.val() || {};
    }
    
    await window.firebaseDatabase.ref(path).remove();
    
    // Extract entity type and ID from path
    const pathParts = path.split('/');
    const entityType = pathParts[pathParts.length - 2];

    const selected = document.querySelectorAll('.meets-checkbox:checked').length;

    const selectionCount = document.getElementById('meets-selection-count');
    
    if (selected > 0) {

      document.querySelectorAll('.meets-row').forEach(row => {

  async function handleMeetsBulkEditSubmit(ids) {
    const modal = window.currentModal;
    if (!modal || !ids || !ids.length) return;

    const season = modal.querySelector('input[name="bulk_season"], select[name="bulk_season"]').value.trim();
    const location = modal.querySelector('input[name="bulk_location"]').value.trim();

    const updates = {};
    if (season) updates.season = season;
    if (location) updates.location = location;

    if (!Object.keys(updates).length) {
      alert('Enter at least one field to update.');
      return;
    }

    try {
      await Promise.all(
        ids.map(id => updateRecord(`Track/meets/${id}`, updates))
      );
      closeModal();
      await loadSection('meets');
    } catch (err) {
      console.error('Bulk edit error:', err);
      alert('Error applying bulk edits: ' + err.message);
    }
  }

  function bulkExportMeets() {
    const selectedRows = Array.from(document.querySelectorAll('.meets-checkbox:checked'))
      .map(cb => cb.closest('.meets-row'))
      .filter(Boolean);
    
    const selectedData = currentData.filter(r => selectedRows.some(row => row.getAttribute('data-id') === r.id));
    const headers = ['Name', 'Slug', 'Date', 'Season', 'Location', 'Description'];
    const rows = selectedData.map(r => [
      r.name,
      r.slug,
      r.date,
      r.season,
      r.location || '',
      r.description || ''
    ]);
    
    const csv = [headers, ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `meets-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function applyMeetsFilters() {
    if (!window.currentData || currentSection !== 'meets') return;
    const seasonSel = document.getElementById('meets-filter-season');
    const searchInput = document.getElementById('meets-filter-search');
    const season = seasonSel ? seasonSel.value : '';
    const q = (searchInput ? searchInput.value : '').toLowerCase().trim();

    const all = window.currentData.slice();
    const filtered = all.filter(row => {
      if (season && row.season !== season) return false;
      if (q) {
        const hay = `${row.name || ''} ${row.slug || ''} ${row.location || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const tbody = document.getElementById('meet-list-body');
    if (tbody) {
      tbody.innerHTML = filtered.map(row => `
        <tr class="meets-row" data-id="${row.id}">
          <td style="width: 30px;"><input type="checkbox" class="meets-checkbox" onchange="updateMeetsSelectionCount()"></td>
          <td><strong>${row.name}</strong><br><span style="font-size:0.8em; color:var(--muted)">${row.slug}</span></td>
          <td>${row.date}</td>
          <td><span style="padding:2px 6px; border-radius:4px; font-size:0.8em; background:${row.season === 'indoor' ? '#0f3460' : '#4a2511'}">${row.season}</span></td>

          <td>
            <button class="btn btn-secondary btn-small" onclick="openEditModal('${row.id}')">Edit</button>
            <button class="btn btn-danger btn-small" onclick="confirmDelete('${row.id}')">Del</button>
          </td>
        </tr>
      `).join('');
    }
    document.getElementById('meets-checkbox-all').checked = false;
    updateMeetsSelectionCount();
    updateRecordCount(filtered.length);
  }

  function sortMeetsTable(column) {
    if (!window.currentData || currentSection !== 'meets') return;
    if (!window._meetsSort) window._meetsSort = { column: null, dir: 'asc' };
    const state = window._meetsSort;
    if (state.column === column) {
      state.dir = state.dir === 'asc' ? 'desc' : 'asc';
    } else {
      state.column = column;
      state.dir = 'asc';
    }

    window.currentData.sort((a, b) => {
      const aVal = a[column] || '';
      const bVal = b[column] || '';
      const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
      return state.dir === 'asc' ? cmp : -cmp;
    });

    applyMeetsFilters();
  }

  function applyEventsFilters() {
    if (!window.currentData || currentSection !== 'events') return;
    const category = document.getElementById('events-filter-category').value;
    const gender = document.getElementById('events-filter-gender').value;
    const season = document.getElementById('events-filter-season').value;
    const q = (document.getElementById('events-filter-search').value || '').toLowerCase().trim();

    const all = window.currentData.slice();
    const filtered = all.filter(row => {
      if (category && row.category !== category) return false;
      if (gender && row.gender !== gender) return false;
      if (season && row.season !== season) return false;
      if (q) {
        const hay = `${row.name || ''} ${row.slug || ''}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const tbody = document.getElementById('events-list-body');
    if (tbody) {
      tbody.innerHTML = filtered.map(row => `
        <tr class="events-row" data-id="${row.id}">
          <td style="width: 30px;"><input type="checkbox" class="events-checkbox" onchange="updateEventsSelectionCount()"></td>

  }

  function sortEventsTable(column) {
    if (!window.currentData || currentSection !== 'events') return;
    if (!window._eventsSort) window._eventsSort = { column: null, dir: 'asc' };
    const state = window._eventsSort;
    if (state.column === column) {
      state.dir = state.dir === 'asc' ? 'desc' : 'asc';
    } else {
      state.column = column;
      state.dir = 'asc';
    }

    window.currentData.sort((a, b) => {
      const aVal = a[column] || '';
      const bVal = b[column] || '';
      const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
      return state.dir === 'asc' ? cmp : -cmp;
    });

    applyEventsFilters();
  }

  function initQuickResultsFilters(data) {
  const meetSel = document.getElementById('filter-meet-quick');
  const eventSel = document.getElementById('filter-event-quick');
  const genderSel = document.getElementById('filter-gender-quick');
  const searchInput = document.getElementById('filter-search-quick');

  if (!meetSel || !eventSel || !genderSel || !searchInput) return;

  // Populate dropdown options
  const meets = [...new Set(data.map(r => r.meet_name))].filter(Boolean).sort();
  const events = [...new Set(data.map(r => r.event_name))].filter(Boolean).sort();
  const genders = [...new Set(data.map(r => r.event_gender).filter(Boolean))].sort();

  meetSel.innerHTML = '<option value="">All meets</option>' + meets.map(m => `<option value="${m}">${m}</option>`).join('');
  eventSel.innerHTML = '<option value="">All events</option>' + events.map(e => `<option value="${e}">${e}</option>`).join('');
  genderSel.innerHTML = '<option value="">Any gender</option>' + genders.map(g => `<option value="${g}">${g}</option>`).join('');

  // RESTORE SAVED FILTERS
  meetSel.value = savedQuickFilters.meet || '';
  eventSel.value = savedQuickFilters.event || '';
  genderSel.value = savedQuickFilters.gender || '';
  searchInput.value = savedQuickFilters.search || '';

  // Attach listeners
  meetSel.onchange = applyQuickResultsFilters;
  eventSel.onchange = applyQuickResultsFilters;
  genderSel.onchange = applyQuickResultsFilters;
  searchInput.oninput = function() {
    clearTimeout(window._resultsSearchTimer);
    window._resultsSearchTimer = setTimeout(applyQuickResultsFilters, 150);
  };

  // Trigger initial filter application
  if (window.activeFilters) {
    filterResultsByActiveFilters();
  } else {
    applyQuickResultsFilters();
  }
}

function applyQuickResultsFilters() {
  if (!window.currentRawData) return;

  const meet = document.getElementById('filter-meet-quick')?.value || '';
  const event = document.getElementById('filter-event-quick')?.value || '';
  const gender = document.getElementById('filter-gender-quick')?.value || '';
  const q = (document.getElementById('filter-search-quick')?.value || '').toLowerCase().trim();

  // SAVE CURRENT FILTERS to global state
  savedQuickFilters = { meet, event, gender, search: q };

  let filtered = window.currentRawData;
  if (meet) filtered = filtered.filter(r => r.meet_name === meet);
  if (event) filtered = filtered.filter(r => r.event_name === event);
  if (gender) filtered = filtered.filter(r => r.event_gender === gender);
  if (q) {
    filtered = filtered.filter(r => 
      `${r.athlete_name} ${r.athlete_school} ${r.event_name}`.toLowerCase().includes(q)
    );
  }

  currentData = filtered;
  const tbody = document.getElementById('results-grid-body');
  if (tbody) tbody.innerHTML = renderResultsRows(filtered);
  updateRecordCount(filtered.length);
}

  function setFilterPreset(preset) {
    // Clear previous filters first
    document.querySelectorAll('.filter-athlete, .filter-event, .filter-meet, .filter-gender').forEach(c => c.checked = false);
    document.getElementById('filter-time-max').value = '';
    document.getElementById('filter-time-min').value = '';
    document.getElementById('filter-dist-min').value = '';
    document.getElementById('filter-dist-max').value = '';
    document.getElementById('filter-place-max').value = '';
    document.getElementById('filter-place-min').value = '';
    
    if (preset === 'top5') {
      document.getElementById('filter-place-max').value = '5';
    } else if (preset === 'top10') {
      document.getElementById('filter-place-max').value = '10';
    } else if (preset === 'pr') {
      // Mark records - would need more complex logic
      alert('PRs preset requires additional implementation. Use time/distance filters instead.');
    } else if (preset === 'dq') {
      // No mark - these are results without a mark
      alert('DQ filter requires results without marks. Use manual selection for now.');
    }
    
    applyAdvancedFilters();
  }

  async function handleBulkEditSubmit(ids) {
    const modal = window.currentModal;
    if (!modal || !ids || !ids.length) return;

    const mark = modal.querySelector('input[name="bulk_mark"]').value.trim();
    const placeRaw = modal.querySelector('input[name="bulk_place"]').value.trim();
    const heat = modal.querySelector('input[name="bulk_heat"]').value.trim();

    const updates = {};
    if (mark) updates.mark = mark;
    if (placeRaw) updates.placement = parseInt(placeRaw, 10) || null;
    if (heat) updates.heat = heat;

    if (!Object.keys(updates).length) {
      alert('Enter at least one field to update.');
      return;

    try {

        ids.map(id => updateRecord(`Track/results/${id}`, updates))
      );
      closeModal();
      await loadSection('results');
    } catch (err) {
      console.error('Bulk edit error:', err);

  function parseTimeToSeconds(timeStr) {
    if (!timeStr || timeStr.trim() === '') return null;
    
    timeStr = timeStr.trim();
    
    // Handle MM:SS format (e.g., 5:30)
    if (timeStr.includes(':')) {
      const parts = timeStr.split(':');
      if (parts.length === 2) {
        const mins = parseFloat(parts[0]);
        const secs = parseFloat(parts[1]);
        if (!isNaN(mins) && !isNaN(secs)) {
          return mins * 60 + secs;
        }
      }
      // Handle HH:MM:SS format (e.g., 1:15:30)
      if (parts.length === 3) {
        const hours = parseFloat(parts[0]);
        const mins = parseFloat(parts[1]);
        const secs = parseFloat(parts[2]);
        if (!isNaN(hours) && !isNaN(mins) && !isNaN(secs)) {
          return hours * 3600 + mins * 60 + secs;
        }
      }
    }
    
    // Handle plain seconds (e.g., 25.00)
    const num = parseFloat(timeStr);
    if (!isNaN(num)) return num;
    
    return null;
  }
  
  function parseDistanceToFeet(distStr) {
    if (!distStr || distStr.trim() === '') return null;
    
    distStr = distStr.trim().toUpperCase();
    
    // Handle feet notation (e.g., 20' or 20ft or 20 feet)
    const feetMatch = distStr.match(/^([\d.]+)\s*('|ft|feet)?$/);
    if (feetMatch) {
      return parseFloat(feetMatch[1]);
    }
    
    // Handle meters (e.g., 6.0m or 6.0 meters)
    const metersMatch = distStr.match(/^([\d.]+)\s*(m|meters)?$/);
    if (metersMatch) {
      // Convert meters to feet (1m ≈ 3.28084 feet)
      return parseFloat(metersMatch[1]) * 3.28084;
    }
    
    return null;
  }

  function updateFilterSummary() {
    const filters = window.activeFilters;
    const parts = [];
    
    if (filters.athletes.length > 0) {
      parts.push(`👤 ${filters.athletes.length} athlete(s)`);
    }
    if (filters.events.length > 0) {
      parts.push(`🏃 ${filters.events.length} event(s)`);
    }
    if (filters.meets.length > 0) {
      parts.push(`🏟️ ${filters.meets.length} meet(s)`);
    }
    if (filters.genders.length > 0) {
      parts.push(`⚧ ${filters.genders.join(', ')}`);
    }
    if (filters.timeMax !== null) {
      const mins = Math.floor(filters.timeMax / 60);
      const secs = (filters.timeMax % 60).toFixed(2);
      parts.push(`⏱️ Faster than ${mins}:${secs}`);
    }
    if (filters.timeMin !== null) {
      const mins = Math.floor(filters.timeMin / 60);
      const secs = (filters.timeMin % 60).toFixed(2);
      parts.push(`⏱️ Slower than ${mins}:${secs}`);
    }
    if (filters.distMin !== null) {
      parts.push(`📏 Further than ${filters.distMin.toFixed(1)}ft`);
    }
    if (filters.distMax !== null) {
      parts.push(`📏 Closer than ${filters.distMax.toFixed(1)}ft`);
    }
    if (filters.placeMax !== null) {
      parts.push(`🥇 Place ≤ ${filters.placeMax}`);
    }
    if (filters.placeMin !== null) {
      parts.push(`📊 Place ≥ ${filters.placeMin}`);
    }
    
    const summary = document.getElementById('filter-summary');
    if (parts.length === 0) {
      summary.textContent = 'No filters applied. Click filters above to begin.';
    } else {
      summary.innerHTML = parts.map(p => `<span style="display: inline-block; background: rgba(255,123,45,0.2); padding: 4px 8px; border-radius: 4px; margin-right: 8px; margin-bottom: 4px;">${p}</span>`).join('');
    }
  }
  
  function filterResultsByActiveFilters() {
    const filters = window.activeFilters;
    let filtered = window.currentRawData;
    
    if (filters) {
      if (filters.athletes.length > 0) {
        filtered = filtered.filter(r => filters.athletes.includes(r.athlete_name));
      }
      if (filters.events.length > 0) {
        filtered = filtered.filter(r => filters.events.includes(r.event_name));
      }
      if (filters.meets.length > 0) {
        filtered = filtered.filter(r => filters.meets.includes(r.meet_name));
      }
      if (filters.genders.length > 0) {
        filtered = filtered.filter(r => filters.genders.includes(r.event_gender));
      }
      
      // Time filters - parse mark as time
      if (filters.timeMax !== null || filters.timeMin !== null) {
        filtered = filtered.filter(r => {
          const markSeconds = parseTimeToSeconds(r.mark);
          if (markSeconds === null) return false;
          if (filters.timeMax !== null && markSeconds >= filters.timeMax) return false;
          if (filters.timeMin !== null && markSeconds <= filters.timeMin) return false;
          return true;
        });
      }
      
      // Distance filters - parse mark as distance
      if (filters.distMin !== null || filters.distMax !== null) {
        filtered = filtered.filter(r => {
          const markFeet = parseDistanceToFeet(r.mark);
          if (markFeet === null) return false;
          if (filters.distMin !== null && markFeet <= filters.distMin) return false;
          if (filters.distMax !== null && markFeet >= filters.distMax) return false;
          return true;
        });
      }
      
      // Placement filters
      if (filters.placeMax !== null || filters.placeMin !== null) {
        filtered = filtered.filter(r => {
          const place = parseInt(r.placement);
          if (isNaN(place)) return false;
          if (filters.placeMax !== null && place > filters.placeMax) return false;
          if (filters.placeMin !== null && place < filters.placeMin) return false;
          return true;
        });
      }
    }
    
    currentData = filtered;
    document.getElementById('results-grid-body').innerHTML = renderResultsRows(filtered);
    updateRecordCount(filtered.length);
    
    // Show filter bar if filters are active
    if (filters && Object.values(filters).some(v => {
      if (Array.isArray(v)) return v.length > 0;
      return v !== null;
    })) {
      document.getElementById('filter-bar').style.display = 'flex';
      renderActiveFilterTags();
    }
  }

  function sortTeamsTable(column) {
    if (!window.currentData || currentSection !== 'teams') return;
    if (!window._teamsSort) window._teamsSort = { column: null, dir: 'asc' };
    const state = window._teamsSort;
    if (state.column === column) {
      state.dir = state.dir === 'asc' ? 'desc' : 'asc';
    } else {
      state.column = column;
      state.dir = 'asc';
    }

    window.currentData.sort((a, b) => {
      const aVal = a[column] || '';
      const bVal = b[column] || '';
      const cmp = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
      return state.dir === 'asc' ? cmp : -cmp;
    });

    applyTeamsFilters();
  }

  async function filterConsole() {
    // Simple filter - can be enhanced with a modal
    const action = prompt('Filter by action (create/update/delete) or leave empty for all:');
    if (action === null) return;
    
    if (!adminLogger) return;
    
    const filters = {};
    if (action && ['create', 'update', 'delete'].includes(action.toLowerCase())) {
      filters.action = action.toLowerCase();
    }
    
    const logs = await adminLogger.getFilteredLogs(filters);
    // Re-render with filtered logs (simplified version)
    alert(`Found ${logs.length} matching logs. Full filter UI coming soon!`);
  }

  async function clearOldLogs() {
    if (!confirm('Clear logs older than 30 days? This cannot be undone.')) return;
    
    if (!adminLogger) return;
    
    const btn = document.getElementById('clear-logs-btn');
    if (btn) {
      btn.disabled = true;
      btn.textContent = '⏳ Clearing...';
    }
    
    const cleared = await adminLogger.clearOldLogs(30);
    alert(`Cleared ${cleared} old log entries.`);
    
    if (btn) {
      btn.disabled = false;
      btn.textContent = '🗑️ Clear Old';
    }
    
    await renderConsole();
  }

  async function exportAllTrackData() {
    const [meetsSnap, eventsSnap, athletesSnap, resultsSnap] = await Promise.all([
      window.firebaseDatabase.ref('Track/meets').once('value'),
      window.firebaseDatabase.ref('Track/events').once('value'),
      window.firebaseDatabase.ref('Track/athletes').once('value'),
      window.firebaseDatabase.ref('Track/results').once('value')
    ]);
    
    const data = {
      meets: [],
      events: [],
      athletes: [],
      results: []
    };
    
    meetsSnap.forEach(child => data.meets.push({ id: child.key, ...child.val() }));
    eventsSnap.forEach(child => data.events.push({ id: child.key, ...child.val() }));
    athletesSnap.forEach(child => data.athletes.push({ id: child.key, ...child.val() }));
    resultsSnap.forEach(child => data.results.push({ id: child.key, ...child.val() }));
    
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `track-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

    a.href = url;
    a.download = `track-full-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  (function initAdminShell() {
    let initialSection = 'dashboard';
    try {
      const stored = localStorage.getItem('track-admin-last-section');
      if (stored) initialSection = stored;
    } catch (e) {
      initialSection = 'dashboard';
    }
    
    // Set active nav button to match restored section
    const btn = document.querySelector(`.nav-btn[data-section="${initialSection}"]`);
    if (btn) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    
    loadSection(initialSection);
    
    // Simple keyboard shortcuts (desktop): 1-9 jump between main sections
    const shortcutMap = [
      'dashboard',
      'meets',
      'events',
      'athletes',
      'results',
      'teams',
      'manual-entry',
      'analytics',
      'console'
    ];
    
    window.addEventListener('keydown', (e) => {
      // Ignore when typing in inputs or textareas
      const target = e.target;
      if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable)) {
        return;
      }
      
      if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key, 10) - 1;
        const section = shortcutMap[idx];
        if (!section) return;
        
        const navBtn = document.querySelector(`.nav-btn[data-section="${section}"]`);
        if (navBtn) {
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          navBtn.classList.add('active');
        }
        loadSection(section);
      }
    });
  })();
  
  function bulkDeleteResults() {
    const selected = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(c => 
      c.closest('tr').dataset.id
    );
    
    if (!confirm(`Delete ${selected.length} result(s)? This cannot be undone.`)) return;
    
    Promise.all(selected.map(id => deleteRecord(`Track/results/${id}`))).then(() => {
      renderResults();
    }).catch(err => alert('Error: ' + err.message));
  }
  
  function bulkExportResults() {
    const selected = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(c => 
      c.closest('tr').dataset.id
    );
    
    const selectedData = currentData.filter(r => selected.includes(r.id));
    const headers = ['Athlete', 'School', 'Event', 'Meet', 'Date', 'Mark', 'Place', 'Heat'];
    const rows = selectedData.map(r => [
      r.athlete_name,
      r.athlete_school,
      r.event_name,
      r.meet_name,
      r.meet_date,
      r.mark,
      r.placement,
      r.heat
    ]);
    
    const csv = [headers, ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `results-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

}
  
  function removeFilter(type, value) {
    if (!window.activeFilters) return;
    
    const filters = window.activeFilters;
    const map = { athlete: 'athletes', event: 'events', meet: 'meets', gender: 'genders' };
    const key = map[type];
    
    filters[key] = filters[key].filter(v => v !== value);
    
    if (Object.values(filters).every(arr => Array.isArray(arr) ? arr.length === 0 : arr === null)) {
      clearAllFilters();
    } else {
      filterResultsByActiveFilters();
    }
  }
  
  function renderActiveFilterTags() {
    const filters = window.activeFilters;
    const container = document.getElementById('active-filters');
    const tags = [];
    
    if (filters.athletes.length > 0) {
      tags.push(...filters.athletes.map(a => ({ type: 'athlete', value: a })));
    }
    if (filters.events.length > 0) {
      tags.push(...filters.events.map(e => ({ type: 'event', value: e })));
    }
    if (filters.meets.length > 0) {
      tags.push(...filters.meets.map(m => ({ type: 'meet', value: m })));
    }
    if (filters.genders.length > 0) {
      tags.push(...filters.genders.map(g => ({ type: 'gender', value: g })));
    }
    
    container.innerHTML = tags.map(tag => `
      <span class="filter-tag">
        ${tag.value}
        <button onclick="removeFilter('${tag.type}', '${tag.value.replace(/'/g, "\\'")}')">✕</button>
      </span>
    `).join('');
  }
  
  function clearAllFilters() {
    window.activeFilters = null;
    document.getElementById('filter-bar').style.display = 'none';
    document.getElementById('active-filters').innerHTML = '';
    filterResultsByActiveFilters();
  }
