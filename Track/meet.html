<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet Results | Mountain State Miles</title>
  
  <link rel="icon" type="image/png" href="../assets/Favicon Generator/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../assets/Favicon Generator/favicon.svg" />
  <link rel="shortcut icon" href="../assets/Favicon Generator/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/Favicon Generator/apple-touch-icon.png" />
  <link rel="manifest" href="../assets/Favicon Generator/site.webmanifest" />
  
  <link rel="stylesheet" href="/assets/main.css">
<link rel="stylesheet" href="/assets/msm-loader.css" />
  
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      if (slug) {
        document.title = `${slug.replace(/-/g, " ")} – Meet Results`;
      }
    });
  </script>

  <style>
    /* UI Layout & Containers */
    .meet-header-card {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 12px var(--shadow-light);
    }

    .meet-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 8px 0;
      font-family: 'Aqeon Demo', sans-serif;
    }

    .meet-meta {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Master Tabs (Men / Women) */
    .gender-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }

    .gender-tab {
      padding: 12px 32px;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-tertiary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .gender-tab:hover {
      color: var(--primary);
    }

    .gender-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* View Controls (Events vs Standings) */
    .view-controls {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 24px;
    }

    .view-btn {
      padding: 8px 20px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }

    .view-btn.active {
      background: var(--primary);
      color: var(--bg-primary);
      box-shadow: 0 2px 4px var(--shadow-light);
    }

    /* Event Grid */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .event-btn {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: 12px 8px;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .event-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px var(--shadow-light);
    }

    .event-btn.active {
      background: var(--primary);
      color: var(--bg-primary);
      border-color: var(--primary);
    }

    /* Heat Filter Pill */
    .heat-filter-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .heat-pill-group {
      display: inline-flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
    }

    .heat-pill {
      padding: 6px 16px;
      border: none;
      background: transparent;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }

    .heat-pill.active {
      background: var(--primary);
      color: var(--bg-primary);
    }

    /* Tables */
    .table-container {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow-light);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th {
      background: var(--bg-secondary);
      padding: 14px 20px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border);
    }

    .data-table td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover td {
      background: rgba(0,0,0,0.02);
    }

    .data-table a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .data-table a:hover {
      text-decoration: underline;
    }

    .place-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-secondary);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .place-1 { background: #ffd700; color: #856404; }
    .place-2 { background: #e0e0e0; color: #333333; }
    .place-3 { background: #cd7f32; color: #4a3000; }

    .score-badge {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* Weather */
    .weather-widget {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-top: 16px;
      width: fit-content;
      border: 1px solid var(--border);
    }

    /* Loaders & Errors */
    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .gender-tab { padding: 12px 16px; font-size: 1rem; flex: 1; text-align: center; }
      .data-table th, .data-table td { padding: 12px 10px; font-size: 0.9rem; }
      .events-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .heat-filter-container { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>

<body>
<script src="/assets/msm-loader.js"></script>
  <header>
    <nav class="navbar">
      <div class="navbar-content">
        <a href="index.html" class="navbar-brand">Track</a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">☰</button>
        <ul class="navbar-nav" id="main-nav">
          <li><a href="/home/index.html" class="navbar-link">Home</a></li>
          <li><a href="index.html" class="navbar-link">Track</a></li>
          <li><a href="meets.html" class="navbar-link active">Meets</a></li>
          <li><a href="events.html" class="navbar-link">Events</a></li>
          <li><a href="rankings.html" class="navbar-link">Rankings</a></li>
          <li><a href="analytics.html" class="navbar-link">Analytics</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="content-section">
    <a href="meets.html" style="display:inline-block; margin-bottom:16px; color:var(--text-secondary); text-decoration:none; font-weight:600;">← Back to Meets</a>
    
    <div id="error-box" class="error-msg"></div>

    <div id="meet-header" class="meet-header-card" style="display:none;">
      <h1 id="meet-title" class="meet-title">Loading Results...</h1>
      <div id="meet-meta" class="meet-meta"></div>
      <div id="weather-widget" class="weather-widget" style="display:none;"></div>
    </div>

    <div id="main-content" style="display:none;">
      <div class="gender-tabs">
        <button id="tab-M" class="gender-tab active" onclick="setGender('M')">Men's Results</button>
        <button id="tab-W" class="gender-tab" onclick="setGender('W')">Women's Results</button>
      </div>

      <div class="view-controls">
        <button id="view-events" class="view-btn active" onclick="setView('events')">Results by Event</button>
        <button id="view-teams" class="view-btn" onclick="setView('teams')">Team Standings</button>
      </div>

      <div id="section-events">
        <div id="event-buttons" class="events-grid"></div>
        
        <div class="table-container">
          <div id="heat-controls" class="heat-filter-container" style="display:none; padding: 16px 20px 0;">
            <h3 id="current-event-title" style="margin:0; font-size:1.1rem;">Event Name</h3>
            <div class="heat-pill-group">
              <button id="heat-prelims" class="heat-pill" onclick="setHeat('Prelims')">Prelims</button>
              <button id="heat-finals" class="heat-pill active" onclick="setHeat('Finals')">Finals</button>
            </div>
          </div>
          <div id="results-table-wrapper"></div>
        </div>
      </div>

      <div id="section-teams" style="display:none;">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 80px;">Rank</th>
                <th>School</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="team-standings-body"></tbody>
          </table>
        </div>
      </div>

    </div>
    
    <div id="loading" class="loading-state">
      <div class="loading-spinner" style="border: 3px solid var(--border); border-top-color: var(--primary); width: 30px; height: 30px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
      Loading meet data...
    </div>
  </main>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // --- Data Store ---
    let meetInfo = null;
    let rawResults = [];
    
    // Structured Data: structure[Gender][Event][Heat] = [results]
    let structuredData = { M: {}, W: {} }; 
    
    // UI State
    let activeGender = 'M';
    let activeView = 'events'; // 'events' or 'teams'
    let activeEvent = null;
    let activeHeat = 'Finals';

    const pointsSystem = { 1: 10, 2: 8, 3: 6, 4: 4, 5: 2, 6: 1 };

    async function init() {
      const slug = new URLSearchParams(window.location.search).get("slug");
      const errBox = document.getElementById("error-box");
      
      if (!slug) {
        showError("No meet specified in the URL.");
        document.dispatchEvent(new Event("MSMDataLoaded"));
        return;
      }

      try {
        await waitForFirebase();
        
        // 1. Load Meet Details
        const meetsSnap = await window.firebaseDatabase.ref('Track/meets').once('value');
        meetsSnap.forEach(child => {
          if (child.val().slug === slug || child.key === slug) {
            meetInfo = { id: child.key, ...child.val() };
          }
        });

        if (!meetInfo) throw new Error("Meet not found.");

        // Update Header
        document.getElementById('meet-title').textContent = meetInfo.name;
        document.getElementById('meet-meta').innerHTML = `
          <span>📅 ${meetInfo.date || 'TBA'}</span>
          <span>📍 ${meetInfo.location || 'Location Unknown'}</span>
          ${meetInfo.season ? `<span style="text-transform:uppercase;">🏃 ${meetInfo.season}</span>` : ''}
        `;
        document.getElementById('meet-header').style.display = 'block';
        if(meetInfo.location) loadWeather(meetInfo.location, meetInfo.date);

        // 2. Fetch Athletes & Events caches
        const [athSnap, evSnap, resSnap] = await Promise.all([
          window.firebaseDatabase.ref('Track/athletes').once('value'),
          window.firebaseDatabase.ref('Track/events').once('value'),
          window.firebaseDatabase.ref('Track/results').orderByChild('meet_id').equalTo(meetInfo.id).once('value')
        ]);

        const athletesMap = {}; athSnap.forEach(c => { athletesMap[c.key] = c.val(); });
        const eventsMap = {};   evSnap.forEach(c => { eventsMap[c.key] = c.val(); });

        // 3. Process Results
        resSnap.forEach(child => {
          const r = child.val();
          const athlete = athletesMap[r.athlete_id] || {};
          const event = eventsMap[r.event_id] || {};
          
          const gender = r.gender || event.gender || 'M';
          const eventName = event.name || 'Unknown Event';
          const heat = r.heat || 'Finals';

          rawResults.push({
            id: child.key,
            athlete_id: r.athlete_id,
            athlete_name: `${athlete.first_name || ''} ${athlete.last_name || ''}`.trim(),
            school: athlete.school || 'Unattached',
            mark: r.mark,
            placement: parseInt(r.placement) || null,
            gender: gender,
            event_name: eventName,
            heat: heat,
            relay_names: r.relay_names // IMPORTANT: Pass the relay names if they exist
          });
        });

        if (rawResults.length === 0) throw new Error("No results have been uploaded for this meet yet.");

        buildStructuredData();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';

        window.__MSM_COACH_CTX = {
          kind: 'meet',
          meetId: meetInfo.id,
          meetName: meetInfo.name || ''
        };
        window.dispatchEvent(new CustomEvent('msm-coach-context-updated'));
        
        // Render initial view
        setGender('M');

      } catch(e) {
        showError(e.message);
      } finally {
        document.dispatchEvent(new Event("MSMDataLoaded"));
      }
    }

    function buildStructuredData() {
      structuredData = { M: {}, W: {} };
      rawResults.forEach(r => {
        if (!structuredData[r.gender]) return; // Failsafe
        if (!structuredData[r.gender][r.event_name]) structuredData[r.gender][r.event_name] = {};
        if (!structuredData[r.gender][r.event_name][r.heat]) structuredData[r.gender][r.event_name][r.heat] = [];
        
        structuredData[r.gender][r.event_name][r.heat].push(r);
      });

      // Sort placements
      ['M', 'W'].forEach(g => {
        Object.keys(structuredData[g]).forEach(e => {
          Object.keys(structuredData[g][e]).forEach(h => {
            structuredData[g][e][h].sort((a,b) => {
              if (a.placement && b.placement) return a.placement - b.placement;
              if (a.placement) return -1;
              if (b.placement) return 1;
              return 0;
            });
          });
        });
      });
    }

    // --- Interaction Logic ---
    function setGender(gender) {
      activeGender = gender;
      document.getElementById('tab-M').classList.toggle('active', gender === 'M');
      document.getElementById('tab-W').classList.toggle('active', gender === 'W');
      
      if(activeView === 'events') refreshEventsView();
      if(activeView === 'teams') refreshTeamsView();
    }

    function setView(view) {
      activeView = view;
      document.getElementById('view-events').classList.toggle('active', view === 'events');
      document.getElementById('view-teams').classList.toggle('active', view === 'teams');
      
      document.getElementById('section-events').style.display = view === 'events' ? 'block' : 'none';
      document.getElementById('section-teams').style.display = view === 'teams' ? 'block' : 'none';
      
      if(view === 'events') refreshEventsView();
      if(view === 'teams') refreshTeamsView();
    }

    function refreshEventsView() {
      const eventsContainer = document.getElementById('event-buttons');
      const eventsList = Object.keys(structuredData[activeGender]).sort();
      
      if (eventsList.length === 0) {
        eventsContainer.innerHTML = '';
        document.getElementById('results-table-wrapper').innerHTML = '<div class="empty-state">No events found for this category.</div>';
        document.getElementById('heat-controls').style.display = 'none';
        return;
      }

      eventsContainer.innerHTML = eventsList.map(e => 
        `<button class="event-btn ${e === activeEvent ? 'active' : ''}" onclick="setEvent('${e.replace(/'/g, "\\'")}')">${e}</button>`
      ).join('');

      if (!eventsList.includes(activeEvent)) {
        setEvent(eventsList[0]);
      } else {
        setEvent(activeEvent);
      }
    }

    function setEvent(eventName) {
      activeEvent = eventName;
      
      // Update active button styling visually without full re-render
      document.querySelectorAll('.event-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === eventName);
      });

      const heatsForEvent = structuredData[activeGender][eventName];
      const hasPrelims = heatsForEvent['Prelims'] && heatsForEvent['Prelims'].length > 0;
      const hasFinals = heatsForEvent['Finals'] && heatsForEvent['Finals'].length > 0;

      const heatControls = document.getElementById('heat-controls');
      document.getElementById('current-event-title').textContent = eventName;

      if (hasPrelims && hasFinals) {
        heatControls.style.display = 'flex';
        setHeat(activeHeat === 'Prelims' ? 'Prelims' : 'Finals'); // keep current if valid
      } else {
        heatControls.style.display = 'block'; // Show title
        document.querySelector('.heat-pill-group').style.display = 'none'; // Hide buttons
        setHeat(hasFinals ? 'Finals' : 'Prelims');
      }
    }

    function setHeat(heat) {
      activeHeat = heat;
      document.getElementById('heat-prelims').classList.toggle('active', heat === 'Prelims');
      document.getElementById('heat-finals').classList.toggle('active', heat === 'Finals');
      
      const wrapper = document.getElementById('results-table-wrapper');
      const results = structuredData[activeGender][activeEvent]?.[heat];

      if (!results || results.length === 0) {
        wrapper.innerHTML = '<div class="empty-state">No results for this round.</div>';
        return;
      }

      // RELAY NAMES LOGIC INTEGRATED HERE
      wrapper.innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:60px; text-align:center;">Place</th>
              <th>Athlete</th>
              <th>School</th>
              <th>Mark</th>
            </tr>
          </thead>
          <tbody>
            ${results.map(r => {
              const nameDisplay = r.relay_names 
                ? `<div style="line-height: 1.2;"><strong>${r.school} Relay</strong><br><span style="font-size:0.8rem; color:var(--text-secondary); font-weight:normal;">${r.relay_names}</span></div>` 
                : `<a href="athlete.html?id=${r.athlete_id}">${r.athlete_name}</a>`;

              return `
              <tr>
                <td style="text-align:center;">${getPlaceBadge(r.placement)}</td>
                <td>${nameDisplay}</td>
                <td>${r.school}</td>
                <td style="font-weight:700;">${r.mark || '—'}</td>
              </tr>
            `}).join('')}
          </tbody>
        </table>
      `;
    }

    function refreshTeamsView() {
      const tbody = document.getElementById('team-standings-body');
      const scores = {};

      // Calculate scores (Finals ONLY across ALL events for this gender)
      const events = structuredData[activeGender];
      Object.keys(events).forEach(eventName => {
        const finals = events[eventName]['Finals'] || [];
        finals.forEach(r => {
          if (r.placement && pointsSystem[r.placement]) {
            if (!scores[r.school]) scores[r.school] = 0;
            scores[r.school] += pointsSystem[r.placement];
          }
        });
      });

      const sortedTeams = Object.entries(scores)
        .map(([school, pts]) => ({ school, pts }))
        .sort((a,b) => b.pts - a.pts);

      if (sortedTeams.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No team scores calculated. Only Top 6 Finals placements score points.</td></tr>';
        return;
      }

      tbody.innerHTML = sortedTeams.map((team, idx) => `
        <tr>
          <td style="font-weight:700; color:var(--text-secondary);">${idx + 1}</td>
          <td style="font-weight:600;">${team.school}</td>
          <td class="score-badge">${team.pts}</td>
        </tr>
      `).join('');
    }

    function getPlaceBadge(place) {
      if (!place) return '—';
      if (place <= 3) return `<span class="place-badge place-${place}">${place}</span>`;
      return place;
    }

    function showError(msg) {
      const e = document.getElementById("error-box");
      document.getElementById('loading').style.display = 'none';
      e.textContent = msg;
      e.style.display = "block";
    }

    async function waitForFirebase() {
      let attempts = 0;
      while (typeof window.firebaseDatabase === 'undefined' && attempts < 50) {
        await new Promise(r => setTimeout(r, 100)); attempts++;
      }
    }

    // --- Weather (Simplified port of your existing widget) ---
    async function loadWeather(loc, date) {
      const coords = {
        'grafton high school': {lat:39.34, lon:-80.03},
        'morgantown high school': {lat:39.64, lon:-79.96},
        'parkersburg high school': {lat:39.27, lon:-81.56}
      }[loc.toLowerCase().trim()];
      
      if(!coords) return;
      
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=temperature_2m_max,temperature_2m_min,weather_code&temperature_unit=fahrenheit&timezone=auto`);
        const data = await res.json();
        
        const wWidget = document.getElementById('weather-widget');
        const max = Math.round(data.daily.temperature_2m_max[0]);
        const min = Math.round(data.daily.temperature_2m_min[0]);
        const code = data.daily.weather_code[0];
        
        let icon = '⛅';
        if(code <= 1) icon = '☀️';
        if(code >= 61) icon = '🌧️';

        wWidget.innerHTML = `
          <div style="font-size:2rem;">${icon}</div>
          <div>
            <div style="font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase; font-weight:700;">Meet Forecast</div>
            <div style="font-weight:800;">High: ${max}° <span style="color:var(--text-tertiary); margin:0 4px;">|</span> Low: ${min}°</div>
          </div>
        `;
        wWidget.style.display = 'flex';
      } catch(e) {} // ignore weather errors
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
  <script src="track-coach-auth.js"></script>
  <script src="track-coach-toolbar.js"></script>
</body>
</html>
