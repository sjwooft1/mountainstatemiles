<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Track & Field – Mountain State Miles</title>
        <link
            rel="icon"
            type="image/png"
            href="../assets/Favicon Generator/favicon-96x96.png"
            sizes="96x96"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="../assets/Favicon Generator/favicon.svg"
        />
        <link
            rel="shortcut icon"
            href="../assets/Favicon Generator/favicon.ico"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="../assets/Favicon Generator/apple-touch-icon.png"
        />
        <link
            rel="manifest"
            href="../assets/Favicon Generator/site.webmanifest"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="stylesheet" href="/assets/main.css" />
        <link rel="stylesheet" href="/assets/msm-loader.css" />
        <style></style>

        <script src="/assets/theme-toggle.js" defer></script>
        <script src="/assets/components.js" defer></script>
    </head>
    <body>
        <div id="global-header"></div>

        <script src="/assets/msm-loader.js"></script>

        <main class="content-section">
            <div class="hero-section">
                <div class="hero-content">
                    <img
                        src="/assets/images/logo.png"
                        alt="Mountain State Miles Logo"
                        class="hero-logo"
                        data-theme-light-src="/assets/images/logo.png"
                        data-theme-dark-src="/assets/images/logob.png"
                    />
                    <h1 class="hero-title">Track & Field</h1>
                    <p class="hero-subtitle">
                        Meet records, rankings, and results for West Virginia
                        high school track and field.
                    </p>
                </div>
            </div>

            <section>
                <h2 class="section-title">Event Categories</h2>
                <div class="event-grid">
                    <a href="events.html#sprints" class="event-card">Sprints</a>
                    <a href="events.html#mid-distance" class="event-card"
                        >Mid-Distance</a
                    >
                    <a href="events.html#distance" class="event-card"
                        >Distance</a
                    >
                    <a href="events.html#jumps" class="event-card">Jumps</a>
                    <a href="events.html#throws" class="event-card">Throws</a>
                    <a href="events.html#relays" class="event-card">Relays</a>
                </div>
            </section>

            <section>
                <h2 class="section-title" id="meet-section-title">
                    Today's Track Meets
                </h2>
                <div class="meet-grid" id="meet-list">
                    <p>Loading today's meets...</p>
                </div>
            </section>
        </main>

        <div id="global-footer"></div>

        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
        <script>
            async function waitForFirebase() {
                let attempts = 0;
                while (
                    typeof window.firebaseDatabase === "undefined" &&
                    attempts < 50
                ) {
                    await new Promise((resolve) => setTimeout(resolve, 100));
                    attempts++;
                }
                if (typeof window.firebaseDatabase === "undefined") {
                    throw new Error("Firebase database not initialized");
                }
            }

            function todayString() {
                const d = new Date();
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");
                return `${y}-${m}-${day}`;
            }

            async function loadRecentMeets() {
                const container = document.getElementById("meet-list");
                const titleEl = document.getElementById("meet-section-title");
                try {
                    await waitForFirebase();
                    const snapshot = await window.firebaseDatabase
                        .ref("Track/meets")
                        .once("value");
                    const meetsSnapshotAlt = await window.firebaseDatabase
                        .ref("meets")
                        .once("value");

                    const meets = [];
                    if (snapshot.exists()) {
                        snapshot.forEach((child) => {
                            meets.push({ id: child.key, ...child.val() });
                        });
                    } else if (meetsSnapshotAlt.exists()) {
                        meetsSnapshotAlt.forEach((child) => {
                            meets.push({ id: child.key, ...child.val() });
                        });
                    }

                    const today = todayString();
                    const todaysMeets = meets.filter(
                        (m) => (m.date || "").split("T")[0] === today,
                    );
                    todaysMeets.sort((a, b) => {
                        const dateA = a.date || "";
                        const dateB = b.date || "";
                        return dateB.localeCompare(dateA);
                    });

                    if (titleEl) titleEl.textContent = "Today's Track Meets";

                    if (!todaysMeets.length) {
                        container.innerHTML =
                            '<p>No track meets scheduled for today. <a href="meets.html">View all meets</a>.</p>';
                        return;
                    }

                    function formatDate(str) {
                        if (!str) return "Date TBD";
                        const [y, m, d] = (str.split("T")[0] || str).split("-");
                        return new Date(y, m - 1, d).toLocaleDateString();
                    }

                    container.innerHTML = todaysMeets
                        .map(
                            (meet) => `
          <a href="meet.html?slug=${encodeURIComponent(meet.slug || meet.id)}" class="meet-card">
            <h3 class="meet-card-title">${meet.name || "Unnamed Meet"}</h3>
            <p class="meet-card-date">📅 ${formatDate(meet.date)}</p>
            ${meet.location ? `<p class="meet-card-location">📍 ${meet.location}</p>` : ""}
          </a>
        `,
                        )
                        .join("");
                } catch (error) {
                    console.error("Error loading meets:", error);
                    if (titleEl) titleEl.textContent = "Today's Track Meets";
                    container.innerHTML =
                        '<p style="color: #dc3545; padding: 20px; text-align: center;">No meets scheduled for today.</p>';
                } finally {
                    document.dispatchEvent(new Event("MSMDataLoaded"));
                }
            }

            document.addEventListener("DOMContentLoaded", () => {
                setTimeout(loadRecentMeets, 100);
            });
        </script>
        <script src="track-coach-auth.js"></script>
        <script src="track-coach-toolbar.js"></script>
    </body>
</html>
