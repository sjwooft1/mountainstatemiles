<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meets Dashboard - Track Admin</title>
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --bg: radial-gradient(circle at top left, #101425 0%, #050712 35%, #020308 100%);
      --panel: rgba(8, 12, 26, 0.96);
      --card: rgba(18, 24, 44, 0.96);
      --accent: #ff7b2d;
      --accent-hover: #ff9a4f;
      --muted: #9fb4c8;
      --border: rgba(255,255,255,0.08);
      --hover: rgba(255,255,255,0.06);
      --success: #22c55e;
      --danger: #f97373;
      --warning: #eab308;
      --info: #38bdf8;
      --shadow-soft: 0 18px 45px rgba(0,0,0,0.55);
      --radius-lg: 18px;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020308;
      background-image: var(--bg);
      color: #e6f0f7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    
    body {
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--hover);
      color: #fff;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
    }
    
    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }
    
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    
    .section {
      background: linear-gradient(135deg, rgba(21, 32, 63, 0.95), rgba(11, 18, 34, 0.97));
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft);
    }
    
    .section-header {
      padding: 20px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
    }
    
    .section-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .meet-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .meet-item:hover {
      background: var(--hover);
      border-color: var(--accent);
      transform: translateX(4px);
    }
    
    .meet-item:last-child {
      margin-bottom: 0;
    }
    
    .meet-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
      color: #e6f0f7;
    }
    
    .meet-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    
    .meet-detail {
      color: var(--muted);
    }
    
    .meet-detail strong {
      color: #e6f0f7;
    }
    
    .need-results {
      display: inline-block;
      padding: 4px 10px;
      background: var(--danger);
      color: #fff;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .has-results {
      display: inline-block;
      padding: 4px 10px;
      background: var(--success);
      color: #fff;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .weather-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .weather-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 123, 45, 0.1);
      border-radius: 8px;
      margin-top: 8px;
    }
    
    .temperature {
      font-weight: 600;
      color: var(--accent);
    }
    
    .weather-condition {
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .schedule-item {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .schedule-item:hover {
      background: var(--hover);
      border-color: var(--accent);
    }
    
    .schedule-item:last-child {
      margin-bottom: 0;
    }
    
    .schedule-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 70px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-radius: 8px;
      color: #0b0f1a;
      font-weight: 700;
    }
    
    .schedule-date-day {
      font-size: 1.5rem;
    }
    
    .schedule-date-month {
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    
    .schedule-info {
      flex: 1;
    }
    
    .schedule-name {
      font-weight: 700;
      margin-bottom: 4px;
      color: #e6f0f7;
    }
    
    .schedule-location {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    
    .schedule-season {
      display: inline-block;
      padding: 2px 8px;
      background: var(--info);
      color: #fff;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }
    
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--muted);
    }
    
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: #e6f0f7;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(255, 123, 45, 0.2);
      border: 1px solid var(--accent);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    
    .back-link:hover {
      gap: 12px;
    }
    
    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    
    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }
      
      .header h1 {
        font-size: 1.5rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .btn {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <a href="admin.html" class="back-link">← Back to Admin</a>
  
  <div class="header">
    <h1>📅 Meets Dashboard</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="location.reload()">🔄 Refresh</button>
      <a href="admin.html" class="btn btn-primary">← Admin Dashboard</a>
    </div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="total-meets">0</div>
      <div class="stat-label">Total Meets</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="meets-needing">0</div>
      <div class="stat-label">Need Results</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="meets-with-results">0</div>
      <div class="stat-label">Have Results</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="completion-percent">0%</div>
      <div class="stat-label">Completion Rate</div>
    </div>
  </div>
  
  <div class="content-grid">
    <!-- Meets Needing Results -->
    <div class="section">
      <div class="section-header">
        <h2>⚠️ Meets Needing Results</h2>
        <span class="badge" id="need-count">0</span>
      </div>
      <div class="section-content" id="needs-results-section">
        <div class="loading-state">Loading meets...</div>
      </div>
    </div>
    
    <!-- Schedule -->
    <div class="section">
      <div class="section-header">
        <h2>📆 Upcoming Schedule</h2>
        <span class="badge" id="schedule-count">0</span>
      </div>
      <div class="filter-bar" style="padding: 0 20px; margin-top: 12px;">
        <input type="text" id="schedule-filter" class="filter-input" placeholder="Filter by location..." />
      </div>
      <div class="section-content" id="schedule-section">
        <div class="loading-state">Loading schedule...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  // School coordinates for weather (from weather.html)
  const schoolCoordinatesMap = {
    'grafton high school': { lat: 39.34, lon: -80.03, city: 'Grafton' },
    'parkersburg high school': { lat: 39.27, lon: -81.56, city: 'Parkersburg' },
    'parkersburg south high school': { lat: 39.27, lon: -81.56, city: 'Parkersburg' },
    'morgantown high school': { lat: 39.64, lon: -79.96, city: 'Morgantown' },
    'bridgeport high school': { lat: 39.29, lon: -80.26, city: 'Bridgeport' },
    'buckhannon-upshur high school': { lat: 38.99, lon: -80.23, city: 'Buckhannon' },
    'cabell midland high school': { lat: 38.54, lon: -82.45, city: 'Huntington' },
    'capital high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'george washington high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'hedgesville high school': { lat: 39.18, lon: -78.05, city: 'Hedgesville' },
    'huntington high school': { lat: 38.42, lon: -82.45, city: 'Huntington' },
    'hurricane high school': { lat: 38.49, lon: -82.48, city: 'Hurricane' },
    'jefferson high school': { lat: 39.33, lon: -77.74, city: 'Harpers Ferry' },
    'martinsburg high school': { lat: 39.47, lon: -77.97, city: 'Martinsburg' },
    'musselman high school': { lat: 39.48, lon: -78.03, city: 'Inwood' },
    'oak hill high school': { lat: 38.41, lon: -81.60, city: 'Oak Hill' },
    'preston high school': { lat: 39.34, lon: -80.03, city: 'Kingwood' },
    'riverside high school': { lat: 38.46, lon: -81.75, city: 'Williamson' },
    'spring mills high school': { lat: 39.47, lon: -77.97, city: 'Martinsburg' },
    'spring valley high school': { lat: 38.42, lon: -82.45, city: 'Huntington' },
    'st albans high school': { lat: 38.54, lon: -81.83, city: 'Saint Albans' },
    'university high school': { lat: 39.64, lon: -79.96, city: 'Morgantown' },
    'washington high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'wheeling park high school': { lat: 40.07, lon: -80.71, city: 'Wheeling' },
    'woodrow wilson high school': { lat: 37.78, lon: -81.19, city: 'Beckley' },
    'doddridge county high school': { lat: 39.29, lon: -80.77, city: 'West Union' },
    'butcher bend': { lat: 39.17, lon: -81.51, city: 'Mineral Wells'},
    'laidley field': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'john marshall high school': { lat: 39.94, lon: -80.75, city: 'Glen Dale' }
  };
  
  function getWeatherIcon(code) {
    const iconMap = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌧️', 55: '🌧️', 61: '🌧️', 63: '🌧️', 65: '⛈️',
      71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️', 80: '🌧️', 81: '⛈️',
      82: '⛈️', 85: '🌨️', 86: '🌨️', 95: '⛈️', 96: '⛈️', 99: '⛈️'
    };
    return iconMap[code] || '❓';
  }
  
  function getWeatherDescription(code) {
    const descMap = {
      0: 'Clear', 1: 'Mostly Clear', 2: 'Partly Cloudy', 3: 'Overcast', 45: 'Foggy', 48: 'Foggy',
      51: 'Light Drizzle', 53: 'Drizzle', 55: 'Heavy Drizzle', 61: 'Light Rain', 63: 'Rain', 65: 'Heavy Rain',
      71: 'Light Snow', 73: 'Snow', 75: 'Heavy Snow', 77: 'Snow', 80: 'Light Showers', 81: 'Showers',
      82: 'Heavy Showers', 85: 'Snow Showers', 86: 'Heavy Snow Showers', 95: 'Thunderstorm',
      96: 'Hail Thunderstorm', 99: 'Hail Thunderstorm'
    };
    return descMap[code] || 'Unknown';
  }
  
  async function fetchWeatherData(lat, lon) {
    try {
      const response = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max&temperature_unit=fahrenheit&timezone=auto`
      );
      const data = await response.json();
      
      if (data.daily && data.daily.time.length > 0) {
        const todayIndex = 0;
        return {
          maxTemp: Math.round(data.daily.temperature_2m_max[todayIndex]),
          minTemp: Math.round(data.daily.temperature_2m_min[todayIndex]),
          weatherCode: data.daily.weather_code[todayIndex],
          precipitation: Math.round(data.daily.precipitation_sum[todayIndex] * 100) / 100,
          windSpeed: Math.round(data.daily.wind_speed_10m_max[todayIndex])
        };
      }
    } catch (error) {
      console.error('Weather fetch error:', error);
    }
    return null;
  }
  
  async function loadData() {
    try {
      const [meetsSnap, resultsSnap] = await Promise.all([
        firebase.database().ref('Track/meets').once('value'),
        firebase.database().ref('Track/results').once('value')
      ]);
      
      const meets = [];
      const resultsByMeetId = {};
      
      meetsSnap.forEach(child => {
        meets.push({ id: child.key, ...child.val() });
      });
      
      resultsSnap.forEach(child => {
        const result = child.val();
        if (!resultsByMeetId[result.meet_id]) {
          resultsByMeetId[result.meet_id] = 0;
        }
        resultsByMeetId[result.meet_id]++;
      });
      
      // Separate meets into two categories
      const needsResults = meets.filter(m => !resultsByMeetId[m.id] || resultsByMeetId[m.id] === 0);
      const withResults = meets.filter(m => resultsByMeetId[m.id] && resultsByMeetId[m.id] > 0);
      
      // Sort by date
      const sorted = meets.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      // Update stats
      const total = meets.length;
      const needing = needsResults.length;
      const haveResults = withResults.length;
      const completionPercent = total > 0 ? Math.round((haveResults / total) * 100) : 0;
      
      document.getElementById('total-meets').textContent = total;
      document.getElementById('meets-needing').textContent = needing;
      document.getElementById('meets-with-results').textContent = haveResults;
      document.getElementById('completion-percent').textContent = completionPercent + '%';
      
      // Render meets needing results
      await renderNeedsResults(needsResults);
      
      // Render schedule
      renderSchedule(sorted);
      
    } catch (error) {
      console.error('Error loading data:', error);
      document.getElementById('needs-results-section').innerHTML = 
        `<div class="empty-state" style="color: var(--danger);">Error loading meets. Please try again.</div>`;
    }
  }
  
  async function renderNeedsResults(needsResults) {
    const container = document.getElementById('needs-results-section');
    document.getElementById('need-count').textContent = needsResults.length;
    
    if (needsResults.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size: 3rem; margin-bottom: 12px;">✅</div>
          <p style="margin: 0;">All meets have results!</p>
        </div>
      `;
      return;
    }
    
    const meetsHTML = await Promise.all(needsResults.map(async (meet) => {
      // Get weather for this meet's location
      const normalizedLocation = meet.location?.toLowerCase().trim();
      const coords = schoolCoordinatesMap[normalizedLocation];
      let weather = null;
      
      if (coords) {
        weather = await fetchWeatherData(coords.lat, coords.lon);
      }
      
      const meetDate = new Date(meet.date);
      const dateStr = meetDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      
      return `
        <div class="meet-item">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
            <div class="meet-name">${meet.name}</div>
            <span class="need-results">Need Results</span>
          </div>
          
          <div class="meet-details">
            <div class="meet-detail">
              <strong>📅 Date:</strong><br>${dateStr}
            </div>
            <div class="meet-detail">
              <strong>📍 Location:</strong><br>${meet.location || 'TBA'}
            </div>
          </div>
          
          ${weather ? `
            <div class="weather-info">
              <div class="weather-icon">${getWeatherIcon(weather.weatherCode)}</div>
              <div>
                <div class="weather-condition">${getWeatherDescription(weather.weatherCode)}</div>
                <div class="temperature">${weather.maxTemp}°F / ${weather.minTemp}°F</div>
                <div style="font-size: 0.8rem; color: var(--muted); margin-top: 2px;">
                  💨 ${weather.windSpeed} mph | 💧 ${weather.precipitation}"
                </div>
              </div>
            </div>
          ` : ''}
          
          <div style="margin-top: 12px;">
            <a href="csv-import.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">
              ➕ Add Results →
            </a>
          </div>
        </div>
      `;
    }));
    
    container.innerHTML = meetsHTML.join('');
  }
  
  function renderSchedule(meets) {
    const container = document.getElementById('schedule-section');
    document.getElementById('schedule-count').textContent = meets.length;
    
    if (meets.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p style="margin: 0;">No meets scheduled.</p>
        </div>
      `;
      return;
    }
    
    const scheduleHTML = meets.map(meet => {
      const meetDate = new Date(meet.date);
      const day = meetDate.getDate();
      const month = meetDate.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
      
      return `
        <div class="schedule-item">
          <div class="schedule-date">
            <div class="schedule-date-day">${day}</div>
            <div class="schedule-date-month">${month}</div>
          </div>
          <div class="schedule-info">
            <div class="schedule-name">${meet.name}</div>
            <div class="schedule-location">📍 ${meet.location || 'TBA'}</div>
            <div>
              <span class="schedule-season">${meet.season || 'outdoor'}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = scheduleHTML;
    
    // Add filter functionality
    const filterInput = document.getElementById('schedule-filter');
    filterInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const items = container.querySelectorAll('.schedule-item');
      
      items.forEach(item => {
        const location = item.querySelector('.schedule-location').textContent.toLowerCase();
        const name = item.querySelector('.schedule-name').textContent.toLowerCase();
        
        if (location.includes(query) || name.includes(query)) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
    });
  }
  
  // Load data when page is ready
  document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
