<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="/assets/msm-loader.css" />
  <title>Meets Dashboard - Track Admin</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --bg: radial-gradient(circle at top left, #101425 0%, #050712 35%, #020308 100%);
      --panel: rgba(8, 12, 26, 0.96);
      --card: rgba(18, 24, 44, 0.96);
      --accent: #ff7b2d;
      --accent-hover: #ff9a4f;
      --muted: #9fb4c8;
      --border: rgba(255,255,255,0.08);
      --hover: rgba(255,255,255,0.06);
      --success: #22c55e;
      --danger: #f97373;
      --warning: #eab308;
      --info: #38bdf8;
      --shadow-soft: 0 18px 45px rgba(0,0,0,0.55);
      --radius-lg: 18px;
    }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020308;
      background-image: var(--bg);
      color: #e6f0f7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--hover); color: #fff; }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin: 0; }
    .stat-label { color: var(--muted); font-size: 0.9rem; margin: 8px 0 0; }
    
    /* Main Layout Grid */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto auto;
      gap: 24px;
    }
    
    .section {
      background: linear-gradient(135deg, rgba(21, 32, 63, 0.95), rgba(11, 18, 34, 0.97));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft);
    }
    
    .section-header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-header h2 { margin: 0; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-content { flex: 1; padding: 20px; overflow-y: auto; }
    
    /* Map & Calendar Specifics */
    .map-container { height: 400px; width: 100%; border-radius: 0 0 var(--radius-lg) var(--radius-lg); z-index: 1;}
    .calendar-container { grid-column: 1 / -1; padding: 20px; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); }
    
    /* FullCalendar Dark Mode Overrides */
    .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border) !important; }
    .fc .fc-toolbar-title { font-size: 1.2rem !important; color: #fff; }
    .fc .fc-button-primary { background-color: var(--panel) !important; border-color: var(--border) !important; color: #fff !important; text-transform: capitalize; }
    .fc .fc-button-primary:hover { background-color: var(--hover) !important; border-color: var(--accent) !important; }
    .fc .fc-button-primary:not(:disabled):active, .fc .fc-button-primary:not(:disabled).fc-button-active { background-color: var(--accent) !important; border-color: var(--accent) !important; }
    .fc .fc-daygrid-day-number { color: var(--muted); text-decoration: none; }
    .fc .fc-col-header-cell-cushion { color: var(--muted); text-decoration: none; padding: 8px; }
    .fc-event { cursor: pointer; border: none !important; border-radius: 4px; padding: 2px 4px; font-size: 0.8rem; }
    .fc-event-future { background-color: var(--info) !important; color: #000 !important; }
    .fc-event-past-no-results { background-color: var(--danger) !important; color: #fff !important; }
    .fc-event-past-results { background-color: var(--success) !important; color: #fff !important; }
    .fc .fc-day-today { background-color: rgba(255, 123, 45, 0.1) !important; }

    /* Meet List Items */
    .needs-results-list { max-height: 400px; overflow-y: auto; padding-right: 8px; }
    .needs-results-list::-webkit-scrollbar { width: 6px; }
    .needs-results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    .meet-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .meet-item:hover { background: var(--hover); border-color: var(--danger); transform: translateX(-4px); }
    .meet-name { font-weight: 700; font-size: 1rem; margin-bottom: 8px; color: #fff; }
    
    .meet-details { display: grid; grid-template-columns: 1fr; gap: 8px; font-size: 0.85rem; margin-bottom: 12px; }
    .meet-detail { color: var(--muted); }
    .meet-detail strong { color: #fff; }
    
    .need-results { display: inline-block; padding: 4px 8px; background: rgba(249, 115, 115, 0.2); color: var(--danger); border: 1px solid var(--danger); border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    
    .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); }
    .badge { display: inline-block; padding: 4px 10px; background: rgba(255, 123, 45, 0.2); border: 1px solid var(--accent); border-radius: 20px; font-size: 0.85rem; color: var(--accent); font-weight: 600; }
    
    /* Leaflet popup dark mode styling */
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: var(--panel); color: #fff; border: 1px solid var(--border); }
    .leaflet-popup-content { margin: 12px; font-family: 'Inter', sans-serif; }
    .popup-title { font-weight: bold; color: var(--accent); margin-bottom: 4px; }
    .popup-date { font-size: 0.8rem; color: var(--muted); }

    @media (max-width: 1024px) {
      .dashboard-layout { grid-template-columns: 1fr; }
      .calendar-container { grid-column: 1; }
    }
  </style>
</head>
<body>
<script src="/assets/msm-loader.js"></script>

<div class="container">
  <div class="header">
    <h1>📅 Meets Dashboard</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="location.reload()">🔄 Refresh</button>
      <a href="admin.html" class="btn btn-primary">← Admin Home</a>
    </div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="total-meets">0</div>
      <div class="stat-label">Total Meets</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="meets-needing" style="color: var(--danger);">0</div>
      <div class="stat-label">Action Required (Past/Today)</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="meets-with-results" style="color: var(--success);">0</div>
      <div class="stat-label">Have Results</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="completion-percent">0%</div>
      <div class="stat-label">Completion Rate</div>
    </div>
  </div>
  
  <div class="dashboard-layout">
    
    <div class="section">
      <div class="section-header">
        <h2>🗺️ Meet Locations</h2>
      </div>
      <div id="map" class="map-container"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>⚠️ Action Required</h2>
        <span class="badge" id="need-count" style="background: rgba(249,115,115,0.2); border-color: var(--danger); color: var(--danger);">0</span>
      </div>
      <div class="section-content needs-results-list" id="needs-results-section">
        <div class="empty-state">Loading action items...</div>
      </div>
    </div>

    <div class="calendar-container">
       <div id="calendar"></div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  // School coordinates for map
  const schoolCoordinatesMap = {
    'grafton high school': { lat: 39.34, lon: -80.03, city: 'Grafton' },
    'parkersburg high school': { lat: 39.27, lon: -81.56, city: 'Parkersburg' },
    'parkersburg south high school': { lat: 39.27, lon: -81.56, city: 'Parkersburg' },
    'morgantown high school': { lat: 39.64, lon: -79.96, city: 'Morgantown' },
    'bridgeport high school': { lat: 39.29, lon: -80.26, city: 'Bridgeport' },
    'buckhannon-upshur high school': { lat: 38.99, lon: -80.23, city: 'Buckhannon' },
    'cabell midland high school': { lat: 38.54, lon: -82.45, city: 'Huntington' },
    'capital high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'george washington high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'hedgesville high school': { lat: 39.18, lon: -78.05, city: 'Hedgesville' },
    'huntington high school': { lat: 38.42, lon: -82.45, city: 'Huntington' },
    'hurricane high school': { lat: 38.49, lon: -82.48, city: 'Hurricane' },
    'jefferson high school': { lat: 39.33, lon: -77.74, city: 'Harpers Ferry' },
    'martinsburg high school': { lat: 39.47, lon: -77.97, city: 'Martinsburg' },
    'musselman high school': { lat: 39.48, lon: -78.03, city: 'Inwood' },
    'oak hill high school': { lat: 38.41, lon: -81.60, city: 'Oak Hill' },
    'preston high school': { lat: 39.34, lon: -80.03, city: 'Kingwood' },
    'riverside high school': { lat: 38.46, lon: -81.75, city: 'Williamson' },
    'spring mills high school': { lat: 39.47, lon: -77.97, city: 'Martinsburg' },
    'spring valley high school': { lat: 38.42, lon: -82.45, city: 'Huntington' },
    'st albans high school': { lat: 38.54, lon: -81.83, city: 'Saint Albans' },
    'university high school': { lat: 39.64, lon: -79.96, city: 'Morgantown' },
    'washington high school': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'wheeling park high school': { lat: 40.07, lon: -80.71, city: 'Wheeling' },
    'woodrow wilson high school': { lat: 37.78, lon: -81.19, city: 'Beckley' },
    'doddridge county high school': { lat: 39.29, lon: -80.77, city: 'West Union' },
    'butcher bend': { lat: 39.17, lon: -81.51, city: 'Mineral Wells'},
    'laidley field': { lat: 38.35, lon: -81.64, city: 'Charleston' },
    'john marshall high school': { lat: 39.94, lon: -80.75, city: 'Glen Dale' }
  };
  
  let map;
  
  function initMap() {
    // Center initially on WV
    map = L.map('map').setView([38.8, -80.5], 6);
    // Dark mode map tiles via CartoDB
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);
  }

  async function loadData() {
    try {
      const [meetsSnap, resultsSnap] = await Promise.all([
        firebase.database().ref('Track/meets').once('value'),
        firebase.database().ref('Track/results').once('value')
      ]);
      
      const meets = [];
      const resultsByMeetId = {};
      
      meetsSnap.forEach(child => {
        meets.push({ id: child.key, ...child.val() });
      });
      
      resultsSnap.forEach(child => {
        const result = child.val();
        if (!resultsByMeetId[result.meet_id]) {
          resultsByMeetId[result.meet_id] = 0;
        }
        resultsByMeetId[result.meet_id]++;
      });

      // Get Start of Today for comparisons
      const now = new Date();
      const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      
      // Separate meets
      const needsResultsPastOrToday = meets.filter(m => {
        const noResults = !resultsByMeetId[m.id] || resultsByMeetId[m.id] === 0;
        // Parse date safely
        const meetDateObj = new Date(m.date + 'T00:00:00');
        const mTime = isNaN(meetDateObj.getTime()) ? new Date(m.date).getTime() : meetDateObj.getTime();
        
        return noResults && (mTime <= todayMidnight);
      });
      
      const withResults = meets.filter(m => resultsByMeetId[m.id] && resultsByMeetId[m.id] > 0);
      
      // Update stats
      const total = meets.length;
      const needing = needsResultsPastOrToday.length;
      const haveResults = withResults.length;
      const completionPercent = total > 0 ? Math.round((haveResults / total) * 100) : 0;
      
      document.getElementById('total-meets').textContent = total;
      document.getElementById('meets-needing').textContent = needing;
      document.getElementById('meets-with-results').textContent = haveResults;
      document.getElementById('completion-percent').textContent = completionPercent + '%';
      
      renderNeedsResults(needsResultsPastOrToday);
      renderMap(meets, resultsByMeetId, todayMidnight);
      renderCalendar(meets, resultsByMeetId, todayMidnight);
      
    } catch (error) {
      console.error('Error loading data:', error);
      document.getElementById('needs-results-section').innerHTML = 
        `<div class="empty-state" style="color: var(--danger);">Error connecting to database.</div>`;
    } finally {
      document.dispatchEvent(new Event("MSMDataLoaded"));
    }
  }
  
  function renderNeedsResults(needsResults) {
    const container = document.getElementById('needs-results-section');
    document.getElementById('need-count').textContent = needsResults.length;
    
    // Sort by oldest first so longest-missing results are at the top
    needsResults.sort((a, b) => new Date(a.date) - new Date(b.date));

    if (needsResults.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size: 3rem; margin-bottom: 12px;">🎉</div>
          <p style="margin: 0;">You're all caught up!<br>No past meets are missing results.</p>
        </div>
      `;
      return;
    }
    
    const meetsHTML = needsResults.map((meet) => {
      const meetDate = new Date(meet.date + 'T00:00:00');
      const dateStr = !isNaN(meetDate.getTime()) ? meetDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : meet.date;
      
      return `
        <div class="meet-item">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <div class="meet-name">${meet.name}</div>
            <span class="need-results">Action</span>
          </div>
          <div class="meet-details">
            <div class="meet-detail">📅 ${dateStr}</div>
            <div class="meet-detail">📍 ${meet.location || 'TBA'}</div>
          </div>
          <div>
            <a href="csv-import.html" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem;">
              ➕ Import Results →
            </a>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = meetsHTML.join('');
  }

  function renderMap(meets, resultsByMeetId, todayMidnight) {
    // Clear existing markers if re-rendering
    map.eachLayer((layer) => {
      if (layer instanceof L.Marker) { map.removeLayer(layer); }
    });

    const bounds = [];

    meets.forEach(meet => {
      const normalizedLocation = meet.location?.toLowerCase().trim();
      const coords = schoolCoordinatesMap[normalizedLocation];
      
      if (coords) {
        const hasResults = resultsByMeetId[meet.id] && resultsByMeetId[meet.id] > 0;
        const mTime = new Date(meet.date + 'T00:00:00').getTime();
        const isPastOrToday = mTime <= todayMidnight;

        // Determine pin color based on status
        let pinColor = '#38bdf8'; // Blue for future
        if (isPastOrToday && !hasResults) pinColor = '#f97373'; // Red for action needed
        if (hasResults) pinColor = '#22c55e'; // Green for done

        const markerHtmlStyles = `
          background-color: ${pinColor};
          width: 1rem;
          height: 1rem;
          display: block;
          left: -0.5rem;
          top: -0.5rem;
          position: relative;
          border-radius: 1rem 1rem 0;
          transform: rotate(45deg);
          border: 1px solid #FFFFFF;
          box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        `;

        const customIcon = L.divIcon({
          className: "custom-pin",
          iconAnchor: [0, 12],
          labelAnchor: [-6, 0],
          popupAnchor: [0, -20],
          html: `<span style="${markerHtmlStyles}"></span>`
        });

        const marker = L.marker([coords.lat, coords.lon], { icon: customIcon }).addTo(map);
        
        let statusBadge = hasResults ? '✅ Has Results' : (isPastOrToday ? '⚠️ Needs Results' : '⏳ Upcoming');
        
        marker.bindPopup(`
          <div class="popup-title">${meet.name}</div>
          <div class="popup-date">${meet.date}</div>
          <div style="margin-top:6px; font-size:0.8rem;">${statusBadge}</div>
        `);

        bounds.push([coords.lat, coords.lon]);
      }
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [30, 30] });
    }
  }
  
  function renderCalendar(meets, resultsByMeetId, todayMidnight) {
    const calendarEl = document.getElementById('calendar');
    
    const events = meets.map(meet => {
      const hasResults = resultsByMeetId[meet.id] && resultsByMeetId[meet.id] > 0;
      const mTime = new Date(meet.date + 'T00:00:00').getTime();
      const isPastOrToday = mTime <= todayMidnight;

      let className = 'fc-event-future'; // default
      if (hasResults) className = 'fc-event-past-results';
      else if (isPastOrToday) className = 'fc-event-past-no-results';

      return {
        title: meet.name,
        start: meet.date,
        classNames: [className],
        extendedProps: {
            location: meet.location
        }
      };
    });

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,listWeek'
      },
      events: events,
      eventClick: function(info) {
        alert('Meet: ' + info.event.title + '\nLocation: ' + (info.event.extendedProps.location || 'TBA'));
      }
    });
    
    calendar.render();
  }
  
  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    initMap();
    loadData();
  });
</script>

</body>
</html>
