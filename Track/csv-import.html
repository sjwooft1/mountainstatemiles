<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Meet Import Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0c1424;
  --panel:#111c32;
  --card:#162540;
  --accent:#ff5722;
  --accent2:#ff784e;
  --success:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#e6edf7;
  --muted:#9fb4c8;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:1300px;
  margin:auto;
  padding:40px 20px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  margin-bottom:24px;
}
h1{
  font-size:2.2rem;
  font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
textarea, select{
  width:100%;
  padding:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:.95rem;
}
textarea{
  min-height:250px;
  resize:vertical;
  font-family:monospace;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
.btn-primary{
  background:var(--accent);
  color:white;
}
.btn-primary:hover{
  background:var(--accent2);
}
.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:18px;
}
.stat{
  background:var(--card);
  padding:18px;
  border-radius:10px;
  text-align:center;
}
.stat-number{
  font-size:1.7rem;
  font-weight:700;
}
.preview-table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
.preview-table th,
.preview-table td{
  padding:8px;
  border-bottom:1px solid var(--border);
  font-size:.82rem;
  text-align: left;
}
.preview-table th{
  text-transform:uppercase;
  color:var(--muted);
}
.progress{
  height:8px;
  background:var(--card);
  border-radius:6px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;
  transition:.3s;
}
.error{color:var(--danger)}
.success{color:var(--success)}
.warning{color:var(--warning)}
</style>
</head>
<body>
<div class="container">

<h1>Meet Results Import Engine</h1>

<div class="card">
<h3>Select Meet</h3>
<select id="meetSelect">
<option value="">Loading meets...</option>
</select>
</div>

<div class="card">
<h3>Paste Full Meet Results (CSV)</h3>
<textarea id="pasteArea" placeholder="Paste data from the Ultimate Scraper here..."></textarea>
<br><br>
<button class="btn-primary" onclick="parseMeet()">Parse Results</button>
</div>

<div class="card" id="previewCard" style="display:none">
<h3>Validation Summary</h3>
<div id="stats"></div>
<div id="preview"></div>
</div>

<div class="card" id="importCard" style="display:none">
<h3>Import to Database</h3>
<p style="color:var(--muted); font-size:0.9rem;">This process will automatically create new athlete profiles if they do not exist in the database.</p>
<div class="progress"><div id="progressFill" class="progress-fill"></div></div>
<br>
<button class="btn-primary btn-import" onclick="importMeet()">Import Valid Results</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let parsedRows = [];
let validRows = [];
let eventMap = {};
let athletesCache = {}; 

async function loadMeets() {
    const snap = await firebase.database().ref("Track/meets").once("value");
    const sel = document.getElementById("meetSelect");
    sel.innerHTML = "<option value=''>Select Meet</option>";
    snap.forEach(c => { sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`; });
}

async function loadDatabaseCaches() {
    const eventsSnap = await firebase.database().ref("Track/events").once("value");
    eventsSnap.forEach(c => {
        eventMap[c.val().name.toLowerCase()] = c.key;
    });

    const athletesSnap = await firebase.database().ref("Track/athletes").once("value");
    athletesSnap.forEach(c => {
        const a = c.val();
        const key = `${(a.school || "").toLowerCase()}|${(a.first_name + " " + a.last_name).toLowerCase()}`;
        athletesCache[key] = c.key;
    });
}

function resolveEventId(eventName, gender) {
    if (!eventName) return null;
    let clean = eventName.toLowerCase()
        .replace(/[^a-z0-9\s]/g, " ") 
        .replace(/\b(meter|meters)\b/g, "m")
        .replace(/\b(open|varsity|finals?|prelims?|timed|dash|run|results)\b/g, "")
        .replace(/\s+/g, " ")
        .trim();

    let parts = clean.split(" ");
    let reconstructed = parts.map(p => {
        if (!isNaN(p) && !p.endsWith("m") && p.length <= 4) return p + "m";
        return p;
    }).join(" ");

    // Ensure we match the DB's gender prefix
    let genderPrefix = gender === "W" ? "girls" : "boys";
    let target = reconstructed.startsWith("boys") || reconstructed.startsWith("girls") 
        ? reconstructed 
        : (genderPrefix + " " + reconstructed);

    if (eventMap[target]) return eventMap[target];

    for (let [dbName, id] of Object.entries(eventMap)) {
        if (dbName === target || dbName.includes(target) || target.includes(dbName)) return id;
    }
    return null;
}

function parseCSVLine(text) {
    let ret = [], inQuote = false, val = "";
    for (let i = 0; i < text.length; i++) {
        let c = text[i];
        if (inQuote) {
            if (c === '"') {
                if (i < text.length - 1 && text[i+1] === '"') { val += '"'; i++; } 
                else { inQuote = false; }
            } else { val += c; }
        } else {
            if (c === '"') { inQuote = true; }
            else if (c === ',') { ret.push(val.trim()); val = ""; }
            else { val += c; }
        }
    }
    ret.push(val.trim());
    return ret;
}

async function parseMeet() {
    const meetId = document.getElementById("meetSelect").value;
    const text = document.getElementById("pasteArea").value.trim();
    if (!meetId || !text) return alert("Select meet and paste text");

    parsedRows = [];
    validRows = [];
    
    const lines = text.split(/\n/);
    
    lines.forEach((line, index) => {
        if (index === 0 && line.includes("event_name")) return; // Skip header
        if (line.length < 5) return;

        const parts = parseCSVLine(line);
        if (parts.length < 5) return;

        const eventFull = parts[0] ? parts[0].replace(/"/g, "").trim() : "";
        const place = parts[1] ? parts[1].replace(/"/g, "").trim() : "";
        const grade = parts[2] ? parts[2].replace(/"/g, "").trim() : "";
        const name = parts[3] ? parts[3].replace(/"/g, "").trim() : "";
        const mark = parts[4] ? parts[4].replace(/"/g, "").trim() : "";
        const school = parts[5] ? parts[5].replace(/"/g, "").trim() : "Unattached";
        const rawGender = parts[7] ? parts[7].replace(/"/g, "").trim() : "Boys";

        // --- GENDER FIX ---
        // Force mapping "Girls/Women" to "W" and everything else to "M"
        let cleanGender = "M"; 
        if (rawGender.toLowerCase().includes("girl") || rawGender.toLowerCase().includes("women") || rawGender.toLowerCase().startsWith("w")) {
            cleanGender = "W";
        }

        // --- HEAT FIX ---
        // Set heat strictly based on if the event name says "Prelim"
        const heatStatus = eventFull.toLowerCase().includes("prelim") ? "Prelims" : "Finals";

        const eventId = resolveEventId(eventFull, cleanGender);

        parsedRows.push({
            meet_id: meetId,
            event_name: eventFull,
            event_id: eventId,
            athlete_name: name,
            school: school,
            grade: grade,
            mark: mark,
            placement: place,
            heat: heatStatus,     // Overwritten to Prelims/Finals
            gender: cleanGender,  // Overwritten to strictly M or W
            valid: !!eventId
        });
    });

    validRows = parsedRows.filter(r => r.valid);
    renderPreview();
}

function renderPreview() {
    document.getElementById("previewCard").style.display = "block";
    document.getElementById("importCard").style.display = "block";
    
    document.getElementById("stats").innerHTML = `
        <div class="stat-grid">
            <div class="stat"><div class="stat-number">${parsedRows.length}</div>Rows</div>
            <div class="stat"><div class="stat-number success">${validRows.length}</div>Ready</div>
            <div class="stat"><div class="stat-number error">${parsedRows.length - validRows.length}</div>Missing Events</div>
        </div>`;

    document.getElementById("preview").innerHTML = `
        <table class="preview-table">
            <thead><tr><th>Event</th><th>Place</th><th>Heat/Round</th><th>Name</th><th>School</th><th>Mark</th><th>Gender</th><th>Status</th></tr></thead>
            <tbody>
                ${parsedRows.slice(0, 50).map(r => `
                    <tr style="${!r.valid ? 'background:rgba(239,68,68,0.1)' : ''}">
                        <td><small>${r.event_name}</small></td>
                        <td>${r.placement}</td>
                        <td>${r.heat}</td>
                        <td><strong>${r.athlete_name}</strong></td>
                        <td><small>${r.school}</small></td>
                        <td><strong>${r.mark}</strong></td>
                        <td>${r.gender}</td>
                        <td>${r.valid ? '✅' : '❌'}</td>
                    </tr>`).join("")}
            </tbody>
        </table>
        ${parsedRows.length > 50 ? `<p style="text-align:center; color:var(--muted); margin-top:10px;">Showing first 50 of ${parsedRows.length} rows</p>` : ''}`;
}

async function importMeet() {
    if (!validRows.length) return alert("No valid rows to import");
    if (!confirm(`Import ${validRows.length} results? Athletes will be automatically linked or created.`)) return;
    
    const btn = document.querySelector(".btn-import");
    btn.disabled = true;
    
    const resultsRef = firebase.database().ref("Track/results");
    const athletesRef = firebase.database().ref("Track/athletes");

    for (let i = 0; i < validRows.length; i++) {
        const row = validRows[i];
        
        // --- 1. RESOLVE OR CREATE ATHLETE ---
        const cacheKey = `${row.school.toLowerCase()}|${row.athlete_name.toLowerCase()}`;
        let athleteId = athletesCache[cacheKey];

        if (!athleteId) {
            const nameParts = row.athlete_name.split(' ');
            const first = nameParts[0];
            const last = nameParts.slice(1).join(' ');
            
            const newAthlete = await athletesRef.push({
                first_name: first,
                last_name: last,
                school: row.school,
                grade: row.grade,
                gender: row.gender // Perfectly formatted M or W
            });
            
            athleteId = newAthlete.key;
            athletesCache[cacheKey] = athleteId; 
        }

        // --- 2. PUSH CLEAN RESULT ---
        await resultsRef.push({
            meet_id: row.meet_id,
            event_id: row.event_id,
            athlete_id: athleteId,
            mark: row.mark,
            placement: row.placement ? parseInt(row.placement) : null,
            heat: row.heat,       // Will save exactly "Prelims" or "Finals"
            gender: row.gender,   // Will save exactly "M" or "W"
            timestamp: new Date().toISOString()
        });

        document.getElementById("progressFill").style.width = Math.round(((i+1)/validRows.length)*100) + "%";
    }
    
    alert("Import Complete!");
    location.reload();
}

loadMeets();
loadDatabaseCaches();
</script>
</body>
</html>
