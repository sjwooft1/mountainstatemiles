<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Admin — Advanced Results Import</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2d;
  --card:#16223a;
  --accent:#ff5722;
  --accent2:#ff7b42;
  --success:#28a745;
  --danger:#dc3545;
  --warning:#ffc107;
  --text:#e8f1ff;
  --muted:#9fb4c8;
  --border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:30px;
  margin-bottom:24px;
}
h1{
  font-weight:800;
  font-size:2.3rem;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
h2{
  margin-top:0;
  font-size:1.3rem;
}
select, textarea, input{
  width:100%;
  padding:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:0.95rem;
}
textarea{
  min-height:200px;
  resize:vertical;
  font-family:monospace;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
.btn-primary{
  background:var(--accent);
  color:white;
}
.btn-primary:hover{
  background:var(--accent2);
}
.btn-secondary{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
}
.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.stat{
  background:var(--card);
  padding:20px;
  border-radius:8px;
  text-align:center;
}
.stat-number{
  font-size:1.8rem;
  font-weight:700;
}
.preview-table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
.preview-table th,
.preview-table td{
  padding:10px;
  border-bottom:1px solid var(--border);
  font-size:0.85rem;
}
.preview-table th{
  color:var(--muted);
  text-transform:uppercase;
}
.alert{
  padding:14px;
  border-radius:8px;
  margin-bottom:12px;
}
.success{background:rgba(40,167,69,.1);border:1px solid rgba(40,167,69,.3)}
.error{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.3)}
.warning{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3)}
.progress-bar{
  height:8px;
  background:var(--card);
  border-radius:6px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;
  transition:.3s;
}
</style>
</head>
<body>
<div class="container">

<h1>Advanced Results Import</h1>

<!-- STEP 1 -->
<div class="card">
<h2>Step 1 — Select Meet & Event</h2>
<select id="meetSelect"></select>
<br><br>
<select id="eventSelect">
<option value="">Select event (required)</option>
</select>
</div>

<!-- STEP 2 -->
<div class="card">
<h2>Step 2 — Paste Results</h2>
<textarea id="pasteArea" placeholder="Paste Athletic.net table or CSV here..."></textarea>
<br><br>
<button class="btn-primary" onclick="parseData()">Parse & Validate</button>
</div>

<!-- PREVIEW -->
<div class="card" id="previewCard" style="display:none">
<h2>Step 3 — Validation & Preview</h2>
<div id="stats"></div>
<div id="alerts"></div>
<div id="previewTable"></div>
</div>

<!-- IMPORT -->
<div class="card" id="importCard" style="display:none">
<h2>Step 4 — Import</h2>
<div id="progressContainer"></div>
<br>
<button class="btn-primary" onclick="importData()">Import Valid Results</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let parsedRows=[]
let validRows=[]
let selectedMeet=null
let selectedEvent=null

const FIELD_EVENTS=[
"long jump","high jump","triple jump","pole vault",
"shot put","discus","javelin","hammer"
]

function isFieldEvent(name){
  return FIELD_EVENTS.some(e=>name.toLowerCase().includes(e))
}

function normalizeDistance(mark){
  if(!mark) return ""
  const m=mark.match(/(\d+)[^\d]+(\d+(?:\.\d+)?)/)
  if(!m) return mark.trim()
  return m[1]+"ft "+m[2]+"in"
}

function normalizeTime(mark){
  if(!mark) return ""
  return mark.replace(/[^\d\.\:]/g,"").trim()
}

function smartSplit(line){
  if(line.includes("\t")) return line.split("\t")
  if(line.includes(",")) return line.split(",")
  return line.trim().split(/\s{2,}/)
}

function parseData(){
  selectedMeet=document.getElementById("meetSelect").value
  selectedEvent=document.getElementById("eventSelect").value
  if(!selectedMeet||!selectedEvent){
    alert("Select meet and event first.")
    return
  }

  const text=document.getElementById("pasteArea").value.trim()
  if(!text){alert("Paste data first.");return}

  const lines=text.split(/\r?\n/).filter(l=>l.trim())
  parsedRows=[]
  validRows=[]
  let duplicates=new Set()

  lines.forEach((line,i)=>{
    const cols=smartSplit(line)
    if(cols.length<3) return

    let name=cols[1]?.trim()
    let mark=cols[3]?.trim()||cols[2]?.trim()
    let school=cols[4]||""
    let place=cols[0]?.replace(".","")

    if(!name) return

    if(isFieldEvent(selectedEvent)){
      mark=normalizeDistance(mark)
    }else{
      mark=normalizeTime(mark)
    }

    const key=name+"|"+mark
    const isDup=duplicates.has(key)
    duplicates.add(key)

    const row={
      name,mark,school,place,
      valid:!isDup && !!mark,
      error:isDup?"Duplicate entry":""
    }

    parsedRows.push(row)
    if(row.valid) validRows.push(row)
  })

  renderPreview()
}

function renderPreview(){
  document.getElementById("previewCard").style.display="block"
  document.getElementById("importCard").style.display="block"

  document.getElementById("stats").innerHTML=`
  <div class="stat-grid">
  <div class="stat"><div class="stat-number">${parsedRows.length}</div>Total</div>
  <div class="stat"><div class="stat-number" style="color:var(--success)">${validRows.length}</div>Valid</div>
  <div class="stat"><div class="stat-number" style="color:var(--danger)">${parsedRows.length-validRows.length}</div>Errors</div>
  </div>
  `

  const errors=parsedRows.filter(r=>!r.valid)
  document.getElementById("alerts").innerHTML=
    errors.length?`<div class="alert error">${errors.length} rows have issues.</div>`:""

  document.getElementById("previewTable").innerHTML=`
  <table class="preview-table">
  <thead>
  <tr><th>Name</th><th>Mark</th><th>Place</th><th>School</th><th>Status</th></tr>
  </thead>
  <tbody>
  ${parsedRows.slice(0,20).map(r=>`
  <tr style="${!r.valid?'opacity:.4':''}">
  <td>${r.name}</td>
  <td>${r.mark}</td>
  <td>${r.place||"-"}</td>
  <td>${r.school||"-"}</td>
  <td>${r.valid?"OK":r.error}</td>
  </tr>`).join("")}
  </tbody></table>
  `
}

async function importData(){
  const ref=firebase.database().ref("Track/results")
  let imported=0

  document.getElementById("progressContainer").innerHTML=
  `<div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>`

  for(let i=0;i<validRows.length;i++){
    const row=validRows[i]
    await ref.push({
      meet_id:selectedMeet,
      event_id:selectedEvent,
      athlete_name:row.name,
      mark:row.mark,
      placement:row.place||null,
      school:row.school||"",
      timestamp:new Date().toISOString()
    })
    imported++
    document.getElementById("progressFill").style.width=
      Math.round((imported/validRows.length)*100)+"%"
  }

  alert("Import complete: "+imported+" results added.")
}

async function loadData(){
  const meetSnap=await firebase.database().ref("Track/meets").once("value")
  const meetSelect=document.getElementById("meetSelect")
  meetSelect.innerHTML="<option value=''>Select meet</option>"
  meetSnap.forEach(c=>{
    meetSelect.innerHTML+=`<option value="${c.key}">${c.val().name}</option>`
  })

  const eventSnap=await firebase.database().ref("Track/events").once("value")
  const eventSelect=document.getElementById("eventSelect")
  eventSelect.innerHTML="<option value=''>Select event</option>"
  eventSnap.forEach(c=>{
    eventSelect.innerHTML+=`<option value="${c.key}">${c.val().name}</option>`
  })
}

loadData()
</script>
</body>
</html>
