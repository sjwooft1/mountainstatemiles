<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Meet Import Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0c1424;
  --panel:#111c32;
  --card:#162540;
  --accent:#ff5722;
  --accent2:#ff784e;
  --success:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#e6edf7;
  --muted:#9fb4c8;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}
.container{
  max-width:1300px;
  margin:auto;
  padding:40px 20px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  margin-bottom:24px;
}
h1{
  font-size:2.2rem;
  font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
textarea, select{
  width:100%;
  padding:12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:.95rem;
}
textarea{
  min-height:250px;
  resize:vertical;
  font-family:monospace;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
.btn-primary{
  background:var(--accent);
  color:white;
}
.btn-primary:hover{
  background:var(--accent2);
}
.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:18px;
}
.stat{
  background:var(--card);
  padding:18px;
  border-radius:10px;
  text-align:center;
}
.stat-number{
  font-size:1.7rem;
  font-weight:700;
}
.preview-table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
.preview-table th,
.preview-table td{
  padding:8px;
  border-bottom:1px solid var(--border);
  font-size:.82rem;
}
.preview-table th{
  text-transform:uppercase;
  color:var(--muted);
}
.progress{
  height:8px;
  background:var(--card);
  border-radius:6px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;
  transition:.3s;
}
.error{color:var(--danger)}
.success{color:var(--success)}
.warning{color:var(--warning)}
</style>
</head>
<body>
<div class="container">

<h1>Meet Results Import Engine</h1>

<div class="card">
<h3>Select Meet</h3>
<select id="meetSelect">
<option value="">Loading meets...</option>
</select>
</div>

<div class="card">
<h3>Paste Full Meet Results</h3>
<textarea id="pasteArea" placeholder="Paste entire Athletic.net boys or girls results here..."></textarea>
<br><br>
<button class="btn-primary" onclick="parseMeet()">Parse Meet</button>
</div>

<div class="card" id="previewCard" style="display:none">
<h3>Validation Summary</h3>
<div id="stats"></div>
<div id="preview"></div>
</div>

<div class="card" id="importCard" style="display:none">
<h3>Import</h3>
<div class="progress"><div id="progressFill" class="progress-fill"></div></div>
<br>
<button class="btn-primary" onclick="importMeet()">Import Valid Results</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let parsedRows=[]
let validRows=[]
let eventMap={}

const FIELD_KEYWORDS=[
"shot put","discus","javelin","hammer",
"long jump","triple jump","high jump","pole vault"
]

function isFieldEvent(name){
  if(!name) return false
  return FIELD_KEYWORDS.some(k=>name.toLowerCase().includes(k))
}

function normalizeDistance(mark){
  const m = mark.match(/(\d+)[^\d]+(\d+(?:\.\d+)?)/)
  if(!m) return mark
  return m[1]+"ft "+m[2]+"in"
}

function normalizeTime(mark){
  return mark.replace(/[^\d\:\.]/g,"")
}

async function loadMeets(){
  const snap = await firebase.database().ref("Track/meets").once("value")
  const sel = document.getElementById("meetSelect")
  sel.innerHTML="<option value=''>Select Meet</option>"
  snap.forEach(c=>{
    sel.innerHTML+=`<option value="${c.key}">${c.val().name}</option>`
  })
}

async function loadEvents(){
  const snap = await firebase.database().ref("Track/events").once("value")
  snap.forEach(c=>{
    eventMap[c.val().name]=c.key
  })
}

async function parseMeet(){

  const meetId=document.getElementById("meetSelect").value
  if(!meetId){alert("Select meet first");return}

  const text=document.getElementById("pasteArea").value.trim()
  if(!text){alert("Paste results first");return}

  parsedRows=[]
  validRows=[]

  const lines=text.split(/\r?\n/)
  let currentEvent=null
  let currentRound=null

  for(let i=0;i<lines.length;i++){
    let line=lines[i].trim()
    if(!line) continue

    const header=line.match(/^(.+?) - (Finals|Prelims)$/i)
    if(header){
      currentEvent=header[1].trim()
      currentRound=header[2]
      continue
    }

    if(line.toLowerCase().includes("field series")) continue
    if(!currentEvent) continue

    const row=line.match(/^(\d+)?\.?\s*(\d+|-)?\s+(.+?)\s+(.+)$/)
    if(!row) continue

    const place=row[1]||null
    const grade=row[2]||null
    const name=row[3].trim()
    let mark=row[4].trim()

    if(["DNS","SCR","NH","ND"].includes(mark)){
      // keep mark
    } else if(isFieldEvent(currentEvent)){
      mark=normalizeDistance(mark)
    } else {
      mark=normalizeTime(mark)
    }

    const eventId=eventMap[currentEvent]||null

    const obj={
      meet_id:meetId,
      event_name:currentEvent,
      event_id:eventId,
      round:currentRound,
      athlete_name:name,
      grade,
      mark,
      placement:place,
      valid:!!eventId
    }

    parsedRows.push(obj)
    if(obj.valid) validRows.push(obj)
  }

  renderPreview()
}

function renderPreview(){
  document.getElementById("previewCard").style.display="block"
  document.getElementById("importCard").style.display="block"

  document.getElementById("stats").innerHTML=`
  <div class="stat-grid">
    <div class="stat"><div class="stat-number">${parsedRows.length}</div>Total Rows</div>
    <div class="stat"><div class="stat-number success">${validRows.length}</div>Valid</div>
    <div class="stat"><div class="stat-number error">${parsedRows.length-validRows.length}</div>Invalid</div>
  </div>
  `

  document.getElementById("preview").innerHTML=`
  <table class="preview-table">
  <thead>
  <tr>
  <th>Event</th>
  <th>Name</th>
  <th>Mark</th>
  <th>Round</th>
  <th>Status</th>
  </tr>
  </thead>
  <tbody>
  ${parsedRows.slice(0,40).map(r=>`
  <tr>
  <td>${r.event_name}</td>
  <td>${r.athlete_name}</td>
  <td>${r.mark}</td>
  <td>${r.round}</td>
  <td>${r.valid?'<span class="success">OK</span>':'<span class="error">Missing Event</span>'}</td>
  </tr>
  `).join("")}
  </tbody>
  </table>
  `
}

async function importMeet(){
  const ref=firebase.database().ref("Track/results")
  let count=0

  for(let i=0;i<validRows.length;i++){
    await ref.push(validRows[i])
    count++
    document.getElementById("progressFill").style.width=
      Math.round((count/validRows.length)*100)+"%"
  }

  alert("Import complete: "+count+" results added.")
}

loadMeets()
loadEvents()
</script>
</body>
</html>
