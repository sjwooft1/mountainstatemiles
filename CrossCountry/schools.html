<script src="/assets/msm-loader.js"></script>
<main class="content-section">
    <h1 class="section-title">West Virginia Schools</h1>
    <p class="text-center">Select a school below to view their roster and results.</p>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search for a school...">

<!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
  <!-- Firebase Configuration -->
  <script src="firebase-config.js"></script>
  <script src="firebase-helpers.js"></script>
  <script>
    async function loadSchools() {
      const grid = document.getElementById("schools-grid");
      const search = document.getElementById("search");
      let schools = [];

      try {
        // Try to fetch from Firebase first
        schools = await getAllSchools();

        if (!schools || schools.length === 0) {
          // No data in Firebase, use local JSON
          const res = await fetch("data/schools.json");
          schools = await res.json();
        }
      } catch (error) {
        console.error('Error loading schools:', error);
        const res = await fetch("data/schools.json");
        schools = await res.json();
      }

      async function extractMainColor(logoUrl) {
        return new Promise(resolve=>{
          const img = new window.Image();
          img.crossOrigin = 'Anonymous';
          img.src = logoUrl;
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img,0,0);
              const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
              const hist = {};
              for (let i = 0; i < data.length; i += 4) {
                const r = data[i],g = data[i+1],b = data[i+2],a = data[i+3];
                if(a<120) continue;
                if(r>230&&g>230&&b>230) continue; // skip near-white
                if(r<28 && g<28 && b<28) continue; // skip near-black
                const max = Math.max(r,g,b), min = Math.min(r,g,b);
                if(max-min<18) continue; // skip grayish
                const key = `${Math.round(r/12)*12},${Math.round(g/12)*12},${Math.round(b/12)*12}`;
                hist[key] = (hist[key]||0)+1;
              }
              // find most-used color(s)
              let maxCount = 0, bestColors = [];
              Object.entries(hist).forEach(([k,v])=>{
                if(v>maxCount) { maxCount=v; bestColors=[k.split(',').map(Number)]; }
                else if(v===maxCount) bestColors.push(k.split(',').map(Number));
              });
              let col = [44, 95, 125];
              if(bestColors.length && maxCount>0){
                if(bestColors.length===1) col=bestColors[0];
                else {
                  col=[0,0,0]; bestColors.forEach(c=>{col[0]+=c[0];col[1]+=c[1];col[2]+=c[2];});
                  col=col.map(v=>Math.round(v/bestColors.length));
                }
              }
              resolve(`rgb(${col.join(',')})`);
            } catch(e){ resolve('#18212e'); }
          };
          img.onerror = ()=>resolve('#18212e');
        });
      }

      function renderList(filter = "") {
        grid.innerHTML = "";
        for (const s of schools.filter(sc => sc.name.toLowerCase().includes(filter.toLowerCase()))) {
          const card = document.createElement("div");
          card.className = "school-card";
          const logoUrl = `/assets/team logos/${s.slug}.png`;
          const fallbackLogo = `/assets/images/logob.png`;
          card.innerHTML = `
            <img src="${logoUrl}" alt="${s.name} Logo" onerror="this.onerror=null; this.src='${fallbackLogo}';">
            <h3>${s.name}</h3>
          `;
          // apply coloring after logo is loaded
          extractMainColor(logoUrl).then(col=>{
            card.style.setProperty('--school-main', col);
            card.style.background = `linear-gradient(127deg, var(--school-main, #295085) 18%, #e8f4ff 100%)`;
            card.style.boxShadow = `0 4px 26px var(--school-main, #29508538)`;
            card.onmouseover = ()=>{
              card.style.boxShadow = `0 8px 48px var(--school-main, #29508549)`;
              card.style.transform = 'translateY(-8px) scale(1.04)';
            };
            card.onmouseleave = ()=>{
              card.style.boxShadow = `0 4px 26px var(--school-main, #29508538)`;
              card.style.transform = '';
            };
          });
          card.addEventListener("click", () => {
            window.location.href = "school.html?slug=" + s.slug;
          });
          grid.appendChild(card);
        }
      }

      renderList();

      search.addEventListener("input", e => {
        renderList(e.target.value);
      });

      document.dispatchEvent(new Event("MSMDataLoaded"));
    }

    loadSchools();
    
    // Mobile menu toggle

);
      
      // Close menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!navMenu.contains(e.target) && !menuToggle.contains(e.target)) {
          navMenu.classList.remove('mobile-open');
        }
      });
    }
  </script>

</body>
