<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course | Mountain State Miles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#0b0e13;
    --bg-elevated:#11151c;
    --card:#151a22;
    --card-border:#232b36;
    --ridge:#1c2430;
    --text:#eef1f5;
    --text-dim:#9aa5b3;
    --text-faint:#5f6b7a;
    --trail:#2fd0a3;
    --trail-dim:#1a5f4c;
    --summit:#f2a65a;
    --creek:#4f8bf0;
    --danger:#e8654f;
    --radius:14px;
    --maxw:1180px;
  }
  html[data-theme="light"]{
    --bg:#f5f3ee;
    --bg-elevated:#ffffff;
    --card:#ffffff;
    --card-border:#e3ded3;
    --ridge:#eae5da;
    --text:#1c2128;
    --text-dim:#5b6270;
    --text-faint:#8a90a0;
    --trail-dim:#c9f0e3;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:background .25s ease,color .25s ease;
  }
  a{color:inherit;text-decoration:none;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button, select, input{font-family:inherit;}

  body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background-image:
      repeating-linear-gradient(180deg, transparent 0 78px, var(--ridge) 78px 79px),
      radial-gradient(1200px 600px at 15% -10%, rgba(47,208,163,0.08), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(242,166,90,0.06), transparent 55%);
    opacity:.6;
    pointer-events:none;
  }

  /* ---------- nav ---------- */
  header.site-nav{
    position:sticky; top:0; z-index:1001;
    background:rgba(11,14,19,0.82);
    backdrop-filter:blur(10px) saturate(140%);
    border-bottom:1px solid var(--card-border);
  }
  html[data-theme="light"] header.site-nav{ background:rgba(245,243,238,0.85); }
  .nav-inner{
    max-width:var(--maxw); margin:0 auto; padding:0 20px;
    display:flex; align-items:center; justify-content:space-between; height:64px;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-family:'Oswald',sans-serif; }
  .brand-mark{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(155deg,var(--trail),#1f8f70);
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:14px; color:#06110c; letter-spacing:.5px;
    box-shadow:0 4px 14px -4px rgba(47,208,163,.55);
  }
  .brand-name{font-size:17px;font-weight:600;letter-spacing:.3px;}
  .brand-name span{color:var(--trail);}

  nav.primary-links{display:flex; align-items:center; gap:26px;}
  nav.primary-links a{
    font-size:13.5px; font-weight:500; color:var(--text-dim);
    letter-spacing:.2px; padding:6px 2px; position:relative;
    transition:color .15s ease;
  }
  nav.primary-links a:hover{color:var(--text);}
  nav.primary-links a.active{color:var(--trail);}
  nav.primary-links a.active::after{
    content:""; position:absolute; left:0; right:0; bottom:-14px; height:2px;
    background:var(--trail); border-radius:2px;
  }

  .nav-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;
    border:1px solid var(--card-border); background:var(--card);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    color:var(--text-dim); transition:border-color .15s, color .15s;
  }
  .icon-btn:hover{color:var(--text); border-color:var(--trail-dim);}
  .hamburger{display:none;}

  @media (max-width:860px){
    nav.primary-links{display:none;}
    .hamburger{display:flex;}
  }

  /* ---------- breadcrumb ---------- */
  .breadcrumb{
    max-width:var(--maxw); margin:22px auto 0; padding:0 20px;
    font-size:12.5px; color:var(--text-faint); display:flex; gap:8px; align-items:center;
  }
  .breadcrumb a:hover{color:var(--trail);}
  .breadcrumb .sep{opacity:.5;}

  /* ---------- course switcher chips ---------- */
  .course-switcher{
    max-width:var(--maxw); margin:14px auto 0; padding:0 20px;
    display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  }
  .course-switcher::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:500;
    background:var(--card); border:1px solid var(--card-border); color:var(--text-dim);
    cursor:pointer; white-space:nowrap; transition:border-color .15s,color .15s,background .15s;
  }
  .chip:hover{color:var(--text); border-color:var(--trail-dim);}
  .chip.active{background:var(--trail); color:#062018; border-color:transparent; font-weight:600;}

  /* ---------- hero ---------- */
  .hero{
    max-width:var(--maxw); margin:0 auto; padding:18px 20px 6px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;
  }
  .hero-title-block{display:flex; flex-direction:column; gap:10px; min-width:0;}
  .eyebrow{
    display:flex; align-items:center; gap:8px; font-size:11.5px; font-weight:600;
    letter-spacing:1.4px; text-transform:uppercase; color:var(--summit);
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--summit);}
  h1.course-title{
    font-family:'Oswald',sans-serif; font-size:44px; line-height:1.02; font-weight:600;
    margin:0; letter-spacing:.2px;
  }
  .course-sub{color:var(--text-dim); font-size:14.5px; margin:0; max-width:520px;}

  .stat-strip{display:flex; gap:16px; flex-wrap:wrap;}
  .stat{
    display:flex; flex-direction:column; gap:2px; min-width:92px;
    padding:10px 16px; border-radius:10px; background:var(--card);
    border:1px solid var(--card-border);
  }
  .stat .val{font-family:'Oswald',sans-serif; font-size:21px; font-weight:600;}
  .stat .lab{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.8px;}

  /* ---------- layout ---------- */
  main{max-width:var(--maxw); margin:0 auto; padding:28px 20px 80px; display:flex; flex-direction:column; gap:22px;}
  .grid-2{display:grid; grid-template-columns:1.2fr 1fr; gap:22px;}
  @media (max-width:950px){ .grid-2{grid-template-columns:1fr;} }

  .card{
    background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .card-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 12px; border-bottom:1px solid var(--card-border);
  }
  .card-head h2{
    font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; margin:0;
    letter-spacing:.4px; text-transform:uppercase; color:var(--text);
    display:flex; align-items:center; gap:9px;
  }
  .card-head h2 .swatch{width:9px;height:9px;border-radius:3px;}
  .card-head .tag{
    font-size:11px; color:var(--text-faint); font-family:'JetBrains Mono',monospace;
    max-width:220px; overflow:hidden; text-overflow:ellipsis;
  }
  .card-body{padding:0; position:relative; flex-grow:1;}

  /* video */
  .video-wrap{position:relative; background:#000; aspect-ratio:16/9;}
  .video-wrap video{width:100%;height:100%;display:block;object-fit:cover;background:#000;}
  .media-msg{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; color:var(--text-faint); font-size:13px; text-align:center; padding:20px; background:var(--bg-elevated);
    z-index:10;
  }
  .media-msg.show{display:flex;}

  /* maps */
  #course-map{height:440px; width:100%; background:var(--bg-elevated); z-index:1;}
  #canvas3d-wrap{height:440px; width:100%; position:relative; cursor: grab;}
  #canvas3d-wrap:active{cursor: grabbing;}
  .leaflet-container{background:var(--bg-elevated) !important; font-family:'Inter',sans-serif;}
  
  .leaflet-control-layers {
    background: var(--card) !important;
    border: 1px solid var(--card-border) !important;
    color: var(--text) !important;
    border-radius: 8px !important;
  }
  .leaflet-control-layers-toggle { background-color: var(--card) !important; border-radius: 8px; }

  .map-footer-ui {
    display: flex; flex-direction: column; border-top:1px solid var(--card-border);
  }
  .map-legend{
    display:flex; gap:16px; padding:12px 18px;
    font-size:12px; color:var(--text-dim); flex-wrap:wrap; background: var(--card);
  }
  .map-legend .item{display:flex;align-items:center;gap:6px;}
  .legend-swatch{width:16px;height:3px;border-radius:2px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;border:2px solid var(--card);}
  .map-status{
    padding:10px 18px; font-size:12px; color:var(--text-faint); border-top:1px solid var(--card-border);
    display:none; background: var(--bg-elevated);
  }
  .map-status.show{display:block;}

  /* profile chart container */
  .profile-wrap{ padding:18px; min-height:240px; position:relative; width:100%; height:260px; }

  /* Surface Bar UI Component */
  .surface-container { padding: 16px 18px; border-bottom: 1px solid var(--card-border); }
  .surface-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12.5px; }
  .surface-title { font-weight: 600; color: var(--text); }
  .surface-bar { display: flex; width: 100%; height: 10px; border-radius: 999px; overflow: hidden; background: var(--ridge); }
  .surface-segment { height: 100%; transition: width 0.3s ease; }
  .surface-legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .surface-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); }
  .surface-legend-color { width: 10px; height: 10px; border-radius: 3px; }

  /* mini stats */
  .mini-stats{display:flex; border-top:1px solid var(--card-border); flex-wrap:wrap;}
  .mini-stat{
    flex:1; min-width:110px; padding:12px 14px; text-align:center; border-right:1px solid var(--card-border);
  }
  .mini-stat:last-child{border-right:none;}
  @media (max-width:480px) { .mini-stat { border-right: none; border-bottom: 1px solid var(--card-border); flex: 1 0 45%; } .mini-stat:last-child { border-bottom:none; } }
  .mini-stat .v{font-family:'Oswald',sans-serif; font-size:17px; font-weight:600;}
  .mini-stat .l{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.6px; margin-top:2px;}

  /* Predictor styles */
  .pred-input{
    width: 100%; background: var(--bg); border: 1px solid var(--card-border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13.5px; outline: none; transition: border-color 0.15s;
  }
  .pred-input:focus{ border-color: var(--trail); }

  /* notes */
  .notes{display:flex; flex-direction:column; gap:10px; padding:16px 18px;}
  .notes p{margin:0; color:var(--text-dim); font-size:13.5px; line-height:1.55;}
  .notes ul{margin:2px 0 0; padding-left:18px; color:var(--text-dim); font-size:13.5px; line-height:1.6;}
  .notes li::marker{color:var(--trail);}

  .btn-row{display:flex; gap:10px; padding:0 18px 18px; flex-wrap:wrap;}
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border-radius:9px;
    font-size:13px; font-weight:600; border:1px solid var(--card-border); cursor:pointer;
    background:var(--bg-elevated); color:var(--text);
  }
  .btn.primary{background:var(--trail); color:#062018; border-color:transparent;}
  .btn:hover{filter:brightness(1.06);}

  .empty-state{
    max-width:var(--maxw); margin:60px auto; padding:0 20px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .empty-state h2{font-family:'Oswald',sans-serif; font-size:24px; margin:0;}
  .empty-state p{color:var(--text-dim); font-size:14px; max-width:420px; margin:0;}

  footer{ border-top:1px solid var(--card-border); background:var(--bg-elevated); margin-top:40px; }
  .footer-inner{
    max-width:var(--maxw); margin:0 auto; padding:36px 20px 28px;
    display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:28px;
  }
  @media (max-width:700px){ .footer-inner{grid-template-columns:1fr;} }
  .footer-inner h4{font-size:11.5px; text-transform:uppercase; letter-spacing:1px; color:var(--text-faint); margin:0 0 12px;}
  .footer-inner ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
  .footer-inner a{font-size:13.5px; color:var(--text-dim);}
  .footer-inner a:hover{color:var(--trail);}
  .footer-bottom{
    max-width:var(--maxw); margin:0 auto; padding:16px 20px 28px; font-size:12px; color:var(--text-faint);
    border-top:1px solid var(--card-border);
  }
</style>

  // ---------- utils ----------
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const phi1 = lat1 * Math.PI / 180, phi2 = lat2 * Math.PI / 180;
    const dphi = (lat2 - lat1) * Math.PI / 180;
    const dlambda = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dphi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlambda/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function computeStats(points) {
    let dist = 0, gain = 0, loss = 0;
    const elevs = points.map(p => p.ele).filter(e => e !== null && !isNaN(e));
    
    points[0].distanceFromStart = 0;
    for (let i = 1; i < points.length; i++) {
      const step = haversine(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
      dist += step;
      points[i].distanceFromStart = dist;
      
      if (points[i].ele !== null && points[i-1].ele !== null) {
        const de = points[i].ele - points[i-1].ele;
        if (de > 0) gain += de; else loss += -de;
      }
    }
    return {
      distanceMi: dist / 1609.34,
      gainFt: gain * 3.28084,
      lossFt: loss * 3.28084,
      minFt: elevs.length ? Math.min(...elevs) * 3.28084 : null,
      maxFt: elevs.length ? Math.max(...elevs) * 3.28084 : null,
      pointCount: points.length
    };
  }

  function parseGpx(text) {
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    if (xml.querySelector('parsererror')) return [];
    return Array.from(xml.getElementsByTagName('trkpt')).map((p, idx) => {
      const eleNode = p.getElementsByTagName('ele')[0];
      let fallbackEle = 120 + Math.sin(idx * 0.04) * 15 + Math.cos(idx * 0.1) * 5;
      return {
        lat: parseFloat(p.getAttribute('lat')),
        lon: parseFloat(p.getAttribute('lon')),
        ele: eleNode ? parseFloat(eleNode.textContent) : fallbackEle
      };
    });
  }

    // ---------- Enhanced Leaflet Multi-Layer Map Pipeline ----------
    if (map) { map.remove(); map = null; }
    const satelliteTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19, attribution: 'Tiles &copy; Esri &mdash; Source: Esri'
    });
    const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap &copy; CARTO'
    });
    const topoTiles = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      maxZoom: 17, attribution: '&copy; OpenTopoMap'
    });

    map = L.map('course-map', { 
      scrollWheelZoom: false, 
      layers: [satelliteTiles]
    });

    const baseMapsConfig = {
      "High-Res Satellite View": satelliteTiles,
      "Dark Contrast View": darkTiles,
      "Topography & Contours": topoTiles,
    };
    L.control.layers(baseMapsConfig, null, { position: 'topright' }).addTo(map);

    mapHoverMarker = L.circleMarker([0, 0], {
      radius: 7, color: '#ffffff', weight: 2, fillColor: '#4f8bf0', fillOpacity: 1, zIndexOffset: 1000
    });

    map.setView([39.19, -81.46], 13);
    const mapStatus = document.getElementById('map-status');

    function drawRouteAndStats(points) {
      if (!points.length) {
        mapStatus.textContent = 'No coordinate metrics mapped inside target route tracking array vectors.';
        mapStatus.classList.add('show');
        return;
      }

      const stats = computeStats(points);
      const latlngs = points.map(p => [p.lat, p.lon]);
      routeLayer = L.polyline(latlngs, { color: '#f2a65a', weight: 4, opacity: 0.95, lineJoin: 'round' }).addTo(map);
      
      L.circleMarker(latlngs[0], { radius: 7, color: '#0b0e13', weight: 2, fillColor: '#2fd0a3', fillOpacity: 1 })
        .addTo(map).bindPopup('Gate Start Position');
      L.circleMarker(latlngs[latlngs.length - 1], { radius: 7, color: '#0b0e13', weight: 2, fillColor: '#e8654f', fillOpacity: 1 })
        .addTo(map).bindPopup('Finish Timing Grid');
      
      map.fitBounds(routeLayer.getBounds(), { padding: [24, 24] });

      const statStrip = document.getElementById('stat-strip');
      statStrip.innerHTML = `
        <div class="stat"><span class="val">${fmt(stats.distanceMi, 2)}</span><span class="lab">Miles</span></div>
        <div class="stat"><span class="val">+${fmt(stats.gainFt, 0)}</span><span class="lab">Ft Gain</span></div>
        <div class="stat"><span class="val">${stats.minFt !== null ? fmt(stats.minFt,0)+'–'+fmt(stats.maxFt,0) : '—'}</span><span class="lab">Ft Elev</span></div>
      `;
      document.getElementById('mini-stats').innerHTML = `
        <div class="mini-stat"><div class="v">${stats.minFt !== null ? fmt(stats.minFt,0)+' ft' : '—'}</div><div class="l">Min Elevation</div></div>
        <div class="mini-stat"><div class="v">${stats.maxFt !== null ? fmt(stats.maxFt,0)+' ft' : '—'}</div><div class="l">Max Elevation</div></div>
        <div class="mini-stat"><div class="v">+${fmt(stats.gainFt,0)} / -${fmt(stats.lossFt,0)} ft</div><div class="l">Gain / Loss</div></div>
        <div class="mini-stat"><div class="v">${fmt(stats.distanceMi,2)} mi</div><div class="l">Total Distance</div></div>
      `;

      buildElevationChart(points);
      build3DTrackOrbitModel(points);
      
      // Wire up Predictor Interaction Handles
      const inputs = ['pred-min', 'pred-sec', 'pred-weather'];
      inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', () => runPredictorCalculations(course, points));
      });
      runPredictorCalculations(course, points);
    }

    // ---------- NEW ENGINE: Three.js Interactive 3D Orbit Component ----------
    function build3DTrackOrbitModel(trackPoints) {
  const container = document.getElementById('canvas3d-wrap');
  if (!container) return;
  container.innerHTML = ''; 

  const width = container.clientWidth;
  const height = container.clientHeight;

  scene3d = new THREE.Scene();
  const cardColor = getComputedStyle(document.documentElement).getPropertyValue('--card').trim() || '#151a22';
  scene3d.background = new THREE.Color(cardColor);

  // 1. FIXED: Set safe near/far planes to prevent track clipping
  camera3d = new THREE.PerspectiveCamera(30, width / height, 0.1, 1000);
  camera3d.position.set(0, 12, 30); // Higher vantage point to see elevation layout
  camera3d.lookAt(0, 0, 0); 

  // 2. NEW: Add lighting to expose track elevation geometry (3D depth)
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene3d.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene3d.add(dirLight);

  renderer3d = new THREE.WebGLRenderer({ antialias: true });
  renderer3d.setSize(width, height);
  renderer3d.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer3d.domElement);

  let minLat = Infinity, maxLat = -Infinity;
  let minLon = Infinity, maxLon = -Infinity;
  let minEle = Infinity, maxEle = -Infinity;

  trackPoints.forEach(p => {
    if (p.lat < minLat) minLat = p.lat; if (p.lat > maxLat) maxLat = p.lat;
    if (p.lon < minLon) minLon = p.lon; if (p.lon > maxLon) maxLon = p.lon;
    if (p.ele < minEle) minEle = p.ele; if (p.ele > maxEle) maxEle = p.ele;
  });

  const centerLat = (minLat + maxLat) / 2;
  const centerLon = (minLon + maxLon) / 2;
  const centerEle = (minEle + maxEle) / 2;

  // 3. FIXED: Mercator/Cosine approximation to prevent track stretching
  const latCorrection = Math.cos(centerLat * Math.PI / 180);
  const deltaLat = maxLat - minLat;
  const deltaLon = (maxLon - minLon) * latCorrection;
  
  const maxDiff = Math.max(deltaLat, deltaLon) || 1;
  const geoScale = 14 / maxDiff;
  
  // Keep elevation pronounced but relative to the map scale
  const eleScale = (maxEle - minEle !== 0) ? 2.5 / (maxEle - minEle) : 1; 

  trackGroup3d = new THREE.Group();

  const threePointsArray = trackPoints.map(p => {
    // 4. FIXED: Lon maps to X (East/West), Lat maps to Z (North/South)
    return new THREE.Vector3(
      (p.lon - centerLon) * geoScale * latCorrection,
      (p.ele - centerEle) * eleScale, 
      -(p.lat - centerLat) * geoScale  // Negated because -Z is "forward/North" in Three.js
    );
  });

  // Inside build3DTrackOrbitModel, replace the tube geometry logic with this:
  const trackCurve = new THREE.CatmullRomCurve3(threePointsArray);
      const tubeGeometry = new THREE.TubeGeometry(trackCurve, Math.min(300, trackPoints.length), 0.14, 8, false);
      
      // Generate colors based on slope (Heatmap effect)
      const colors = [];
      for (let i = 0; i < tubeGeometry.attributes.position.count; i++) {
        // Sample points to find local slope
        const t = i / tubeGeometry.attributes.position.count;
        const pt1 = trackCurve.getPoint(Math.max(0, t - 0.01));
        const pt2 = trackCurve.getPoint(Math.min(1, t + 0.01));
        const slope = pt2.y - pt1.y;

        const color = new THREE.Color();
        if (slope > 0.05) color.setHex(0xe8654f); // Red for steep uphill
        else if (slope < -0.05) color.setHex(0x2fd0a3); // Green for downhill
        else color.setHex(0xf2a65a); // Orange for flat/rolling

        colors.push(color.r, color.g, color.b);
      }
      
      tubeGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      
      const tubeMaterial = new THREE.MeshBasicMaterial({ 
        vertexColors: true, // Tell Three.js to use the heatmap colors
        wireframe: false 
      });
      const lineMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
      trackGroup3d.add(lineMesh);

  // Markers use standard materials to catch lighting highlights
  const markerMaterialStart = new THREE.MeshStandardMaterial({ color: 0x2fd0a3, roughness: 0.2 });
  const markerMaterialEnd = new THREE.MeshStandardMaterial({ color: 0xe8654f, roughness: 0.2 });

  const startSphere = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), markerMaterialStart);
  startSphere.position.copy(threePointsArray[0]);
  trackGroup3d.add(startSphere);

  const finishSphere = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), markerMaterialEnd);
  finishSphere.position.copy(threePointsArray[threePointsArray.length - 1]);
  trackGroup3d.add(finishSphere);

  // Floor grid adjusted to look clean under the centered elevation path
  const gridSystem = new THREE.GridHelper(20, 20, 0x5f6b7a, 0x232b36);
  gridSystem.position.y = -3;
  scene3d.add(gridSystem);
  scene3d.add(trackGroup3d);

  // Mouse & touch interaction handlers 
  let isInteracting = false;
  let lastMousePos = { x: 0, y: 0 };

  container.addEventListener('mousedown', (e) => {
    isInteracting = true;
    lastMousePos = { x: e.clientX, y: e.clientY };
  });

  container.addEventListener('mousemove', (e) => {
    if (!isInteracting) return;
    const deltaX = e.clientX - lastMousePos.x;
    const deltaY = e.clientY - lastMousePos.y;
    trackGroup3d.rotation.y += deltaX * 0.007;
    // Constrain X rotation to prevent the track from turning completely upside down
    trackGroup3d.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, trackGroup3d.rotation.x + deltaY * 0.007));
    lastMousePos = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener('mouseup', () => isInteracting = false);

  container.addEventListener('touchstart', (e) => {
    if(e.touches.length === 1) {
      isInteracting = true;
      lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, {passive: true});

  container.addEventListener('touchmove', (e) => {
    if (!isInteracting || e.touches.length !== 1) return;
    const deltaX = e.touches[0].clientX - lastMousePos.x;
    const deltaY = e.touches[0].clientY - lastMousePos.y;
    trackGroup3d.rotation.y += deltaX * 0.007;
    trackGroup3d.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, trackGroup3d.rotation.x + deltaY * 0.007));
    lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, {passive: true});

  window.addEventListener('touchend', () => isInteracting = false);

  function renderFrameLoop() {
    if (!renderer3d) return;
    requestAnimationFrame(renderFrameLoop);
    if (!isInteracting) {
      trackGroup3d.rotation.y += 0.0025; 
    }
    renderer3d.render(scene3d, camera3d);
  }
  renderFrameLoop();
}


   // ---------- ADVANCED ENGINE: Grade-Adjusted Topographical Predictor ----------
function runPredictorCalculations(currentCourse, points) {
  const minEl = document.getElementById('pred-min');
  const secEl = document.getElementById('pred-sec');
  if (!minEl || !secEl || !points.length) return;

  const userMinutes = parseInt(minEl.value) || 17;
  const userSeconds = parseInt(secEl.value) || 0;
  
  // Base pace per mile in seconds
  const totalBaseTrackSeconds = (userMinutes * 60) + userSeconds;
  const basePacePerMile = totalBaseTrackSeconds / 3.10686; 

  const atmosphericMultiplier = parseFloat(document.getElementById('pred-weather').value) || 1.00;

  let surfaceMultiplier = 1.02; // Default fallback
  if (currentCourse.surfaces && currentCourse.surfaces.length > 0) {
    surfaceMultiplier = 0;
    currentCourse.surfaces.forEach(s => {
      const weight = SURFACE_MULTIPLIERS[s.type] || 1.02;
      surfaceMultiplier += (s.pct / 100) * weight;
    });
  }

  // Slice course into mile segments to calculate actual gradient impact
  let totalDistanceMi = 0;
  let splits = [];
  let currentSplit = { dist: 0, gain: 0, loss: 0, points: 0 };
  let currentMileTarget = 1;

  for (let i = 1; i < points.length; i++) {
    const stepDist = haversine(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon) / 1609.34;
    totalDistanceMi += stepDist;
    currentSplit.dist += stepDist;
    currentSplit.points++;

    const stepElev = points[i].ele - points[i-1].ele; // in meters
    if (stepElev > 0) currentSplit.gain += stepElev;
    else currentSplit.loss -= stepElev;

    // When crossing a mile marker (or finishing the course)
    if (totalDistanceMi >= currentMileTarget || i === points.length - 1) {
      splits.push({...currentSplit, mileLabel: totalDistanceMi >= 3.1 ? 'Final Kick' : `Mile ${currentMileTarget}`});
      currentSplit = { dist: 0, gain: 0, loss: 0, points: 0 };
      currentMileTarget++;
    }
  }

  // Minetti's equation simplified: Uphills cost more time than downhills save
  // We apply a gradient multiplier to the base pace for each specific split
  let predictedTotalSeconds = 0;
  let splitsHtml = `
    <tr style="border-bottom: 1px solid var(--card-border); color: var(--text-faint); font-size:10.5px; text-transform:uppercase;">
      <th style="padding: 6px 0;">Segment</th>
      <th>Topo Data (Gain/Loss)</th>
      <th style="text-align: right;">Predicted Split</th>
    </tr>
  `;

  const standardPad = (val) => val < 10 ? '0' + val : val;
  const segmentFormatter = (secs) => `${Math.floor(secs / 60)}:${standardPad(Math.floor(secs % 60))}`;

  splits.forEach(split => {
    // Calculate average gradient for this specific mile (%)
    const netElevChangeMi = ((split.gain - split.loss) * 3.28084) / 5280; 
    const gradient = (netElevChangeMi / split.dist) * 100;
    
    // Grade adjustment: +1% grade slows you by ~3%, -1% speeds you by ~1.5%
    let gradeMultiplier = 1.0;
    if (gradient > 0) gradeMultiplier += (gradient * 0.033);
    else if (gradient < 0 && gradient > -10) gradeMultiplier += (gradient * 0.015);
    else if (gradient <= -10) gradeMultiplier += 0.05; // extremely steep downhills slow you down due to braking

    const combinedMultiplier = gradeMultiplier * atmosphericMultiplier * surfaceMultiplier;
    const splitSeconds = (basePacePerMile * split.dist) * combinedMultiplier;
    predictedTotalSeconds += splitSeconds;

    splitsHtml += `
      <tr style="border-bottom: 1px solid var(--ridge);">
        <td style="padding: 7px 0; color: var(--text); font-weight:500;">${split.mileLabel}</td>
        <td style="color: var(--text-dim); font-size:12px;">
          <span style="color:#e8654f">↑${Math.round(split.gain * 3.28084)}ft</span> / 
          <span style="color:#2fd0a3">↓${Math.round(split.loss * 3.28084)}ft</span>
        </td>
        <td style="text-align: right; font-family: monospace; color: var(--trail); font-weight:600; font-size:13.5px;">
          ${segmentFormatter(splitSeconds)}
        </td>
      </tr>
    `;
  });

  const parsedOutputMinutes = Math.floor(predictedTotalSeconds / 60);
  const parsedOutputSeconds = Math.floor(predictedTotalSeconds % 60);

  document.getElementById('predicted-time-display').textContent = `${parsedOutputMinutes}:${standardPad(parsedOutputSeconds)}`;
  const netOverheadSeconds = Math.round(predictedTotalSeconds - totalBaseTrackSeconds);
  document.getElementById('predicted-diff-label').textContent = `Predicted XC Conversion (+${netOverheadSeconds}s vs flat track PR)`;
  document.getElementById('splits-table').innerHTML = splitsHtml;
}

    // ---------- Interactive Elevation Profile Logic ----------
    function buildElevationChart(fullTrackPoints) {
      const canvasCtx = document.getElementById('elevation-chart');
      if (!canvasCtx) return;

      const samplingFactor = Math.max(1, Math.floor(fullTrackPoints.length / 150));
      activeSamplePoints = fullTrackPoints.filter((_, idx) => idx % samplingFactor === 0);

      const elevationDataset = activeSamplePoints.map(p => p.ele !== null ? p.ele * 3.28084 : 0);
      const distanceLabels = activeSamplePoints.map(p => (p.distanceFromStart / 1609.34).toFixed(2));

      if (activeElevationChart) {
        activeElevationChart.destroy();
      }

      const lightStateActive = document.documentElement.getAttribute('data-theme') === 'light';
      const gridBorderTint = lightStateActive ? '#eae5da' : '#232b36';
      const textLabelsTint = lightStateActive ? '#1c2128' : '#9aa5b3';

      activeElevationChart = new Chart(canvasCtx, {
        type: 'line',
        data: {
          labels: distanceLabels,
          datasets: [{
            label: 'Elevation (ft)',
            data: elevationDataset,
            borderColor: '#4f8bf0',
            backgroundColor: 'rgba(79, 139, 240, 0.12)',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#ffffff',
            pointHoverBorderColor: '#4f8bf0',
            pointHoverBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                title: (items) => `Distance: ${items[0].label} mi`,
                label: (item) => `Elevation: ${item.parsed.y.toFixed(0)} ft`
              }
            }
          },
          scales: {
            x: {
              grid: { color: gridBorderTint },
              ticks: { color: textLabelsTint, maxTicksLimit: 12 },
              title: { display: true, text: 'Distance Offset (Miles)', color: textLabelsTint, font: { size: 11, weight: '500' } }
            },
            y: {
              grid: { color: gridBorderTint },
              ticks: { color: textLabelsTint },
              title: { display: true, text: 'Elevation (Feet)', color: textLabelsTint, font: { size: 11, weight: '500' } }
            }
          },
          onHover: (event, chartActiveElements) => {
            if (chartActiveElements && chartActiveElements.length > 0) {
              const activeIndex = chartActiveElements[0].index;
              const trackDataReference = activeSamplePoints[activeIndex];
              
              if (trackDataReference) {
                mapHoverMarker.setLatLng([trackDataReference.lat, trackDataReference.lon]);
                if (!map.hasLayer(mapHoverMarker)) {
                  mapHoverMarker.addTo(map);
                }
              }
            } else {
              if (map.hasLayer(mapHoverMarker)) {
                map.removeLayer(mapHoverMarker);
              }
            }
          }
        }
      });
    }

    fetch(course.gpx)
      .then(res => { if (!res.ok) throw new Error('not found'); return res.text(); })
      .then(text => {
        const points = parseGpx(text);
        if (points.length) {
          drawRouteAndStats(points);
        } else if (course.fallbackTrack) {
          mapStatus.textContent = 'GPX empty tracking components. Visualizing layout fallback mapping schema structure.';
          mapStatus.classList.add('show');
          const simulatedElevatedFallback = course.fallbackTrack.map(([lat, lon], index) => {
            let mockElevation = 135 + Math.sin(index * 0.15) * 12 + Math.cos(index * 0.05) * 4;
            return { lat, lon, ele: mockElevation };
          });
          drawRouteAndStats(simulatedElevatedFallback);
        }
      })
      .catch(() => {
        if (course.fallbackTrack) {
          mapStatus.textContent = 'Network offline. Using local cached track routing geometry specifications.';
          mapStatus.classList.add('show');
          const simulatedElevatedFallback = course.fallbackTrack.map(([lat, lon], index) => {
            let mockElevation = 135 + Math.sin(index * 0.15) * 12 + Math.cos(index * 0.05) * 4;
            return { lat, lon, ele: mockElevation };
          });
          drawRouteAndStats(simulatedElevatedFallback);
        } else {
          mapStatus.textContent = `Map framework structural pipeline failed to resolve remote tracking targets at path: ${course.gpx}`;
          mapStatus.classList.add('show');
        }
      });
  }

  function boot() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('course') || (COURSES[0] && COURSES[0].slug);
    loadCourse(slug, false);
  }

  window.addEventListener('popstate', () => {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('course') || (COURSES[0] && COURSES[0].slug);
    loadCourse(slug, false);
  });

  // Bypassed the external fetch for courses.json and initialize directly using the default array
  window.addEventListener('DOMContentLoaded', boot);
</script>
