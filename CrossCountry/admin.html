<!DOCTYPE html>
<html lang="en">
<head>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Track Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     DESIGN TOKENS
     Palette is grounded in a meet under the stadium lights:
     near-black sky, rubberized all-weather track in burnt
     orange, lane-white text. Indoor/outdoor are colour-coded
     consistently (cool arena blue vs. sun-baked track rust) so
     colour always carries real meaning, never decoration only.
     ========================================================== */
  :root{
    --ink:#0a0d12;
    --ink-raised:#0d1117;
    --surface:#10141b;
    --surface-2:#151a23;
    --surface-3:#1b212c;
    --hover:rgba(255,255,255,.045);
    --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.16);

    --track:#ff6a32;
    --track-bright:#ff8d5c;
    --track-dim:#c44e1f;
    --track-wash:rgba(255,106,50,.13);
    --track-wash-strong:rgba(255,106,50,.24);

    --indoor:#4ea6ff;
    --indoor-wash:rgba(78,166,255,.15);
    --outdoor:#ff6a32;
    --outdoor-wash:rgba(255,106,50,.15);

    --success:#36d27a;
    --success-wash:rgba(54,210,122,.14);
    --danger:#ff5470;
    --danger-wash:rgba(255,84,112,.14);
    --warning:#ffbe53;
    --warning-wash:rgba(255,190,83,.14);
    --info:#4ea6ff;
    --info-wash:rgba(78,166,255,.14);

    --ink-1:#eef1f6;
    --ink-2:#9aa6b8;
    --ink-3:#5f6b7d;

    --font-display:'Oswald',system-ui,-apple-system,sans-serif;
    --font-body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;

    --r-sm:6px;
    --r-md:10px;
    --r-lg:16px;
    --r-pill:999px;

    --shadow-sm:0 2px 10px rgba(0,0,0,.35);
    --shadow-md:0 16px 40px -12px rgba(0,0,0,.55);
    --shadow-lg:0 28px 70px -20px rgba(0,0,0,.7);

    --ease:cubic-bezier(.4,0,.2,1);
    --sidebar-w:264px;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--ink);
    background-image:
      radial-gradient(900px 600px at 12% -10%, rgba(255,106,50,.07), transparent 60%),
      radial-gradient(700px 500px at 100% 0%, rgba(78,166,255,.05), transparent 55%);
    color:var(--ink-1);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }
  ::selection{background:var(--track-wash-strong);color:#fff;}
  a{color:inherit;}

  /* Scrollbars */
  *{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.18) transparent;}
  *::-webkit-scrollbar{width:9px;height:9px;}
  *::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:99px;}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.28);}

  :focus-visible{
    outline:2px solid var(--track-bright);
    outline-offset:2px;
    border-radius:4px;
  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
  }

  /* A thin repeating-dash rule — the page's one recurring motif,
     reads like lane markings seen from above. Used sparingly as
     a section divider, never as decoration on its own. */
  .lane-rule{
    height:1px;
    background-image:repeating-linear-gradient(90deg, var(--line-strong) 0 10px, transparent 10px 18px);
    border:none;
    margin:0;
  }

  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

  /* ==========================================================
     APP SHELL
     ========================================================== */
  .app-wrapper{display:flex;height:100vh;overflow:hidden;}

  .sidebar{
    width:var(--sidebar-w);
    flex-shrink:0;
    background:linear-gradient(180deg, var(--ink-raised) 0%, var(--ink) 100%);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    padding:22px 18px;
    gap:22px;
    z-index:50;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    padding-bottom:18px;
  }
  .brand img{
    width:42px;height:42px;border-radius:10px;object-fit:contain;
    background:var(--surface-2);
    border:1px solid var(--line);
  }
  .brand-name{
    font-family:var(--font-display);
    font-size:1.02rem;
    font-weight:600;
    letter-spacing:.02em;
    line-height:1.15;
    margin:0;
    color:var(--ink-1);
  }
  .brand-sub{
    font-size:.68rem;
    color:var(--track-bright);
    text-transform:uppercase;
    letter-spacing:.16em;
    font-weight:600;
    margin-top:3px;
  }

  .nav-group{display:flex;flex-direction:column;gap:2px;}
  .nav-label{
    font-size:.68rem;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--ink-3);
    font-weight:600;
    padding:0 10px;
    margin:14px 0 6px;
  }
  .nav-group:first-of-type .nav-label{margin-top:0;}

  .nav-btn{
    appearance:none;
    background:transparent;
    border:none;
    color:var(--ink-2);
    padding:9px 10px;
    border-radius:var(--r-sm);
    cursor:pointer;
    font-family:var(--font-body);
    font-weight:500;
    font-size:.89rem;
    text-align:left;
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    transition:background .15s var(--ease), color .15s var(--ease);
    text-decoration:none;
  }
  .nav-btn svg{flex-shrink:0;opacity:.85;}
  .nav-btn:hover{background:var(--hover);color:var(--ink-1);}
  .nav-btn.active{
    background:var(--track-wash);
    color:#fff;
  }
  .nav-btn.active::before{
    content:'';
    position:absolute;
    left:-18px;
    top:8px;
    bottom:8px;
    width:3px;
    background:var(--track);
    border-radius:0 3px 3px 0;
  }
  .nav-btn.active svg{opacity:1;color:var(--track-bright);}

  .sidebar-spacer{flex:1;}

  .logout-section{padding-top:16px;border-top:1px solid var(--line);}
  .logout-btn{
    width:100%;
    padding:10px 14px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-2);
    border-radius:var(--r-sm);
    font-weight:600;
    font-size:.86rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    transition:all .15s var(--ease);
    font-family:var(--font-body);
  }
  .logout-btn:hover{background:var(--danger-wash);border-color:var(--danger);color:#ffb3c0;}

  /* Main column */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

  .topbar{
    display:flex;
    align-items:center;
    gap:18px;
    padding:14px 26px;
    background:var(--ink-raised);
    border-bottom:1px solid var(--line);
    position:relative;
    z-index:10;
  }
  .mobile-menu-button{
    display:none;
    width:38px;height:38px;
    align-items:center;justify-content:center;
    background:transparent;
    border:1px solid var(--line);
    border-radius:var(--r-sm);
    color:var(--ink-1);
    cursor:pointer;
    flex-shrink:0;
  }
  .topbar h2{
    margin:0;
    font-family:var(--font-display);
    font-size:1.2rem;
    font-weight:600;
    letter-spacing:.01em;
  }
  .topbar-links{
    display:flex;
    gap:14px;
    align-items:center;
    font-size:.85rem;
  }
  .topbar-links a{
    color:var(--ink-2);
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 4px;
    border-bottom:1px solid transparent;
    transition:color .15s, border-color .15s;
  }
  .topbar-links a:hover{color:var(--track-bright);border-color:var(--track-bright);}

  .topbar-info{
    display:flex;
    align-items:center;
    gap:10px;
    margin-left:auto;
  }
  .conn-pill{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:6px 11px;
    border-radius:var(--r-pill);
    border:1px solid var(--line);
    background:var(--surface);
    font-size:.76rem;
    color:var(--ink-2);
    white-space:nowrap;
  }
  .conn-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px var(--success-wash);}

  /* The "scoreboard" — record counter rendered like a timer readout */
  .scoreboard{
    font-family:var(--font-mono);
    font-variant-numeric:tabular-nums;
    font-weight:600;
    font-size:.82rem;
    letter-spacing:.04em;
    background:var(--ink);
    border:1px solid var(--line-strong);
    color:var(--track-bright);
    padding:6px 12px;
    border-radius:var(--r-sm);
    text-shadow:0 0 14px rgba(255,106,50,.45);
    white-space:nowrap;
  }

  .content{
    flex:1;
    overflow:auto;
    padding:22px 26px;
  }

  .mobile-menu-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.55);
    z-index:90;
  }
  .mobile-menu-overlay.active{display:block;}

  /* ==========================================================
     PRIMITIVES — buttons, inputs, badges, cards
     ========================================================== */
  .btn{
    appearance:none;
    border:1px solid transparent;
    border-radius:var(--r-sm);
    font-family:var(--font-body);
    font-weight:600;
    font-size:.86rem;
    padding:8px 14px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:7px;
    transition:transform .12s var(--ease), background .15s, border-color .15s, color .15s, box-shadow .15s;
    white-space:nowrap;
    line-height:1.2;
  }
  .btn svg{flex-shrink:0;}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}

  .btn-primary{background:var(--track);color:#1a0a02;box-shadow:0 6px 16px -4px rgba(255,106,50,.45);}
  .btn-primary:hover:not(:disabled){background:var(--track-bright);}

  .btn-secondary{background:var(--surface-2);color:var(--ink-1);border-color:var(--line);}
  .btn-secondary:hover:not(:disabled){background:var(--surface-3);border-color:var(--line-strong);}

  .btn-ghost{background:transparent;color:var(--ink-2);border-color:transparent;}
  .btn-ghost:hover:not(:disabled){background:var(--hover);color:var(--ink-1);}

  .btn-danger{background:rgba(255,84,112,.16);color:#ffb3c0;border-color:rgba(255,84,112,.4);}
  .btn-danger:hover:not(:disabled){background:var(--danger);color:#fff;}

  .btn-success{background:var(--success-wash);color:#7cf0ae;border-color:rgba(54,210,122,.4);}
  .btn-success:hover:not(:disabled){background:var(--success);color:#062;}

  .btn-sm{padding:5px 10px;font-size:.78rem;border-radius:5px;}
  .btn-block{width:100%;justify-content:center;}
  .btn-icon{padding:7px;width:34px;height:34px;justify-content:center;}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .field label{font-size:.82rem;font-weight:600;color:var(--ink-2);}
  .field .hint{font-size:.74rem;color:var(--ink-3);font-weight:400;margin-top:-2px;}

  .input, select.input, textarea.input{
    width:100%;
    padding:9px 11px;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--ink-1);
    border-radius:var(--r-sm);
    font-size:.9rem;
    font-family:var(--font-body);
    transition:border-color .15s, box-shadow .15s;
  }
  .input::placeholder{color:var(--ink-3);}
  .input:focus, select.input:focus, textarea.input:focus{
    outline:none;
    border-color:var(--track);
    box-shadow:0 0 0 3px var(--track-wash);
  }
  select.input{cursor:pointer;}
  .input-row{display:flex;gap:8px;align-items:center;}
  .input-row .input{flex:1;}

  .checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;color:var(--ink-1);user-select:none;}
  .checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--track);cursor:pointer;}

  .check-grid{
    display:flex;flex-wrap:wrap;gap:10px;
    max-height:160px;overflow-y:auto;
    border:1px solid var(--line);border-radius:var(--r-sm);
    padding:10px;background:var(--surface);
  }
  .check-grid label{display:flex;align-items:center;gap:7px;font-size:.85rem;padding:4px 6px;border-radius:5px;cursor:pointer;}
  .check-grid label:hover{background:var(--hover);}

  /* Badges — encode real facts: season, action type, etc. */
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 9px;border-radius:var(--r-pill);
    font-size:.72rem;font-weight:600;letter-spacing:.02em;
    white-space:nowrap;border:1px solid transparent;
  }
  .badge-indoor{background:var(--indoor-wash);color:#8fc6ff;border-color:rgba(78,166,255,.35);}
  .badge-outdoor{background:var(--outdoor-wash);color:#ffab82;border-color:rgba(255,106,50,.35);}
  .badge-neutral{background:var(--surface-3);color:var(--ink-2);border-color:var(--line);}
  .badge-success{background:var(--success-wash);color:#7cf0ae;border-color:rgba(54,210,122,.35);}
  .badge-danger{background:var(--danger-wash);color:#ffb3c0;border-color:rgba(255,84,112,.35);}
  .badge-warning{background:var(--warning-wash);color:#ffd591;border-color:rgba(255,190,83,.35);}
  .badge-track{background:var(--track-wash);color:var(--track-bright);border-color:rgba(255,106,50,.4);}

  .division-chip{
    display:inline-block;margin:2px 4px 2px 0;padding:2px 9px;
    border-radius:var(--r-pill);font-size:.72rem;font-weight:700;
    background:var(--track-wash);border:1px solid rgba(255,106,50,.35);color:var(--track-bright);
  }

  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    box-shadow:var(--shadow-sm);
  }
  .panel-pad{padding:22px;}

  /* ==========================================================
     STAT CARDS
     ========================================================== */
  .stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:14px;
    margin-bottom:22px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:18px 20px;
    position:relative;
    overflow:hidden;
  }
  .stat-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--track);opacity:.7;
  }
  .stat-number{
    font-family:var(--font-display);
    font-size:2.1rem;
    font-weight:600;
    color:var(--ink-1);
    margin:0;
    font-variant-numeric:tabular-nums;
    line-height:1;
  }
  .stat-label{
    color:var(--ink-2);
    font-size:.78rem;
    margin:8px 0 0;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-weight:600;
  }

  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .bar-row .bar-label{width:130px;flex-shrink:0;font-size:.83rem;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:8px;background:var(--surface-3);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg, var(--track-dim), var(--track));}
  .bar-value{width:42px;text-align:right;font-family:var(--font-mono);font-size:.8rem;color:var(--ink-2);flex-shrink:0;}

  /* ==========================================================
     DATA GRID
     ========================================================== */
  .grid-shell{
    height:100%;display:flex;flex-direction:column;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);
  }
  .grid-head{
    padding:16px 20px;background:var(--surface-2);
    border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .grid-title{
    margin:0;font-family:var(--font-display);font-size:1.05rem;font-weight:600;
    display:flex;align-items:center;gap:10px;letter-spacing:.01em;
  }
  .grid-count{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-3);font-weight:500;}
  .grid-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

  .filter-strip{
    padding:10px 20px;background:var(--ink-raised);border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  }
  .filter-strip .input{min-width:160px;font-size:.83rem;padding:7px 10px;width:auto;}
  .filter-strip-label{font-size:.78rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-right:2px;}

  .active-filters-bar{
    padding:10px 20px;background:var(--surface-2);border-bottom:1px solid var(--line);
    display:none;flex-wrap:wrap;gap:8px;align-items:center;
  }
  .filter-tag{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
    background:var(--track-wash);border:1px solid rgba(255,106,50,.4);
    border-radius:var(--r-pill);font-size:.8rem;color:var(--track-bright);
  }
  .filter-tag button{background:none;border:none;color:inherit;cursor:pointer;font-size:.95rem;padding:0;line-height:1;opacity:.8;}
  .filter-tag button:hover{opacity:1;}

  .grid-scroll{flex:1;overflow:auto;position:relative;}

  table.grid-table{width:100%;border-collapse:collapse;font-size:.875rem;}
  .grid-table thead{position:sticky;top:0;z-index:5;background:var(--surface-2);}
  .grid-table th{
    padding:11px 16px;text-align:left;font-weight:600;color:var(--ink-3);
    font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;
    border-bottom:1px solid var(--line);white-space:nowrap;user-select:none;
  }
  .grid-table th.sortable{cursor:pointer;}
  .grid-table th.sortable:hover{color:var(--ink-1);}
  .grid-table th .sort-ind{color:var(--track-bright);margin-left:3px;}
  .grid-table tbody tr{border-bottom:1px solid var(--line);transition:background .12s;}
  .grid-table tbody tr:hover{background:var(--hover);}
  .grid-table tbody tr.row-selected{background:var(--track-wash);}
  .grid-table td{padding:11px 16px;vertical-align:top;color:var(--ink-1);}
  .grid-table td.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
  .cell-sub{font-size:.78rem;color:var(--ink-3);margin-top:2px;}
  .cell-id{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-3);display:none;margin-top:3px;word-break:break-all;}
  .cell-id.visible{display:block;}

  .bulk-bar{
    padding:11px 20px;background:var(--surface-2);border-top:1px solid var(--line);
    display:none;gap:10px;align-items:center;
  }
  .bulk-bar .count{color:var(--ink-2);font-size:.85rem;font-weight:600;margin-right:4px;}

  .empty-state{
    padding:60px 24px;text-align:center;color:var(--ink-2);
    display:flex;flex-direction:column;align-items:center;gap:10px;height:100%;justify-content:center;
  }
  .empty-state svg{opacity:.45;margin-bottom:4px;}
  .empty-state .empty-title{font-family:var(--font-display);font-size:1.05rem;color:var(--ink-1);font-weight:600;}
  .empty-state .empty-sub{font-size:.86rem;max-width:360px;}

  .load-state{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--ink-2);
  }
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--track);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ==========================================================
     MODAL
     ========================================================== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,7,11,.7);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;padding:20px;
    animation:fade .15s var(--ease);
  }
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .modal{
    background:var(--ink-raised);border:1px solid var(--line-strong);
    border-radius:var(--r-lg);max-width:600px;width:100%;max-height:88vh;
    overflow:auto;box-shadow:var(--shadow-lg);
    animation:rise .2s var(--ease);
  }
  .modal.modal-wide{max-width:880px;}
  .modal-header{
    padding:18px 22px;background:var(--surface-2);border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:2;
  }
  .modal-header h2{margin:0;font-family:var(--font-display);font-size:1.15rem;font-weight:600;}
  .modal-close{
    background:none;border:none;color:var(--ink-2);cursor:pointer;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    border-radius:var(--r-sm);transition:background .15s,color .15s;
  }
  .modal-close:hover{background:var(--hover);color:var(--ink-1);}
  .modal-body{padding:22px;}
  .modal-footer{
    padding:14px 22px;border-top:1px solid var(--line);
    display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2);
    position:sticky;bottom:0;
  }

  /* ==========================================================
     TOASTS  (replace native alert())
     ========================================================== */
  #toast-stack{
    position:fixed;bottom:22px;right:22px;z-index:1200;
    display:flex;flex-direction:column;gap:10px;width:340px;
  }
  .toast{
    display:flex;align-items:flex-start;gap:10px;
    padding:13px 14px;border-radius:var(--r-md);
    background:var(--ink-raised);border:1px solid var(--line-strong);
    box-shadow:var(--shadow-md);font-size:.87rem;color:var(--ink-1);
    animation:toast-in .2s var(--ease);
  }
  @keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .toast.leaving{animation:toast-out .15s var(--ease) forwards;}
  @keyframes toast-out{to{opacity:0;transform:translateX(8px);}}
  .toast-icon{flex-shrink:0;margin-top:1px;}
  .toast-success .toast-icon{color:var(--success);}
  .toast-error .toast-icon{color:var(--danger);}
  .toast-info .toast-icon{color:var(--info);}
  .toast-msg{flex:1;line-height:1.4;}
  .toast-close{background:none;border:none;color:var(--ink-3);cursor:pointer;padding:0;flex-shrink:0;}
  .toast-close:hover{color:var(--ink-1);}

  /* ==========================================================
     ACTIVITY CONSOLE
     ========================================================== */
  .console-shell{display:flex;flex-direction:column;gap:18px;height:100%;}
  .console-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;}
  .console-top h2{margin:0;font-family:var(--font-display);font-size:1.2rem;}
  .console-top p{margin:6px 0 0;color:var(--ink-2);font-size:.86rem;max-width:520px;}
  .console-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  .console-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;}
  .console-stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;text-align:center;}
  .console-stat b{display:block;font-family:var(--font-display);font-size:1.4rem;color:var(--track-bright);}
  .console-stat span{display:block;font-size:.7rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;font-weight:600;}

  .console-list{flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;}
  .console-date{font-size:.76rem;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;margin:22px 0 10px;padding-bottom:6px;}
  .console-date:first-child{margin-top:0;}
  .console-item{display:flex;gap:12px;padding:11px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:8px;transition:border-color .15s;}
  .console-item:hover{border-color:var(--line-strong);}
  .console-item-icon{flex-shrink:0;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .console-item-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;font-size:.78rem;}
  .console-item-action{font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:.7rem;}
  .console-item-entity{color:var(--track-bright);font-weight:600;}
  .console-item-time{color:var(--ink-3);margin-left:auto;font-family:var(--font-mono);}
  .console-item-summary{font-size:.85rem;color:var(--ink-1);}
  .console-item-user{font-size:.76rem;color:var(--ink-3);margin-top:2px;}
  .console-changes{margin-top:8px;background:var(--ink);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
  .console-change{display:flex;gap:8px;align-items:center;font-size:.78rem;flex-wrap:wrap;}
  .console-change b{color:var(--ink-2);min-width:78px;font-weight:600;}
  .console-from{color:var(--danger);text-decoration:line-through;}
  .console-to{color:var(--success);}

  /* Feedback cards */
  .feedback-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;margin-bottom:10px;}
  .feedback-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .feedback-msg{white-space:pre-wrap;word-break:break-word;line-height:1.55;color:var(--ink-1);}
  .feedback-email{margin-top:10px;font-size:.85rem;color:var(--ink-2);}

  /* ==========================================================
     RESPONSIVE
     ========================================================== */
  @media (max-width:860px){
    body{overflow:auto;}
    .app-wrapper{flex-direction:column;height:auto;min-height:100vh;}
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;
      transform:translateX(-100%);
      transition:transform .25s var(--ease);
      z-index:100;box-shadow:var(--shadow-lg);
    }
    .sidebar.mobile-open{transform:translateX(0);}
    .mobile-menu-button{display:flex;}
    .topbar{padding:12px 14px;gap:10px;}
    .topbar h2{font-size:1.05rem;}
    .topbar-links{display:none;}
    .main{width:100%;height:100vh;overflow:hidden;}
    .content{padding:14px;padding-bottom:60px;}
    .grid-head{flex-direction:column;align-items:stretch;}
    .grid-actions{width:100%;}
    .grid-actions .btn{flex:1;justify-content:center;}
    .filter-strip{padding:10px 14px;}
    .filter-strip .input{flex:1;min-width:120px;}
    .btn{min-height:40px;}
    .stats-grid{grid-template-columns:repeat(2,1fr);}
    .input,.field input,.field select{font-size:16px;}
    #toast-stack{left:14px;right:14px;width:auto;bottom:14px;}
    .console-stats{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:480px){
    .stats-grid{grid-template-columns:1fr;}
    .console-stats{grid-template-columns:1fr 1fr;}
    .grid-table{font-size:.8rem;}
  }
</style>
</head>
