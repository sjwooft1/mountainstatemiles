<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet Results | Mountain State Miles</title>
  
  <link rel="icon" type="image/png" href="assets/Favicon Generator/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/Favicon Generator/favicon.svg" />
  <link rel="shortcut icon" href="assets/Favicon Generator/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon Generator/apple-touch-icon.png" />
  <link rel="manifest" href="assets/Favicon Generator/site.webmanifest" />
  
  <meta name="description" content="WV running results, rankings, times, rosters, and meet data — Mountain State Miles." />
  <meta name="keywords" content="WVXC, WV Track, West Virginia Running, Cross Country Results, WV HS Running, Mountain State Miles" />
  <link rel="stylesheet" href="/assets/main.css" />
  <link rel="stylesheet" href="/assets/msm-loader.css" />
  
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      if (slug) {
        document.title = `${slug.replace(/-/g, " ")} – Meet Results | Mountain State Miles`;
      }
    });
  </script>

  
  <script src="/assets/theme-toggle.js" defer></script>
  <script src="/assets/components.js" defer></script>
</head>

<body>

  <div id="global-header"></div>

<script src="/assets/msm-loader.js"></script>
<main class="content-section">
      <h1 id="meet-title">Meet Results</h1>
      <div id="meet-meta" class="meet-metadata"></div>
      <div id="weather-widget" class="weather-widget" style="display:none; margin-top: 20px;"></div>
      <div id="error" class="error-message" style="display:none;"></div>

      <div id="selector" style="display:none; margin-top: 30px;">
        <div id="selector-card">
          <div class="tabs-row" role="tablist" aria-label="Gender tabs">
            <button id="tab-boys" class="gender-tab">BOYS</button>
            <button id="tab-girls" class="gender-tab">GIRLS</button>
          </div>
          <div id="select-heading">Select a Race</div>
          <div id="select-sub">Choose which race results you want to view for this meet.</div>
          <div id="race-button-wrap" class="race-buttons"></div>
        </div>
      </div>

    <div id="results-box" class="results-box"></div>
  </main>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-helpers.js"></script>

  <script>
    // ==========================================
    // 1. UTILITY & FORMATTING FUNCTIONS
    // ==========================================

    function formatTime(totalSeconds) {
      if (typeof totalSeconds !== 'number' || isNaN(totalSeconds) || totalSeconds <= 0) {
        return 'N/T';
      }
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${seconds.toFixed(2).padStart(5, '0')}`;
    }

    function calculatePacePerMile(totalSeconds, distanceMeters) {
      if (!totalSeconds || !distanceMeters) return '-';
      const MILE_IN_METERS = 1609.34;
      const secondsPerMile = (totalSeconds / distanceMeters) * MILE_IN_METERS;
      return formatTime(secondsPerMile);
    }
    
    function formatGrade(gradYear) {
      if (!gradYear) return '';
      const currentSeasonYear = 2025; 
      const diff = gradYear - (currentSeasonYear + 1);
      
      const gradeMap = { 0: '12', 1: '11', 2: '10', 3: '9', 4: '8', 5: '7', 6: '6' };
      return gradeMap[diff] || gradYear; 
    }

    function slugify(name) {
        if (!name) return '';
        return name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    }

    // ==========================================
    // 2. STATE MANAGEMENT
    // ==========================================
    let currentMeetData = null;
    let allResults = [];
    let activeGender = 'M';
    let activeRaceType = null;

    // ==========================================
    // 3. MAIN INITIALIZATION
    // ==========================================

    window.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      const errorDiv = document.getElementById("error");
      const metaDiv = document.getElementById("meet-meta");
      const selectorDiv = document.getElementById("selector");

      if (!slug) {
        errorDiv.style.display = "block";
        errorDiv.textContent = "No meet specified. Please return to the Meets page.";
        document.dispatchEvent(new Event("MSMDataLoaded"));
        return;
      }

      try {
        currentMeetData = await window.getMeetBySlug(slug);
        if (!currentMeetData) throw new Error("Meet not found.");

        document.getElementById("meet-title").textContent = currentMeetData.name;
        metaDiv.innerHTML = `
            <strong>Date:</strong> ${currentMeetData.date || 'TBA'} <span style="margin:0 10px">|</span> 
            <strong>Location:</strong> ${currentMeetData.location || 'Unknown'}
        `;

        // Course Viewer integration
        const courseMap = {
            'cabell midland': 'cabell-midland',
            'mineral wells': 'chick-fil-a',
            'meadowood': 'meadowood-park',
            'beckley': 'beckley-invitational',
            'south harrison': 'south-harrison',
            'glen oak': 'glen-oak'
        };

        let courseSlug = null;
        const locLower = (currentMeetData.location || '').toLowerCase();
        for (const [key, cSlug] of Object.entries(courseMap)) {
            if (locLower.includes(key)) {
                courseSlug = cSlug;
                break;
            }
        }

        if (courseSlug) {
            metaDiv.innerHTML += `
                <div style="margin-top: 15px;">
                    <a href="courses/course viewer.html?course=${courseSlug}" class="btn primary" style="background: var(--trail, #2fd0a3); color: #0b0e13; font-weight: 600; border: none; padding: 6px 14px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px;">
                        ▶️ View 3D Course & Flyover
                    </a>
                </div>
            `;
        }

        if (currentMeetData.location && currentMeetData.date) {
          loadWeatherForMeet(currentMeetData.location, currentMeetData.date);
        }

        allResults = await window.getResultsByMeet(slug);
        
        if (!allResults || allResults.length === 0) {
            errorDiv.style.display = "block";
            errorDiv.textContent = "Results have not been uploaded for this meet yet.";
            return;
        }

        const schools = await window.getAllSchools();
        const schoolSlugToName = {};
        if (schools && schools.length) {
          schools.forEach(s => { schoolSlugToName[s.slug || ''] = s.name || s.slug; });
        }
        allResults.forEach(r => {
          if ((!r.school_name && !r.school) && r.school_slug) {
            r.school_name = schoolSlugToName[r.school_slug] || r.school_slug;
          }
        });

        selectorDiv.style.display = "block";
        setupGenderTabs();
        document.getElementById("tab-boys").click();

      } catch (err) {
        console.error(err);
        errorDiv.style.display = "block";
        errorDiv.textContent = "Error loading meet data: " + err.message;
      } finally {
        document.dispatchEvent(new Event("MSMDataLoaded"));
      }
    });

    // ==========================================
    // 3.5 HISTORICAL WEATHER WIDGET FUNCTIONS
    // ==========================================

    const schoolCoordinatesMap = {
      'grafton high school': { lat: 39.34, lon: -80.03 },
      'parkersburg high school': { lat: 39.27, lon: -81.56 },
      'parkersburg south high school': { lat: 39.27, lon: -81.56 },
      'morgantown high school': { lat: 39.64, lon: -79.96 },
      'bridgeport high school': { lat: 39.29, lon: -80.26 },
      'buckhannon sampson high school': { lat: 38.99, lon: -80.23 },
      'cabell midland high school': { lat: 38.54, lon: -82.45 },
      'capital high school': { lat: 38.35, lon: -81.64 },
      'george washington high school': { lat: 38.35, lon: -81.64 },
      'hedgesville high school': { lat: 39.18, lon: -78.05 },
      'huntington high school': { lat: 38.42, lon: -82.45 },
      'hurricane high school': { lat: 38.49, lon: -82.48 },
      'jefferson high school': { lat: 39.33, lon: -77.74 },
      'martinsburg high school': { lat: 39.47, lon: -77.97 },
      'musselman high school': { lat: 39.48, lon: -78.03 },
      'oak hill high school': { lat: 38.41, lon: -81.60 },
      'preston high school': { lat: 39.34, lon: -80.03 },
      'riverside high school': { lat: 38.46, lon: -81.75 },
      'spring mills high school': { lat: 39.47, lon: -77.97 },
      'spring valley high school': { lat: 38.42, lon: -82.45 },
      'st albans high school': { lat: 38.54, lon: -81.83 },
      'university high school': { lat: 39.64, lon: -79.96 },
      'washington high school': { lat: 38.35, lon: -81.64 },
      'wheeling park high school': { lat: 40.07, lon: -80.71 },
      'woodrow wilson high school': { lat: 37.78, lon: -81.19 }
    };

    function getCoordinatesForLocation(location) {
      if (!location) return null;
      const normalized = location.toLowerCase().trim();
      if (schoolCoordinatesMap[normalized]) {
        return schoolCoordinatesMap[normalized];
      }
      return null;
    }

    async function loadWeatherForMeet(location, meetDate) {
      try {
        const weatherWidget = document.getElementById('weather-widget');
        const coordinates = getCoordinatesForLocation(location);
        
        if (!coordinates) return;

        const meetDateStr = meetDate; 
        const weather = await fetchWeatherData(coordinates.lat, coordinates.lon, meetDateStr);
        
        if (weather) {
          weatherWidget.style.display = 'block';
          renderWeatherWidget(weather, location, weather.weatherType);
        }
      } catch (err) {
        console.error('Error loading weather:', err);
      }
    }

    async function fetchWeatherData(lat, lon, dateStr) {
      try {
        const targetDate = new Date(dateStr);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const daysDiff = (today - targetDate) / (1000 * 60 * 60 * 24);
        let apiUrl = '';
        let weatherType = 'forecast';

        if (daysDiff > 5) {
            // Use historical archive API
            apiUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${dateStr}&end_date=${dateStr}&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max&temperature_unit=fahrenheit&timezone=auto`;
            weatherType = 'historical';
        } else {
            // Use standard forecast API
            apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max&temperature_unit=fahrenheit&timezone=auto`;
            if (daysDiff === 0) weatherType = 'current';
        }
        
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        if (data.daily && data.daily.time) {
          let weatherIndex = data.daily.time.indexOf(dateStr);
          if (weatherIndex === -1) weatherIndex = 0; 
          
          return {
            date: dateStr,
            maxTemp: data.daily.temperature_2m_max[weatherIndex],
            minTemp: data.daily.temperature_2m_min[weatherIndex],
            weatherCode: data.daily.weather_code[weatherIndex],
            precipitation: data.daily.precipitation_sum[weatherIndex],
            windSpeed: data.daily.wind_speed_10m_max[weatherIndex],
            timezone: data.timezone,
            weatherType: weatherType
          };
        }
        return null;
      } catch (err) {
        console.error('Weather fetch error:', err);
        return null;
      }
    }

    function getWeatherDetails(code) {
      const weatherMap = {
        0: { icon: '☀️', description: 'Clear' }, 1: { icon: '🌤️', description: 'Mostly Clear' },
        2: { icon: '⛅', description: 'Partly Cloudy' }, 3: { icon: '☁️', description: 'Overcast' },
        45: { icon: '🌫️', description: 'Foggy' }, 48: { icon: '🌫️', description: 'Foggy' },
        51: { icon: '🌦️', description: 'Light Drizzle' }, 53: { icon: '🌧️', description: 'Drizzle' },
        55: { icon: '🌧️', description: 'Heavy Drizzle' }, 61: { icon: '🌧️', description: 'Light Rain' },
        63: { icon: '🌧️', description: 'Rain' }, 65: { icon: '⛈️', description: 'Heavy Rain' },
        71: { icon: '❄️', description: 'Light Snow' }, 73: { icon: '❄️', description: 'Snow' },
        75: { icon: '❄️', description: 'Heavy Snow' }, 77: { icon: '❄️', description: 'Snow' },
        80: { icon: '🌧️', description: 'Light Showers' }, 81: { icon: '⛈️', description: 'Showers' },
        82: { icon: '⛈️', description: 'Heavy Showers' }, 85: { icon: '🌨️', description: 'Snow Showers' },
        86: { icon: '🌨️', description: 'Heavy Snow Showers' }, 95: { icon: '⛈️', description: 'Thunderstorm' },
        96: { icon: '⛈️', description: 'Hail Thunderstorm' }, 99: { icon: '⛈️', description: 'Hail Thunderstorm' }
      };
      return weatherMap[code] || { icon: '❓', description: 'Unknown' };
    }

    function renderWeatherWidget(weather, location, weatherType) {
      const widget = document.getElementById('weather-widget');
      const { icon, description } = getWeatherDetails(weather.weatherCode);
      
      const maxTemp = Math.round(weather.maxTemp);
      const minTemp = Math.round(weather.minTemp);
      const windSpeed = Math.round(weather.windSpeed);
      const precipitation = Math.round(weather.precipitation * 100) / 100;
      
      let weatherLabel = '⛅ Meet Day Forecast';
      if (weatherType === 'historical') weatherLabel = '🌤️ Historical Weather';
      if (weatherType === 'current') weatherLabel = '📍 Current Weather';
      
      widget.innerHTML = `
        <div class="weather-content" style="background: var(--card); border: 1px solid var(--card-border); padding: 16px; border-radius: 12px; display: inline-flex; gap: 14px; align-items: center;">
          <div class="weather-icon" style="font-size: 32px;">${icon}</div>
          <div class="weather-info">
            <div class="weather-label" style="font-size: 11px; text-transform: uppercase; color: var(--text-faint); font-weight: 600;">${weatherLabel}</div>
            <div class="weather-conditions" style="font-weight: 600; font-size: 15px; margin: 2px 0;">${description} • ${maxTemp}°F <span style="color:var(--text-faint)">/ ${minTemp}°F</span></div>
            <div class="weather-details" style="font-size: 12px; color: var(--text-dim);">
              <span class="detail-item">💨 ${windSpeed} mph</span> | 
              <span class="detail-item">💧 ${precipitation}"</span>
            </div>
          </div>
        </div>
      `;
    }

    // ==========================================
    // 4. UI LOGIC (TABS & BUTTONS)
    // ==========================================

    function setupGenderTabs() {
        const btnBoys = document.getElementById('tab-boys');
        const btnGirls = document.getElementById('tab-girls');

        const resetTabs = () => { [btnBoys, btnGirls].forEach(b => b.classList.remove('active')); };

        btnBoys.addEventListener('click', () => {
            resetTabs(); btnBoys.classList.add('active'); activeGender = 'M'; updateRaceButtons();
        });

        btnGirls.addEventListener('click', () => {
            resetTabs(); btnGirls.classList.add('active'); activeGender = 'F'; updateRaceButtons();
        });
    }

    function updateRaceButtons() {
        const container = document.getElementById('race-button-wrap');
        container.innerHTML = ''; 
        document.getElementById('results-box').innerHTML = '';

        const relevantResults = allResults.filter(r => (r.gender || '').toUpperCase() === activeGender);
        if (relevantResults.length === 0) {
            container.innerHTML = `<div style="color:#ccc; grid-column: 1/-1; text-align:center;">No results found for this category.</div>`;
            return;
        }

        const raceTypes = [...new Set(relevantResults.map(r => r.race_type))].sort();

        raceTypes.forEach((type, index) => {
            const btn = document.createElement('button');
            btn.className = 'race-button secondary'; 
            
            const label = type ? type.charAt(0).toUpperCase() + type.slice(1) : 'Unlabeled Race';
            btn.textContent = label;

            btn.onclick = () => {
                Array.from(container.children).forEach(c => {
                    c.classList.remove('primary'); c.classList.add('secondary');
                });
                btn.classList.remove('secondary'); btn.classList.add('primary');

                activeRaceType = type;
                renderTableForSelection();
            };
            container.appendChild(btn);
            if (index === 0) btn.click();
        });
    }

    function renderTableForSelection() {
        const filteredData = allResults.filter(r => 
            (r.gender || '').toUpperCase() === activeGender && r.race_type === activeRaceType
        );

        filteredData.sort((a, b) => {
            if (a.place && b.place) return a.place - b.place;
            return parseFloat(a.time) - parseFloat(b.time); 
        });

        const distance = filteredData.length > 0 ? parseFloat(filteredData[0].distance) : 5000;
        const teamScores = calculateTeamScores(filteredData);

        renderResultsTable(filteredData, distance);
        renderTeamResults(teamScores);
    }

    function normalizeSchoolName(schoolName) {
        if (!schoolName) return 'Unknown';
        let normalized = schoolName.toLowerCase().trim();
        normalized = normalized.replace(/\s+(high\s+)?school\s*$/i, '').replace(/\s+hs\s*$/i, '').trim();
        return normalized.split(/\s+/).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function calculateTeamScores(results) {
        const teamMap = {};
        results.forEach(result => {
            const rawSchool = result.school_name || result.school || 'Unknown';
            const school = normalizeSchoolName(rawSchool);
            if (!teamMap[school]) teamMap[school] = [];
            teamMap[school].push(result);
        });

        const scoringTeamNames = new Set(
            Object.entries(teamMap).filter(([, athletes]) => athletes.length >= 5).map(([s]) => s)
        );

        const scoringField = results
            .filter(r => scoringTeamNames.has(normalizeSchoolName(r.school_name || r.school || 'Unknown')))
            .sort((a, b) => {
                const placeA = parseInt(a.place) || 999;
                const placeB = parseInt(b.place) || 999;
                if (placeA !== placeB) return placeA - placeB;
                return (parseFloat(a.time) || 0) - (parseFloat(b.time) || 0);
            });

        scoringField.forEach((runner, index) => { runner.scoringPlace = index + 1; });

        const scores = [];
        Object.entries(teamMap).forEach(([school, athletes]) => {
            if (athletes.length < 5) return;
            
            const sorted = athletes.slice().sort((a, b) => (a.scoringPlace || 999) - (b.scoringPlace || 999));
            const topFive = sorted.slice(0, 5);
            const score = topFive.reduce((sum, a) => sum + (a.scoringPlace || 999), 0);
            const sixthPlace = sorted[5]?.scoringPlace ?? 999;
            const seventhPlace = sorted[6]?.scoringPlace ?? 999;

            // Advanced Analytics Variables
            const top5Times = topFive.map(a => parseFloat(a.time));
            const totalTime = top5Times.reduce((sum, t) => sum + t, 0);
            const teamAvg = totalTime / 5;
            const teamSplit = top5Times[4] - top5Times[0];

            scores.push({
                school,
                score,
                sixthPlace,
                seventhPlace,
                teamAvg,
                teamSplit,
                athletes: topFive,
                finishersCount: 5,
                totalAthletes: sorted.length,
                allAthletes: sorted
            });
        });

        return scores.sort((a, b) => {
            if (a.score !== b.score) return a.score - b.score;
            if (a.sixthPlace !== b.sixthPlace) return a.sixthPlace - b.sixthPlace;
            return a.seventhPlace - b.seventhPlace;
        });
    }

    function renderTeamResults(teamScores) {
        const resultsBox = document.getElementById('results-box');
        if (!teamScores || teamScores.length === 0) return;

        const teamHTML = `
            <section class="results-table-container">
                <h3 style="color: var(--text); margin-bottom: 20px; font-size: 1.3rem;">🏆 Team Scores</h3>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Place</th>
                            <th>School</th>
                            <th>Team Score</th>
                            <th>Stats (Avg / Split)</th>
                            <th>Top 5 Finishers</th>
                            <th style="font-size: 0.85rem;">Tiebreaker<br/>(6th, 7th)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${teamScores.map((team, index) => {
                            const tiebreaker = team.sixthPlace !== 999 || team.seventhPlace !== 999
                                ? `${team.sixthPlace !== 999 ? team.sixthPlace : '-'}, ${team.seventhPlace !== 999 ? team.seventhPlace : '-'}`
                                : '—';
                            
                            return `
                            <tr>
                                <td data-label="Place" style="font-weight: 700;">${index + 1}</td>
                                <td data-label="School" style="font-weight: 600;">${team.school}</td>
                                <td data-label="Team Score" style="font-weight: 700; color: #4f8bf0; font-size: 1.1rem;">${team.score}</td>
                                <td data-label="Stats" style="font-size: 0.9rem; color: var(--text-dim);">
                                    <div style="margin-bottom: 4px;"><strong>Avg:</strong> ${formatTime(team.teamAvg)}</div>
                                    <div><strong>Split:</strong> ${formatTime(team.teamSplit)}</div>
                                </td>
                                <td data-label="Top 5 Finishers">
                                    ${team.athletes.map(a => `
                                        <div style="font-size: 0.9rem; padding: 4px 0;">
                                            <strong>#${a.scoringPlace != null ? a.scoringPlace : a.place}</strong> ${a.athlete_name || a.name || 'Unknown'}
                                        </div>
                                    `).join('')}
                                </td>
                                <td data-label="Tiebreaker" style="font-size: 0.9rem; text-align: center; color: var(--text-faint);">${tiebreaker}</td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </section>
        `;

        resultsBox.innerHTML = teamHTML + resultsBox.innerHTML;
    }

    function renderResultsTable(results, distanceMeters) {
        const resultsBox = document.getElementById('results-box');
        
        if (!results || results.length === 0) {
            resultsBox.innerHTML = '<section><p>No results found.</p></section>';
            return;
        }

        const tableHTML = `
            <section class="results-table-container">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Place</th>
                            <th>Name</th>
                            <th>Grade</th>
                            <th>School</th>
                            <th>Time</th>
                            <th>Pace/Mile</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${results.map(runner => {
                            const timeSeconds = runner.time ? parseFloat(runner.time) : 0; 
                            const athleteSlug = slugify(runner.athlete_name || runner.name);
                            const rawSchool = runner.school_name || runner.school || runner.school_slug || 'Unknown';
                            const schoolSlug = runner.school_slug || slugify(normalizeSchoolName(rawSchool));

                            return `
                            <tr>
                                <td data-label="Place">${runner.place || '-'}</td>
                                <td data-label="Name">
                                    <a href="athlete.html?slug=${athleteSlug}" style="font-weight:bold; color:var(--text);">
                                        ${runner.athlete_name || runner.name || 'Unknown'}
                                    </a>
                                </td>
                                <td data-label="Grade">${formatGrade(runner.gradYear)}</td>
                                <td data-label="School">
                                    <a href="schools.html?slug=${schoolSlug}" style="color:var(--text-dim);">
                                        ${rawSchool}
                                    </a>
                                </td>
                                <td data-label="Time" style="font-weight:700;">${formatTime(timeSeconds)}</td>
                                <td data-label="Pace/Mile" style="color:var(--text-faint);">${calculatePacePerMile(timeSeconds, distanceMeters)}</td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            </section>
        `;
        resultsBox.innerHTML += tableHTML;
    }
  </script>

  <div id="global-footer"></div>

</body>
</html>
