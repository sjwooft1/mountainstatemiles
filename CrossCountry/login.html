<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XC Admin Login</title>
  <link rel="stylesheet" href="/assets/main.css" />

  
  <script src="/assets/theme-toggle.js" defer></script>
  <script src="/assets/components.js" defer></script>
</head>

<body>

  <div id="global-header"></div>

<main class="content-section">
    <div class="login-box">
      <h2>Cross Country Admin Login</h2>
      <input type="password" id="password" placeholder="Enter Password">
      <button class="btn" onclick="checkLogin()">Login</button>
      <p id="error" class="error">Incorrect password.</p>
    </div>
  </main>
<script>
    // Already logged in? → Go to admin page
    if (localStorage.getItem("&#120; &#99; &#97; &#100; &#109; &#105; &#110;") === "&#116; &#114; &#117; &#101;") {
      window.location.replace("admin.html");
    }

    function checkLogin() {
      const pass = document.getElementById("password").value;
      if (pass === "phsisbest") {
        localStorage.setItem("&#120; &#99; &#97; &#100; &#109; &#105; &#110;", "&#116; &#114; &#117; &#101;");
        window.location.replace("admin.html");
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
    const passwordInput = document.getElementById("password");

    passwordInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        document.querySelector(".btn").click();
      }
    });
    
  </script>


  <div id="global-footer"></div>

</body>
</html>
