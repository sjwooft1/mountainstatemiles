        <meta

        <meta property="og:type" content="website" />

        <meta name="twitter:title" content="Mountain State Miles" />
        <meta
            name="twitter:description"
            content="West Virginia's XC & Track results, rankings, and athlete profiles."
        />
        <meta name="robots" content="index, follow" />

        <script src="/assets/theme-toggle.js" defer></script>
        <script src="/assets/components.js" defer></script>
    </head>
    <body>
        <div id="global-header"></div>

        <script src="/assets/msm-loader.js"></script>

        <main class="content-section">
            <div class="hero-section">
                <div class="hero-content">
                    <img
                        src="/assets/images/logo.png"
                        alt="Mountain State Miles Logo"
                        class="hero-logo"
                        data-theme-light-src="/assets/images/logo.png"
                        data-theme-dark-src="/assets/images/logob.png"
                    />
                    <h1 class="hero-title">Cross Country</h1>
                    <p class="hero-subtitle">
                        Meet records, rankings, and results for West Virginia
                        high school cross country.
                    </p>
                </div>
            </div>

            <h2 class="section-title">Recent Meets</h2>
            <div id="meet-list" class="meet-grid">Loading recent meets...</div>
        </main>

        <div id="global-footer"></div>

        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
        <script src="firebase-config.js"></script>
        <script src="firebase-helpers.js"></script>
        <script>
            async function loadRecentMeets() {
                const container = document.getElementById("meet-list");
                try {
                    const meets = await getAllMeets(10);
                    if (!meets.length) {
                        container.innerHTML = "<p>No recent meets found.</p>";
                        return;
                    }
                    function formatDate(dateString) {
                        if (!dateString) return "Date TBD";
                        const parts = dateString.split("-");
                        if (parts.length === 3) {
                            const year = parseInt(parts[0], 10);
                            const month = parseInt(parts[1], 10) - 1;
                            const day = parseInt(parts[2], 10);
                            const date = new Date(year, month, day);
                            return date.toLocaleDateString();
                        }
                        return new Date(dateString).toLocaleDateString();
                    }
                    container.innerHTML = meets
                        .map((meet) => {
                            const date = formatDate(meet.date);
                            const location = meet.location || "";
                            return `
            <a href="meet.html?slug=${meet.slug}" class="meet-card">
              <h5 class="meet-card-title">${meet.name}</h5>
              <h6 class="meet-card-date">📅 ${date}</h6>
              ${location ? `<h6 class="meet-card-location">📍 ${location}</h6>` : ""}
            </a>
          `;
                        })
                        .join("");
                } catch (e) {
                    console.error("Error loading meets:", e);
                    container.innerHTML = "<p>Error loading recent meets.</p>";
                } finally {
                    document.dispatchEvent(new Event("MSMDataLoaded"));
                }
            }
            document.addEventListener("DOMContentLoaded", () => {
                loadRecentMeets();
            });
        </script>
    </body>
</html>
