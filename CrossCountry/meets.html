<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meets – Mountain State Miles</title>
  
  <link rel="icon" type="image/png" href="assets/Favicon Generator/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/Favicon Generator/favicon.svg" />
  <link rel="shortcut icon" href="assets/Favicon Generator/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/Favicon Generator/apple-touch-icon.png" />
  <link rel="manifest" href="assets/Favicon Generator/site.webmanifest" />
  
  <link rel="stylesheet" href="/assets/main.css" />
  <link rel="stylesheet" href="/assets/msm-loader.css" />
  <style>
    .content-section{
      padding-top: 100px;
    }
    .course-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #0b0e13;
      background: var(--trail, #2fd0a3);
      padding: 4px 10px;
      border-radius: 6px;
      text-decoration: none;
      transition: filter 0.15s ease;
    }
    .course-badge:hover {
      filter: brightness(1.1);
      color: #0b0e13;
    }
    .meets-controls {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .search-filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-filter-row input, .search-filter-row select {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border, #ccc);
      background: var(--card, #fff);
      color: var(--text, #333);
      font-size: 14px;
      flex: 1;
      min-width: 200px;
    }
    .view-toggles {
      display: flex;
      gap: 8px;
    }
    .view-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border, #ccc);
      background: transparent;
      color: var(--text, #333);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .view-btn.active {
      background: var(--trail, #2fd0a3);
      color: #0b0e13;
      border-color: var(--trail, #2fd0a3);
    }
    /* Calendar View Styles */
    .month-header {
      margin-top: 24px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border, #eee);
      color: var(--text, #333);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 0;
      list-style: none;
      margin-top: 16px;
    }
    .calendar-grid li {
      background: var(--card, #f9f9f9);
      border: 1px solid var(--border, #eee);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
  </style>

  
  <script src="/assets/theme-toggle.js" defer></script>
  <script src="/assets/components.js" defer></script>
</head>
<body>

  <div id="global-header"></div>

<script src="/assets/msm-loader.js"></script>
<main class="content-section">
    <h1>Meets</h1>
    <p>Browse all cross country and track meets in West Virginia.</p>
    
    <div class="meets-controls">
      <div class="search-filter-row">
        <input type="text" id="search-input" placeholder="Search meets by name or location..." />
        <select id="course-filter">
          <option value="all">All Courses</option>
          <option value="cabell-midland">Cabell Midland</option>
          <option value="chick-fil-a">Mineral Wells</option>
          <option value="meadowood-park">Meadowood</option>
          <option value="beckley-invitational">Beckley</option>
          <option value="south-harrison">South Harrison</option>
          <option value="glen-oak">Glen Oak</option>
        </select>
      </div>
      <div class="view-toggles">
        <button id="btn-list-view" class="view-btn active">List View</button>
        <button id="btn-cal-view" class="view-btn">Calendar View</button>
      </div>
    </div>

  <div class="meets-container">
    <ul id="meets-list">Loading meets...</ul>
  </div>
</main>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
  <script src="firebase-helpers.js"></script>

  <script>
    const courseMap = {
      'cabell midland': 'cabell-midland',
      'mineral wells': 'chick-fil-a',
      'meadowood': 'meadowood-park',
      'beckley': 'beckley-invitational',
      'south harrison': 'south-harrison',
      'glen oak': 'glen-oak'
    };

    // State Variables
    let allMeetsData = [];
    let currentView = 'list'; // can be 'list' or 'calendar'

    async function initMeets() {
      const container = document.getElementById('meets-list');
      try {
        if (typeof getAllMeets !== 'function') throw new Error("Firebase scripts not loaded");
        
        allMeetsData = await getAllMeets();
        renderMeets(); // Draw initial state

      } catch (e) {
          console.error("Failed to load meets:", e);
          container.innerHTML = '<li class="empty-state"><p>Failed to load meets. Please check your connection.</p></li>';
      } finally {
        document.dispatchEvent(new Event("MSMDataLoaded"));
      }
    }

    function formatDate(dateString) {
      if (!dateString) return 'Date TBD';
      const parts = dateString.split('-');
      if (parts.length === 3) {
        const date = new Date(parts[0], parts[1] - 1, parts[2]);
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      }
      return new Date(dateString).toLocaleDateString();
    }

    function getMonthName(dateString) {
        if (!dateString) return 'TBD';
        const parts = dateString.split('-');
        if (parts.length === 3) {
            const date = new Date(parts[0], parts[1] - 1, parts[2]);
            return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }
        return 'Other';
    }

    function getCourseSlug(location) {
        if (!location) return null;
        const locLower = location.toLowerCase();
        for (const [key, slug] of Object.entries(courseMap)) {
            if (locLower.includes(key)) return slug;
        }
        return null;
    }

    function renderMeets() {
      const container = document.getElementById('meets-list');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const courseFilter = document.getElementById('course-filter').value;

      // 1. Filter Data
      let filteredMeets = allMeetsData.filter(meet => {
        const nameMatch = (meet.name || '').toLowerCase().includes(searchTerm);
        const locMatch = (meet.location || '').toLowerCase().includes(searchTerm);
        const matchesSearch = nameMatch || locMatch;
        
        const meetCourseSlug = getCourseSlug(meet.location);
        const matchesCourse = (courseFilter === 'all') || (meetCourseSlug === courseFilter);

        return matchesSearch && matchesCourse;
      });

      if (!filteredMeets.length) {
        container.innerHTML = '<li class="empty-state"><p>No meets match your search.</p></li>';
        container.className = '';
        return;
      }

      // 2. Render based on View Type
      if (currentView === 'list') {
          container.className = ''; // standard vertical list
          container.innerHTML = filteredMeets.map(meet => createMeetCard(meet)).join('');
      } else {
          // Calendar View (Group by Month)
          container.className = ''; // Reset class, we will use internal grids
          container.innerHTML = '';
          
          const groupedByMonth = {};
          filteredMeets.forEach(meet => {
              const month = getMonthName(meet.date);
              if (!groupedByMonth[month]) groupedByMonth[month] = [];
              groupedByMonth[month].push(meet);
          });

          for (const [month, meets] of Object.entries(groupedByMonth)) {
              container.innerHTML += `<h2 class="month-header">${month}</h2>`;
              const gridHtml = `<ul class="calendar-grid">
                  ${meets.map(meet => createMeetCard(meet)).join('')}
              </ul>`;
              container.innerHTML += gridHtml;
          }
      }
    }

    function createMeetCard(meet) {
        const date = formatDate(meet.date);
        const location = meet.location || 'Location TBD';
        const courseSlug = getCourseSlug(location);
        
        const courseBadge = courseSlug 
          ? `<div><a href="courses/course viewer.html?course=${courseSlug}" class="course-badge">📍 View 3D Course</a></div>` 
          : '';

        return `
          <li>
            <a href="meet.html?slug=${meet.slug}" style="font-weight:bold; font-size: 1.1rem; text-decoration:none;">${meet.name}</a>
            <div style="color: var(--text-dim); margin-top: 4px;">📅 ${date}</div>
            <div style="color: var(--text-dim);">🗺️ ${location}</div>
            ${courseBadge}
            ${meet.description ? `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border, #eee); font-size: 0.9rem;">
              ${meet.description}
            </div>` : ''}
          </li>
        `;
    }

    // Event Listeners for Filters & Views
    document.addEventListener('DOMContentLoaded', () => {
      // Init data
      initMeets();

      // Hook up search and filter inputs
      document.getElementById('search-input').addEventListener('input', renderMeets);
      document.getElementById('course-filter').addEventListener('change', renderMeets);

      // Hook up view toggles
      const btnList = document.getElementById('btn-list-view');
      const btnCal = document.getElementById('btn-cal-view');

      btnList.addEventListener('click', () => {
          currentView = 'list';
          btnList.classList.add('active');
          btnCal.classList.remove('active');
          renderMeets();
      });

      btnCal.addEventListener('click', () => {
          currentView = 'calendar';
          btnCal.classList.add('active');
          btnList.classList.remove('active');
          renderMeets();
      });
    });
  </script>

  <div id="global-footer"></div>

</body>
</html>
